<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cosmic Wave — پلتفرم موزیک شیشه‌ای</title>
    <style>
        :root {
            --space-deep: #03030a;
            --space-mid: #08081c;
            --glass-bg: rgba(12, 12, 30, 0.5);
            --glass-bg-strong: rgba(16, 16, 40, 0.68);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-border-glow: rgba(255, 255, 255, 0.22);
            --glass-blur: 28px;
            --glass-saturate: 180%;
            --primary: #7ec8f8;
            --primary-glow: rgba(126, 200, 248, 0.5);
            --frost-cyan: #4df0d0;
            --electric-violet: #a78bfa;
            --shadow-glass-sm: 0 8px 30px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.2), inset 0 -1px 0 rgba(255,255,255,0.05);
            --shadow-glass: 0 18px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06) inset, 0 1px 0 rgba(255,255,255,0.18) inset, 0 -1px 0 rgba(255,255,255,0.04) inset;
            --shadow-glow: 0 0 50px var(--primary-glow), 0 0 100px rgba(126,200,248,0.2);
            --radius-sm: 12px;
            --radius: 20px;
            --radius-lg: 28px;
            --radius-xl: 36px;
            --transition: 0.3s cubic-bezier(0.25,0.1,0.25,1);
            --transition-slow: 0.65s cubic-bezier(0.23,0.1,0.23,1);
            --font: 'Vazirmatn', 'IRANSans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            --safe-bottom: env(safe-area-inset-bottom, 18px);
            --player-height: 116px;
            --nav-height: 56px;
        }
        :root[data-theme="aurora"] { --primary: #c084fc; --primary-glow: rgba(192,132,252,0.5); --frost-cyan: #f472b6; --electric-violet: #e879f9; --shadow-glow: 0 0 50px rgba(192,132,252,0.4), 0 0 100px rgba(192,132,252,0.18); }
        :root[data-theme="chrome"] { --primary: #b8c8d8; --primary-glow: rgba(200,210,225,0.4); --frost-cyan: #d0dce8; --electric-violet: #c0c8d4; --shadow-glow: 0 0 50px rgba(200,210,225,0.35), 0 0 100px rgba(200,210,225,0.15); }
        :root[data-theme="solar"] { --primary: #f59e0b; --primary-glow: rgba(245,158,11,0.5); --frost-cyan: #fbbf24; --electric-violet: #ef4444; --shadow-glow: 0 0 50px rgba(245,158,11,0.4), 0 0 100px rgba(245,158,11,0.18); }
        @media(prefers-reduced-motion:reduce){
            :root{--transition:0.05s linear;--transition-slow:0.1s linear}
            .nebula,.star,.eq-bar,.visualizer-pulse{animation-duration:10s!important}
            .carousel-track{transition:none!important}
        }
        *{box-sizing:border-box;margin:0;padding:0}
        html{font-size:clamp(14px,1.4vw,17px);-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
        body{font-family:var(--font);background:var(--space-deep);color:#fff;min-height:100vh;min-height:100dvh;overflow-x:hidden;line-height:1.55;display:flex;flex-direction:column;align-items:center;position:relative;padding-bottom:calc(var(--player-height) + 28px + var(--safe-bottom));padding-top:calc(var(--nav-height) + 24px)}
        .space-gradient{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 70% 45% at 28% 18%,rgba(20,40,100,0.45) 0%,transparent 60%),radial-gradient(ellipse 55% 35% at 72% 50%,rgba(50,18,80,0.35) 0%,transparent 55%),radial-gradient(ellipse 60% 28% at 48% 80%,rgba(10,30,65,0.45) 0%,transparent 55%),linear-gradient(180deg,#04040e 0%,#07071a 25%,#0a0a22 50%,#060618 75%,#04040e 100%)}
        .nebula{position:fixed;border-radius:50%;filter:blur(110px);opacity:0.28;pointer-events:none;z-index:0;animation:nebulaDrift 24s ease-in-out infinite}
        .nebula.n1{width:55vw;height:55vw;max-width:700px;max-height:700px;top:-14%;left:-10%;background:radial-gradient(circle,rgba(110,190,250,0.4) 0%,transparent 65%)}
        .nebula.n2{width:42vw;height:42vw;max-width:520px;max-height:520px;bottom:6%;right:-8%;background:radial-gradient(circle,rgba(150,100,230,0.35) 0%,transparent 60%);animation-delay:-10s;animation-duration:28s}
        .nebula.n3{width:32vw;height:32vw;max-width:400px;max-height:400px;top:38%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(34,210,180,0.25) 0%,transparent 55%);animation-delay:-16s;animation-duration:20s}
        @keyframes nebulaDrift{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(3vw,-2vh) scale(1.06)}50%{transform:translate(-1.5vw,3vh) scale(0.93)}75%{transform:translate(-3.5vw,-1vh) scale(1.04)}}
        .stars-container{position:fixed;inset:0;pointer-events:none;z-index:0}
        .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite;animation-delay:var(--delay);opacity:0}
        @keyframes twinkle{0%,100%{opacity:0.15}40%{opacity:0.85}60%{opacity:0.3}}
        .app-shell{position:relative;z-index:1;width:100%;max-width:1300px;display:flex;flex-direction:column;align-items:center;padding:0 20px;gap:24px}
        /* GLASS SYSTEM */
        .glass{background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,rgba(255,255,255,0.02) 100%);backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-saturate)) contrast(105%);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-saturate)) contrast(105%);border:1px solid var(--glass-border);box-shadow:var(--shadow-glass);position:relative;overflow:hidden}
        .glass::before{content:'';position:absolute;top:0;left:10%;right:10%;height:40%;background:linear-gradient(to bottom,rgba(255,255,255,0.12),transparent);border-radius:inherit;pointer-events:none;z-index:2}
        .glass::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,0.04) 0%,transparent 50%);pointer-events:none;z-index:1}
        /* NAV */
        .top-nav{position:fixed;top:12px;z-index:120;width:calc(100% - 24px);max-width:1250px;height:var(--nav-height);border-radius:var(--radius-xl);padding:0 16px;display:flex;align-items:center;gap:8px;transition:var(--transition);animation:navEnter 0.7s cubic-bezier(0.23,0.1,0.23,1) both}
        @keyframes navEnter{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
        .nav-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--glass-border);background:rgba(255,255,255,0.05);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0;font-size:0.95rem;backdrop-filter:blur(10px)}
        .nav-btn:hover{background:rgba(255,255,255,0.14);border-color:var(--glass-border-glow);box-shadow:0 0 22px var(--primary-glow);transform:translateY(-2px)}
        .nav-btn:active{transform:scale(0.9)}.nav-btn:focus-visible{outline:2px solid var(--primary);outline-offset:3px}
        .nav-spacer{flex:1;min-width:8px}.nav-now-playing{display:flex;align-items:center;gap:10px;flex-shrink:1;min-width:0;overflow:hidden}
        .nav-mini-cover{width:36px;height:36px;border-radius:10px;flex-shrink:0;border:1px solid var(--glass-border)}
        .nav-track-info{display:flex;flex-direction:column;min-width:0;overflow:hidden}
        .nav-track-title{font-size:0.8rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}.nav-track-artist{font-size:0.68rem;opacity:0.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
        .search-wrapper{position:relative;flex-shrink:0}.search-input{width:170px;height:40px;border-radius:24px;border:1px solid var(--glass-border);background:rgba(255,255,255,0.06);color:#fff;padding:0 40px 0 14px;font-size:0.78rem;transition:var(--transition);font-family:var(--font);outline:none;backdrop-filter:blur(14px)}
        .search-input:focus{width:240px;border-color:var(--primary);box-shadow:0 0 24px var(--primary-glow);background:rgba(255,255,255,0.1)}.search-input::placeholder{color:rgba(255,255,255,0.45)}
        .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:0.85rem;opacity:0.6}.search-results{position:absolute;top:48px;right:0;width:280px;max-height:320px;overflow-y:auto;border-radius:var(--radius);padding:6px;display:none;z-index:200;animation:fadeSlide 0.3s ease-out}.search-results.active{display:block}
        .search-result-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);border:1px solid transparent}.search-result-item:hover{background:rgba(255,255,255,0.08);border-color:var(--glass-border)}.search-result-cover{width:40px;height:40px;border-radius:8px;flex-shrink:0}.search-result-info{display:flex;flex-direction:column;min-width:0}.search-result-title{font-size:0.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.search-result-artist{font-size:0.68rem;opacity:0.65}.search-no-result{padding:18px;text-align:center;opacity:0.6;font-size:0.8rem}
        .theme-dots{display:flex;gap:6px;flex-shrink:0}.theme-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:var(--transition);flex-shrink:0}.theme-dot:hover{border-color:#fff;transform:scale(1.2)}.theme-dot.active-theme{border-color:#fff;box-shadow:0 0 14px currentColor}
        /* CAROUSEL */
        .carousel-container{width:100%;max-width:1150px;position:relative;perspective:1200px;display:flex;align-items:center;justify-content:center;height:clamp(380px,48vw,520px);margin:8px 0;animation:heroEnter 0.9s cubic-bezier(0.23,0.1,0.23,1) 0.2s both}
        @keyframes heroEnter{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
        .carousel-viewport{width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .carousel-track{display:flex;align-items:center;justify-content:center;width:100%;height:100%;position:relative;transition:var(--transition-slow)}
        .music-card{position:absolute;width:clamp(200px,24vw,340px);aspect-ratio:3/4;border-radius:var(--radius-xl);cursor:pointer;transition:all var(--transition-slow);box-shadow:var(--shadow-glass);display:flex;flex-direction:column;overflow:hidden;transform-style:preserve-3d;will-change:transform,opacity;backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);border:2px solid var(--glass-border)}
        .music-card .card-artwork{position:absolute;inset:0;border-radius:inherit;z-index:0}
        .music-card .card-glass-overlay{position:absolute;inset:0;border-radius:inherit;z-index:1;background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,rgba(0,0,0,0.3) 100%)}
        .music-card .card-caption{position:absolute;bottom:0;left:0;right:0;z-index:3;padding:20px 18px 16px;background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,transparent 100%);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom-left-radius:inherit;border-bottom-right-radius:inherit;display:flex;flex-direction:column;gap:6px}
        .music-card .card-badge{display:inline-block;font-size:0.6rem;padding:3px 10px;border-radius:12px;background:rgba(255,255,255,0.15);backdrop-filter:blur(6px);color:#fff;letter-spacing:0.05em;align-self:flex-start;border:1px solid rgba(255,255,255,0.2)}.music-card .card-title{font-size:1.05rem;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.5);line-height:1.25;max-width:100%;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}.music-card .card-artist{font-size:0.75rem;color:rgba(255,255,255,0.78);text-shadow:0 1px 4px rgba(0,0,0,0.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .music-card.center{z-index:10;transform:translateX(0) scale(1.12);border-color:rgba(255,255,255,0.3);box-shadow:var(--shadow-glow),0 24px 80px rgba(0,0,0,0.65);opacity:1}
        .music-card.left{z-index:6;transform:translateX(-55%) scale(0.82) rotateY(18deg);opacity:0.45;filter:brightness(0.6) blur(0.4px)}
        .music-card.right{z-index:6;transform:translateX(55%) scale(0.82) rotateY(-18deg);opacity:0.45;filter:brightness(0.6) blur(0.4px)}
        .music-card.far-left{z-index:2;transform:translateX(-95%) scale(0.58) rotateY(30deg);opacity:0.18;filter:brightness(0.4) blur(1.2px);pointer-events:none}
        .music-card.far-right{z-index:2;transform:translateX(95%) scale(0.58) rotateY(-30deg);opacity:0.18;filter:brightness(0.4) blur(1.2px);pointer-events:none}
        .music-card.hidden-card{z-index:0;transform:translateX(0) scale(0.35);opacity:0;pointer-events:none}
        .carousel-nav-btn{position:absolute;top:50%;transform:translateY(-50%);z-index:25;width:48px;height:48px;border-radius:50%;border:1px solid var(--glass-border);background:var(--glass-bg);backdrop-filter:blur(16px);color:#fff;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:var(--transition);box-shadow:0 4px 24px rgba(0,0,0,0.5)}.carousel-nav-btn:hover{background:rgba(255,255,255,0.15);border-color:var(--primary);box-shadow:0 0 28px var(--primary-glow)}.carousel-prev{left:8px}.carousel-next{right:8px}
        /* SHELVES */
        .shelves-section{width:100%;max-width:1150px;display:flex;flex-direction:column;gap:20px;margin-bottom:8px}.shelf-title{font-size:0.95rem;font-weight:700;color:rgba(255,255,255,0.8);letter-spacing:0.03em;padding:0 4px}
        .shelf-scroll{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding:6px 0 10px;scrollbar-width:none}.shelf-scroll::-webkit-scrollbar{display:none}
        .mini-card{flex-shrink:0;width:clamp(110px,14vw,150px);aspect-ratio:3/4;border-radius:var(--radius);cursor:pointer;border:1px solid var(--glass-border);transition:var(--transition);scroll-snap-align:start;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;animation:cardStagger 0.5s ease-out both;backdrop-filter:blur(14px);background:rgba(255,255,255,0.04);box-shadow:0 8px 24px rgba(0,0,0,0.4)}.mini-card:hover{transform:translateY(-6px);border-color:var(--primary);box-shadow:0 14px 34px rgba(0,0,0,0.5),0 0 24px var(--primary-glow)}.mini-card .mini-artwork{position:absolute;inset:0;z-index:0}.mini-card .mini-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(to top,rgba(0,0,0,0.82) 0%,transparent 55%)}.mini-card .mini-info{position:relative;z-index:2;padding:10px 8px}.mini-card .mini-title{font-size:0.7rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mini-card .mini-artist{font-size:0.6rem;color:rgba(255,255,255,0.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        @keyframes cardStagger{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        /* PLAYER */
        .player-bar{position:fixed;bottom:10px;bottom:calc(10px + var(--safe-bottom));z-index:150;width:calc(100% - 20px);max-width:1250px;height:var(--player-height);border-radius:var(--radius-xl);padding:0 18px;display:flex;align-items:center;gap:12px;transition:var(--transition);animation:playerEnter 0.8s cubic-bezier(0.23,0.1,0.23,1) 0.4s both}
        @keyframes playerEnter{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .player-cover-sm{width:64px;height:64px;border-radius:var(--radius-sm);flex-shrink:0;border:1px solid var(--glass-border);cursor:pointer;box-shadow:0 0 20px rgba(0,0,0,0.4);transition:transform 0.3s}.player-cover-sm.playing{animation:softPulse 3s ease-in-out infinite}
        @keyframes softPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
        .player-info-sm{display:flex;flex-direction:column;min-width:0;flex-shrink:1;gap:2px}.player-title-sm{font-size:0.9rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}.player-artist-sm{font-size:0.7rem;opacity:0.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
        .player-controls{display:flex;align-items:center;gap:6px;flex-shrink:0}.ctrl-btn{width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,0.04);color:#fff;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0;backdrop-filter:blur(10px)}.ctrl-btn:hover{background:rgba(255,255,255,0.14);transform:translateY(-2px)}.ctrl-btn:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
        .ctrl-btn.play-btn{width:60px;height:60px;background:var(--primary);color:#0a0a18;border-radius:50%;font-size:1.4rem;box-shadow:0 0 32px var(--primary-glow),0 0 70px var(--primary-glow);border:1px solid rgba(255,255,255,0.35);position:relative;transition:all 0.25s}
        .ctrl-btn.play-btn::after{content:'';position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(255,255,255,0.12);pointer-events:none;animation:playOrbPulse 2.8s ease-in-out infinite}.ctrl-btn.play-btn:hover{box-shadow:0 0 45px var(--primary-glow),0 0 80px var(--primary-glow);transform:scale(1.08)}.ctrl-btn.play-btn:active{transform:scale(0.88)}.ctrl-btn.liked{color:#ff5e7e}
        @keyframes playOrbPulse{0%,100%{transform:scale(1);opacity:0.35}50%{transform:scale(1.22);opacity:0}}
        .player-progress-area{flex:1;min-width:60px;display:flex;align-items:center;gap:10px;flex-shrink:1}.time-display{font-size:0.68rem;opacity:0.7;font-family:var(--font-mono);flex-shrink:0;min-width:36px;text-align:center}
        .progress-bar-outer{flex:1;height:6px;border-radius:8px;background:rgba(255,255,255,0.1);cursor:pointer;position:relative;min-width:40px;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3);backdrop-filter:blur(4px)}.progress-fill{height:100%;border-radius:8px;background:var(--primary);position:relative;transition:width 0.08s linear;box-shadow:0 0 12px var(--primary-glow)}.progress-thumb{position:absolute;right:-7px;top:50%;transform:translateY(-50%);width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 0 14px var(--primary-glow);opacity:0;transition:opacity 0.2s;pointer-events:none}.progress-bar-outer:hover .progress-thumb{opacity:1}
        .volume-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0}.volume-slider{width:70px;height:5px;border-radius:5px;background:rgba(255,255,255,0.1);cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;backdrop-filter:blur(6px)}.volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 0 10px var(--primary-glow)}.eq-bars{display:flex;gap:2px;align-items:flex-end;height:18px;flex-shrink:0}.eq-bar{width:3px;border-radius:3px;background:var(--frost-cyan);animation:eqJump 0.7s ease-in-out infinite;animation-play-state:paused;box-shadow:0 0 5px var(--frost-cyan)}.eq-bar.playing{animation-play-state:running}.eq-bar:nth-child(1){animation-delay:0s;height:7px}.eq-bar:nth-child(2){animation-delay:0.1s;height:15px}.eq-bar:nth-child(3){animation-delay:0.2s;height:6px}.eq-bar:nth-child(4){animation-delay:0.3s;height:13px}.eq-bar:nth-child(5){animation-delay:0.4s;height:9px}@keyframes eqJump{0%,100%{transform:scaleY(0.4)}50%{transform:scaleY(1.8)}}
        /* PANELS */
        .panel-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity var(--transition)}.panel-overlay.open{opacity:1;pointer-events:auto}
        .glass-panel{width:92%;max-width:520px;max-height:80vh;overflow-y:auto;padding:20px;border-radius:var(--radius-xl);display:flex;flex-direction:column;gap:12px;animation:modalIn 0.4s cubic-bezier(0.23,0.1,0.23,1)}@keyframes modalIn{from{opacity:0;transform:scale(0.92) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}

            const setupAudioContext=()=>{if(!audioContext&&audioEl.src&&audioEl.src!==window.location.href&&audioEl.src!==''){try{audioContext=new(window.AudioContext||window.webkitAudioContext)();analyserNode=audioContext.createAnalyser();analyserNode.fftSize=128;const src=audioContext.createMediaElementSource(audioEl);src.connect(analyserNode);analyserNode.connect(audioContext.destination)}catch(e){audioContext=null;analyserNode=null}}};
            const drawVisualizer=()=>{if(!ctx2d||!visualizerCanvas)return;const w=visualizerCanvas.width,h=visualizerCanvas.height;ctx2d.clearRect(0,0,w,h);const bars=40,bw=w/bars-1,t=Date.now()/1000;for(let i=0;i<bars;i++){let val;if(analyserNode&&audioContext&&audioContext.state==='running'){const fd=new Uint8Array(analyserNode.frequencyBinCount);analyserNode.getByteFrequencyData(fd);val=fd[Math.floor(i*fd.length/bars)]/255}else if(isPlaying)val=0.22+0.32*Math.abs(Math.sin(t*2.8+i*0.35)*Math.cos(t*1.5+i*0.22));else val=0.06+0.04*Math.sin(t*0.4+i*0.25);const bh=val*h*0.8,x=i*(bw+1),y=h-bh;const grad=ctx2d.createLinearGradient(x,y,x,h);grad.addColorStop(0,getComputedStyle(document.documentElement).getPropertyValue('--frost-cyan').trim()||'#4df0d0');grad.addColorStop(1,'transparent');ctx2d.fillStyle=grad;ctx2d.beginPath();ctx2d.roundRect(x,y,bw,bh,[1.5,1.5,0,0]);ctx2d.fill()}};
            const startVisLoop=()=>{if(!visAnimId){const loop=()=>{drawVisualizer();visAnimId=requestAnimationFrame(loop)};loop()}};const stopVisLoop=()=>{if(visAnimId){cancelAnimationFrame(visAnimId);visAnimId=null;ctx2d?.clearRect(0,0,visualizerCanvas.width,visualizerCanvas.height)}};startVisLoop();
            const applyTheme=t=>{document.body.setAttribute('data-theme',t);try{localStorage.setItem('cw-theme',t)}catch(e){}document.querySelectorAll('.theme-dot').forEach(d=>d.classList.toggle('active-theme',d.dataset.theme===t))};
            (()=>{const s=localStorage.getItem('cw-theme');if(s)applyTheme(s)})();
            document.querySelectorAll('.theme-dot').forEach(d=>{d.addEventListener('click',()=>applyTheme(d.dataset.theme));d.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();applyTheme(d.dataset.theme)}})});
            const openPanel=id=>document.getElementById(id)?.classList.add('open');const closePanel=id=>document.getElementById(id)?.classList.remove('open');const closeAll=()=>['queueOverlay','lyricsOverlay','uploadOverlay'].forEach(closePanel);
            document.addEventListener('keydown',e=>{if(e.key==='Escape')closeAll()});
            $('#queueClose').addEventListener('click',()=>closePanel('queueOverlay'));$('#lyricsClose').addEventListener('click',()=>closePanel('lyricsOverlay'));$('#uploadClose').addEventListener('click',()=>closePanel('uploadOverlay'));
            document.getElementById('queueOverlay')?.addEventListener('click',function(e){if(e.target===this)closePanel('queueOverlay')});document.getElementById('lyricsOverlay')?.addEventListener('click',function(e){if(e.target===this)closePanel('lyricsOverlay')});document.getElementById('uploadOverlay')?.addEventListener('click',function(e){if(e.target===this)closePanel('uploadOverlay')});
            const updatePlayerUI=()=>{const tr=getCurrentTrack();if(!tr)return;playerTitle.textContent=tr.title;playerArtist.textContent=tr.artist;navTrackTitle.textContent=tr.title;navTrackArtist.textContent=tr.artist;playerCoverSm.style.cssText=createArtworkStyle(tr.colors);navMiniCover.style.cssText=createArtworkStyle(tr.colors);timeDurationEl.textContent=formatTime(tr.duration);btnLike.textContent=likedTracks.has(tr.id)?'❤️':'🤍';btnLike.classList.toggle('liked',likedTracks.has(tr.id));btnRepeat.textContent={off:'🔁',all:'🔁',one:'🔂'}[repeatMode]||'🔁';btnRepeat.style.color=repeatMode==='all'?'var(--primary)':repeatMode==='one'?'var(--frost-cyan)':'';btnShuffle.style.color=isShuffled?'var(--primary)':'';updatePlayIcon();renderQueuePanel();updateLyricsPanel();updateCarouselHighlight();playerCoverSm.classList.toggle('playing',isPlaying)};
            const updatePlayIcon=()=>{btnPlay.textContent=isPlaying?'⏸':'▶';eqBars?.querySelectorAll('.eq-bar').forEach(b=>b.classList.toggle('playing',isPlaying))};
            const updateCarouselHighlight=()=>{const cards=carouselTrack.querySelectorAll('.music-card');cards.forEach(c=>{const idx=parseInt(c.dataset.trackIndex);c.classList.toggle('center',idx===currentTrackIndex);c.classList.remove('left','right','far-left','far-right','hidden-card')});positionCarouselCards()};
            const positionCarouselCards=()=>{const cards=Array.from(carouselTrack.querySelectorAll('.music-card'));const ci=cards.findIndex(c=>parseInt(c.dataset.trackIndex)===currentTrackIndex);if(ci<0)return;const n=cards.length;cards.forEach((card,i)=>{let off=i-ci;if(off<-2)off+=n;if(off>2)off-=n;if(Math.abs(off)>2)off=off>0?3:-3;card.classList.remove('center','left','right','far-left','far-right','hidden-card');if(off===0)card.classList.add('center');else if(off===-1)card.classList.add('left');else if(off===1)card.classList.add('right');else if(off===-2)card.classList.add('far-left');else if(off===2)card.classList.add('far-right');else card.classList.add('hidden-card')})};
            const updateProgressUI=()=>{const tr=getCurrentTrack();const dur=tr.duration||1;let ct=(tr.isUploaded&&tr.src&&audioEl.duration)?audioEl.currentTime:demoCurrentTime;const pct=Math.min(100,(ct/dur)*100);progressFill.style.width=pct+'%';timeCurrentEl.textContent=formatTime(ct);timeDurationEl.textContent=formatTime(dur);progressBarOuter.setAttribute('aria-valuenow',Math.round(pct))};
            const renderQueuePanel=()=>{const list=$('#queueList');if(!list)return;buildQueue();list.innerHTML='';queueIndices.forEach(i=>{const tr=tracks[i];if(!tr)return;const d=document.createElement('div');d.className='queue-item'+(i===currentTrackIndex?' current':'');d.innerHTML=`<div class="queue-cover-xs" style="${createArtworkStyle(tr.colors)}border-radius:7px;"></div><div class="queue-info"><div class="queue-title">${tr.title}</div><div class="queue-artist">${tr.artist}</div></div><span class="queue-dur">${formatTime(tr.duration)}</span>${tr.isUploaded?`<button class="queue-remove" data-idx="${i}" aria-label="حذف">✕</button>`:''}`;d.addEventListener('click',e=>{if(!e.target.classList.contains('queue-remove'))selectTrack(i)});const rm=d.querySelector('.queue-remove');if(rm)rm.addEventListener('click',e=>{e.stopPropagation();removeUploadedTrack(i)});list.appendChild(d)})};
            const removeUploadedTrack=idx=>{const tr=tracks[idx];if(!tr?.isUploaded)return;if(tr.objectUrl?.startsWith('blob:'))URL.revokeObjectURL(tr.objectUrl);tracks.splice(idx,1);if(tracks.length===0){tracks=[...sampleTracks];currentTrackIndex=0}else if(currentTrackIndex>=tracks.length)currentTrackIndex=Math.max(0,tracks.length-1);stopPlayback();buildQueue();renderCarousel();renderShelves();updatePlayerUI();showToast('آهنگ حذف شد.','')};
            const updateLyricsPanel=()=>{const c=$('#lyricsContent');if(!c)return;const tr=getCurrentTrack();c.innerHTML='';if(!tr?.lyrics?.length){c.innerHTML='<p style="text-align:center;opacity:0.6;padding:18px;">متن آهنگ برای این فایل موجود نیست.</p>';return}const activeIdx=tr.isUploaded?-1:Math.floor((demoCurrentTime/Math.max(tr.duration,1))*tr.lyrics.length);tr.lyrics.forEach((line,i)=>{const d=document.createElement('div');d.className='lyrics-line'+(i===activeIdx?' active':'');d.textContent=line;c.appendChild(d)});if(activeIdx>=0&&c.children[activeIdx])c.children[activeIdx].scrollIntoView({behavior:'smooth',block:'center'})};
            const renderCarousel=()=>{carouselTrack.innerHTML='';tracks.forEach((tr,i)=>{const card=document.createElement('div');card.className='music-card';card.dataset.trackIndex=i;card.setAttribute('role','button');card.setAttribute('aria-label',`${tr.title} از ${tr.artist}`);card.tabIndex=0;card.innerHTML=`<div class="card-artwork">${createArtworkHTML(tr.colors,tr.badge)}</div><div class="card-glass-overlay"></div><div class="card-caption"><span class="card-badge">${tr.badge||''}</span><span class="card-title">${tr.title}</span><span class="card-artist">${tr.artist}</span></div>`;card.addEventListener('click',()=>selectTrack(i));card.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();selectTrack(i)}});carouselTrack.appendChild(card)});positionCarouselCards()};
            const renderShelves=()=>{const cfg={shelfSuggested:[0,2,5,1,7],shelfMix:[5,3,0,7,2],shelfNight:[1,4,6,3,5],shelfNew:[7,6,4,2,1]};Object.entries(cfg).forEach(([sid,indices])=>{const shelf=document.getElementById(sid);if(!shelf)return;shelf.innerHTML='';indices.forEach((i,idx)=>{const tr=tracks[i];if(!tr)return;const c=document.createElement('div');c.className='mini-card';c.style.animationDelay=`${idx*0.06}s`;c.setAttribute('role','button');c.setAttribute('aria-label',`${tr.title} از ${tr.artist}`);c.tabIndex=0;c.innerHTML=`<div class="mini-artwork">${createArtworkHTML(tr.colors,tr.badge)}</div><div class="mini-overlay"></div><div class="mini-info"><span class="mini-title">${tr.title}</span><span class="mini-artist">${tr.artist}</span></div>`;c.addEventListener('click',()=>selectTrack(i));c.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();selectTrack(i)}});shelf.appendChild(c)})})};
            const stopPlayback=()=>{isPlaying=!1;demoCurrentTime=0;if(demoInterval){clearInterval(demoInterval);demoInterval=null}if(!audioEl.paused)audioEl.pause();updatePlayIcon();updateProgressUI();playerCoverSm.classList.remove('playing')};
            const playTrack=idx=>{stopPlayback();currentTrackIndex=idx;buildQueue();const tr=getCurrentTrack();updatePlayerUI();if(tr.isUploaded&&tr.src){audioEl.src=tr.src;audioEl.load();setupAudioContext();audioEl.play().then(()=>{isPlaying=!0;updatePlayIcon();startVisLoop();playerCoverSm.classList.add('playing')}).catch(()=>{showToast('برای پخش کلیک کنید (محدودیت مرورگر)','');isPlaying=!1;updatePlayIcon()})}else{demoCurrentTime=0;isPlaying=!0;updatePlayIcon();startVisLoop();playerCoverSm.classList.add('playing');demoInterval=setInterval(()=>{demoCurrentTime+=0.22;if(demoCurrentTime>=tr.duration){demoCurrentTime=tr.duration;if(repeatMode==='one')demoCurrentTime=0;else handleTrackEnd()}updateProgressUI();updateLyricsPanel()},220)}renderCarousel();renderShelves();updatePlayerUI()};
            const pauseTrack=()=>{isPlaying=!1;if(demoInterval){clearInterval(demoInterval);demoInterval=null}if(!audioEl.paused)audioEl.pause();updatePlayIcon();playerCoverSm.classList.remove('playing')};
            const togglePlay=()=>{if(isPlaying){pauseTrack();return}const tr=getCurrentTrack();if(tr.isUploaded&&tr.src){audioEl.play().then(()=>{isPlaying=!0;updatePlayIcon();startVisLoop();playerCoverSm.classList.add('playing')}).catch(()=>{showToast('خطا در پخش','error')})}else{isPlaying=!0;updatePlayIcon();startVisLoop();playerCoverSm.classList.add('playing');demoInterval=setInterval(()=>{demoCurrentTime+=0.22;if(demoCurrentTime>=tr.duration){demoCurrentTime=tr.duration;if(repeatMode==='one')demoCurrentTime=0;else handleTrackEnd()}updateProgressUI();updateLyricsPanel()},220)}};
            const handleTrackEnd=()=>{if(repeatMode==='one'){demoCurrentTime=0;if(getCurrentTrack().isUploaded&&getCurrentTrack().src){audioEl.currentTime=0;audioEl.play().catch(()=>{})}updateProgressUI();return}nextTrack()};
            const nextTrack=()=>{buildQueue();const ci=queueIndices.indexOf(currentTrackIndex);playTrack(queueIndices[(ci+1)%queueIndices.length])};
            const prevTrack=()=>{buildQueue();const ci=queueIndices.indexOf(currentTrackIndex);playTrack(queueIndices[(ci-1+queueIndices.length)%queueIndices.length])};
            const selectTrack=idx=>{if(idx>=0&&idx<tracks.length)playTrack(idx)};
            const seekToPercent=pct=>{const tr=getCurrentTrack();const dur=tr.duration||1;const time=pct*dur;if(tr.isUploaded&&tr.src&&audioEl.duration)audioEl.currentTime=time;else demoCurrentTime=time;updateProgressUI();updateLyricsPanel()};
            audioEl.addEventListener('loadedmetadata',()=>{const tr=getCurrentTrack();if(tr.isUploaded&&audioEl.duration&&isFinite(audioEl.duration)){tr.duration=Math.round(audioEl.duration);updatePlayerUI()}setupAudioContext()});
            audioEl.addEventListener('timeupdate',()=>{if(getCurrentTrack().isUploaded&&getCurrentTrack().src){demoCurrentTime=audioEl.currentTime;updateProgressUI();updateLyricsPanel()}});
            audioEl.addEventListener('ended',()=>{if(getCurrentTrack().isUploaded&&getCurrentTrack().src)handleTrackEnd()});
            audioEl.addEventListener('play',()=>{isPlaying=!0;updatePlayIcon();startVisLoop();playerCoverSm.classList.add('playing')});
            audioEl.addEventListener('pause',()=>{if(!audioEl.ended){isPlaying=!1;updatePlayIcon();playerCoverSm.classList.remove('playing')}});
            audioEl.addEventListener('error',()=>{showToast('مرورگر نتوانست این فایل را پخش کند.','error');pauseTrack()});
            progressBarOuter.addEventListener('click',e=>{const r=progressBarOuter.getBoundingClientRect();seekToPercent(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)))});
            progressBarOuter.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowLeft'){e.preventDefault();const tr=getCurrentTrack();const d=tr.duration||1;const delta=e.key==='ArrowRight'?5:-5;let ct=(tr.isUploaded&&tr.src&&audioEl.duration)?audioEl.currentTime:demoCurrentTime;ct=Math.max(0,Math.min(d,ct+delta));if(tr.isUploaded&&tr.src&&audioEl.duration)audioEl.currentTime=ct;else demoCurrentTime=ct;updateProgressUI();updateLyricsPanel()}});
            progressBarOuter.addEventListener('pointerdown',e=>{progressDragging=!0;progressBarOuter.setPointerCapture(e.pointerId);const r=progressBarOuter.getBoundingClientRect();seekToPercent(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)))});
            document.addEventListener('pointermove',e=>{if(!progressDragging)return;const r=progressBarOuter.getBoundingClientRect();seekToPercent(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)))});
            document.addEventListener('pointerup',()=>{progressDragging=!1});
            volumeSlider.addEventListener('input',()=>{volume=parseInt(volumeSlider.value)/100;audioEl.volume=isMuted?0:volume});
            $('#btnVolume').addEventListener('click',()=>{isMuted=!isMuted;audioEl.volume=isMuted?0:volume;$('#btnVolume').textContent=isMuted?'🔇':'🔊'});
            btnPlay.addEventListener('click',togglePlay);$('#btnNext').addEventListener('click',nextTrack);$('#btnPrev').addEventListener('click',prevTrack);$('#carouselPrev').addEventListener('click',prevTrack);$('#carouselNext').addEventListener('click',nextTrack);
            btnShuffle.addEventListener('click',()=>{isShuffled=!isShuffled;if(isShuffled){shuffleOrder=[...Array(tracks.length).keys()];for(let i=shuffleOrder.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffleOrder[i],shuffleOrder[j]]=[shuffleOrder[j],shuffleOrder[i]]}}buildQueue();updatePlayerUI();showToast(isShuffled?'پخش تصادفی فعال':'پخش تصادفی غیرفعال','')});
            btnRepeat.addEventListener('click',()=>{const modes=['off','all','one'];repeatMode=modes[(modes.indexOf(repeatMode)+1)%3];updatePlayerUI();showToast({off:'تکرار غیرفعال',all:'تکرار همه',one:'تکرار یک آهنگ'}[repeatMode],'')});
            btnLike.addEventListener('click',()=>{const tr=getCurrentTrack();likedTracks.has(tr.id)?likedTracks.delete(tr.id):likedTracks.add(tr.id);updatePlayerUI();showToast(likedTracks.has(tr.id)?'❤️ به علاقه‌مندی‌ها اضافه شد':'از علاقه‌مندی‌ها حذف شد','')});
            $('#btnLyrics').addEventListener('click',()=>{updateLyricsPanel();openPanel('lyricsOverlay')});$('#btnQueue').addEventListener('click',()=>{renderQueuePanel();openPanel('queueOverlay')});$('#btnUpload').addEventListener('click',()=>openPanel('uploadOverlay'));
            document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;if(e.key==='ArrowLeft'){e.preventDefault();nextTrack()}else if(e.key==='ArrowRight'){e.preventDefault();prevTrack()}else if(e.key===' '){e.preventDefault();togglePlay()}});
            searchInput.addEventListener('input',()=>{const q=searchInput.value.trim().toLowerCase();searchResults.innerHTML='';if(!q){searchResults.classList.remove('active');return}const results=tracks.filter(t=>t.title.toLowerCase().includes(q)||t.artist.toLowerCase().includes(q)||t.genre.toLowerCase().includes(q));if(!results.length){searchResults.innerHTML='<div class="search-no-result">🎵 نتیجه‌ای پیدا نشد</div>'}else{results.forEach(tr=>{const item=document.createElement('div');item.className='search-result-item';item.setAttribute('role','option');item.innerHTML=`<div class="search-result-cover" style="${createArtworkStyle(tr.colors)}border-radius:8px;"></div><div class="search-result-info"><span class="search-result-title">${tr.title}</span><span class="search-result-artist">${tr.artist} · ${tr.genre}</span></div>`;item.addEventListener('click',()=>{const idx=tracks.indexOf(tr);if(idx>=0)selectTrack(idx);searchResults.classList.remove('active');searchInput.value=''})});searchResults.appendChild(item)}}searchResults.classList.add('active')});
            searchInput.addEventListener('focus',()=>{if(searchInput.value.trim())searchResults.classList.add('active')});
            document.addEventListener('click',e=>{if(!searchInput.contains(e.target)&&!searchResults.contains(e.target))searchResults.classList.remove('active')});
            const validateAudioFile=file=>{const validExt=['mp3','wav','ogg','m4a','aac','flac'];const ext=file.name.includes('.')?file.name.split('.').pop().toLowerCase():'';if(file.type&&(file.type.startsWith('audio/')||file.type==='audio/mpeg'||file.type==='audio/mp3'))return!0;if(validExt.includes(ext))return!0;return!1};
            const createTrackFromFile=file=>{const url=URL.createObjectURL(file);const title=file.name.replace(/\.[^.]+$/,'').replace(/[_-]/g,' ').replace(/\s+/g,' ').trim().substring(0,40)||'آهنگ بدون نام';const h=title.split('').reduce((a,c)=>a+c.charCodeAt(0),0);const hue=(h*41)%360;const colors=[`hsl(${hue},48%,12%)`,`hsl(${hue+35},42%,17%)`,`hsl(${hue+170},38%,7%)`,`hsl(${hue+18},52%,20%)`];const nt={id:'up_'+Date.now(),title,artist:'آپلود شما',album:'کتابخانه شخصی',duration:0,genre:'Unknown',mood:'Custom',badge:'Upload',colors,lyrics:[],isUploaded:!0,src:url,objectUrl:url,file};const tmp=new Audio();tmp.preload='metadata';tmp.src=url;tmp.addEventListener('loadedmetadata',()=>{nt.duration=tmp.duration&&isFinite(tmp.duration)?Math.round(tmp.duration):180;updatePlayerUI();renderQueuePanel()});tmp.addEventListener('error',()=>{nt.duration=180;updatePlayerUI()});return nt};
            const processFiles=files=>{if(!files||!files.length)return;let added=0;Array.from(files).forEach(f=>{if(!validateAudioFile(f)){showToast('⚠️ این فایل صوتی پشتیبانی نمی‌شود: '+f.name,'error');return}tracks.push(createTrackFromFile(f));added++});if(added){buildQueue();renderCarousel();renderShelves();updatePlayerUI();renderQueuePanel();closePanel('uploadOverlay');selectTrack(tracks.length-1);showToast('✅ آپلود با موفقیت انجام شد — '+added+' آهنگ','success')}};
            const dropZone=$('#dropZone'),fileInput=$('#fileInput');dropZone.addEventListener('click',()=>fileInput.click());dropZone.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();fileInput.click()}});fileInput.addEventListener('change',e=>processFiles(e.target.files));dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over')});dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');processFiles(e.dataTransfer.files)});
            const initApp=()=>{audioEl.volume=volume;buildQueue();renderCarousel();renderShelves();updatePlayerUI();updateProgressUI();selectTrack(0);pauseTrack();updatePlayerUI();showToast('🌌 به Cosmic Wave خوش آمدید — آهنگ‌های نمونه برای نمایش هستند. برای پخش واقعی، فایل MP3 خود را آپلود کنید.','')};initApp();
        })();
    </script>
