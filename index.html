                saveState();
            }

            function toggleLike() {
                const track = getTrack();
                track.liked = !track.liked;
                state.liked[track.id] = track.liked;
                updateLikeBtn();
                saveState();
            }

            function parseLRC(text) {
                const lines = text.split(/\r?\n/);
                const result = [];
                const re = /\[(\d{1,3}):(\d{2})(?:\.(\d{1,3}))?\]/;
                for (const line of lines) {
                    const m = line.match(re);
                    if (m) {
                        const mins = parseInt(m[1]);
                        const secs = parseInt(m[2]);
                        const ms = m[3] ? parseInt(m[3].padEnd(3, '0')) / 1000 : 0;
                        const time = mins * 60 + secs + ms;
                        const text = line.replace(re, '').trim();
                        if (text) result.push({ time, text });
                    }
                }
                result.sort((a, b) => a.time - b.time);
                return result.length > 0 ? result : null;
            }

            function getLyricsForTrack(track) {
                if (state.parsedLyricsCache[track.id]) return state.parsedLyricsCache[track.id];
                let parsed = null;
                if (track.lyrics && track.lyrics.length > 0) {
                    parsed = track.lyrics.map((text, i) => ({ time: (i / track.lyrics.length) * (track.duration || 180),
                        text }));
                }
                state.parsedLyricsCache[track.id] = parsed;
                return parsed;
            }

            function renderLyricsPanel() {
                const content = document.getElementById('lyricsContent');
                if (!content) return;
                const track = getTrack();
                const lyrics = getLyricsForTrack(track);
                let html = '';
                if (lyrics && lyrics.length) {
                    lyrics.forEach((l, i) => {
                        html += `<div class="lyric-line" data-index="${i}">${l.text}</div>`;
                    });
                } else {
                    html = '<div style="padding:40px;text-align:center;color:var(--muted)">No lyrics available</div>';
                }
                content.innerHTML = html;
                state.activeLyricIndex = -1;
                updateActiveLyric();
            }

            function updateActiveLyric() {
                const lines = document.querySelectorAll('#lyricsContent .lyric-line');
                if (!lines.length) return;
                const track = getTrack();
                const lyrics = getLyricsForTrack(track);
                if (!lyrics || !lyrics.length) return;
                let activeIdx = -1;
                for (let i = lyrics.length - 1; i >= 0; i--) {
                    if (state.currentTime >= lyrics[i].time) { activeIdx = i; break; }
                }
                if (activeIdx === state.activeLyricIndex) return;
                state.activeLyricIndex = activeIdx;
                lines.forEach((l, i) => {
                    l.classList.remove('active', 'prev');
                    if (i === activeIdx) l.classList.add('active');
                    else if (i < activeIdx) l.classList.add('prev');
                });
                if (activeIdx >= 0 && lines[activeIdx]) {
                    lines[activeIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }

            function renderQueuePanel() {
                const list = document.getElementById('queueList');
                if (!list) return;
                let html = '';
                state.tracks.forEach((t, i) => {
                    const isActive = i === state.currentIndex;
                    html += `
                <div class="queue-item${isActive?' active':''}" data-index="${i}">
                  <div class="search-mini-art">${createMiniArtHTML(t)}</div>
                  <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:12px;color:#fff">${t.title}</div><div style="font-size:10px;color:var(--muted)">${t.artist}</div></div>
                  <span style="font-size:10px;color:var(--faint)">${formatTime(t.duration||0)}</span>
                </div>`;
                });
                list.innerHTML = html;
                list.querySelectorAll('.queue-item').forEach(item => {
                    item.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.index);
                        if (!isNaN(idx)) {
                            setTrackByIndex(idx);
                            if (window.innerWidth <= 699) closePanel('queue');
                        }
                    });
                });
            }

            function renderSearchResults(query) {
                const container = document.getElementById('searchResults');
                if (!container) return;
                let results;
                if (!query || query.trim() === '') {
                    results = state.tracks.slice(0, 6);
                } else {
                    const q = query.toLowerCase().trim();
                    results = state.tracks.filter(t => t.title.toLowerCase().includes(q) || t.artist.toLowerCase()
                        .includes(q) || (t.album || '').toLowerCase().includes(q));
                }
                container.innerHTML = results.map(t => `
            <div class="search-result-item" data-index="${state.tracks.indexOf(t)}">
              <div class="search-mini-art">${createMiniArtHTML(t)}</div>
              <div style="flex:1;min-width:0"><div class="search-result-title">${t.title}</div><div class="search-result-artist">${t.artist} · ${t.album||''}</div></div>
            </div>`).join('') || '<div style="padding:30px;text-align:center;color:var(--muted)">No results</div>';
                container.querySelectorAll('.search-result-item').forEach(item => {
                    item.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.index);
                        if (!isNaN(idx)) {
                            setTrackByIndex(idx);
                            closePanel('search');
                        }
                    });
                });
            }

            function renderLibraryPanel() {
                const grid = document.getElementById('libraryGrid');
                if (!grid) return;
                const playlists = [
                    { icon: '🌌', title: 'Cosmic Focus', idx: 0 },
                    { icon: '💎', title: 'Glass Atmospheres', idx: 1 },
                    { icon: '❤️', title: 'Favorites', idx: -1, action: 'liked' },
                    { icon: '✅', title: 'Verified Artists', idx: -1, action: 'verified' }
                ];
                grid.innerHTML = playlists.map(p => `
            <div class="library-card" data-action="${p.action||''}" data-idx="${p.idx}">
              <div style="font-size:22px">${p.icon}</div>
              <div style="font-weight:600;font-size:12px;color:#fff">${p.title}</div>
            </div>`).join('');
                grid.querySelectorAll('.library-card').forEach(card => {
                    card.addEventListener('click', function() {
                        const action = this.dataset.action;
                        const idx = parseInt(this.dataset.idx);
                        if (action === 'liked') {
                            const liked = state.tracks.filter(t => t.liked);
                            if (liked.length) setTrackByIndex(state.tracks.indexOf(liked[0]));
                        } else if (action === 'verified') {
                            const ver = state.tracks.filter(t => t.verified);
                            if (ver.length) setTrackByIndex(state.tracks.indexOf(ver[0]));
                        } else if (!isNaN(idx) && idx >= 0 && idx < state.tracks.length) {
                            setTrackByIndex(idx);
                        }
                        closePanel('library');
                    });
                });
            }

            function openPanel(name) {
                const panelMap = {
                    search: 'searchOverlay',
                    queue: 'queuePanel',
                    lyrics: 'lyricsPanel',
                    library: 'libraryPanel',
                    creator: 'creatorPanel'
                };
                const el = document.getElementById(panelMap[name]);
                if (!el) return;
                closeAllPanels();
                el.classList.add('open');
                document.getElementById('overlayBackdrop').classList.add('visible');
                state.activePanel = name;
                if (name === 'search') { document.getElementById('searchInput').value = '';
                    renderSearchResults(''); }
                if (name === 'queue') renderQueuePanel();
                if (name === 'lyrics') renderLyricsPanel();
                if (name === 'library') renderLibraryPanel();
            }

            function closePanel(name) {
                const panelMap = {
                    search: 'searchOverlay',
                    queue: 'queuePanel',
                    lyrics: 'lyricsPanel',
                    library: 'libraryPanel',
                    creator: 'creatorPanel'
                };
                const el = document.getElementById(panelMap[name]);
                if (!el) return;
                el.classList.remove('open');
                if (state.activePanel === name) state.activePanel = null;
                document.getElementById('overlayBackdrop').classList.remove('visible');
            }

            function closeAllPanels() {
                ['searchOverlay', 'queuePanel', 'lyricsPanel', 'libraryPanel', 'creatorPanel'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.classList.remove('open');
                });
                state.activePanel = null;
                document.getElementById('overlayBackdrop').classList.remove('visible');
            }

            function parseID3v2(buffer) {
                try {
                    const view = new DataView(buffer);
                    if (view.getUint32(0) !== 0x494433) return null; // "ID3"
                    const ver = view.getUint8(3);
                    if (ver < 3 || ver > 4) return null;
                    const flags = view.getUint8(5);
                    const size = ((view.getUint8(6) & 0x7f) << 21) | ((view.getUint8(7) & 0x7f) << 14) | ((view
                        .getUint8(8) & 0x7f) << 7) | (view.getUint8(9) & 0x7f);
                    let offset = 10;
                    const end = offset + size;
                    if (end > buffer.byteLength) return null;
                    const meta = { title: '', artist: '', album: '', genre: '', year: '', coverMime: '',
                        coverBytes: null };
                    const textDecoder = new TextDecoder();
                    while (offset + 10 <= end) {
                        const frameId = String.fromCharCode(view.getUint8(offset), view.getUint8(offset + 1), view.getUint8(
                            offset + 2), view.getUint8(offset + 3));
                        const frameSize = view.getUint32(offset + 4);
                        if (frameSize <= 0 || offset + 10 + frameSize > end) break;
                        const headerSize = 10;
                        const frameData = new Uint8Array(buffer, offset + headerSize, frameSize);
                        if (frameId === 'TIT2') meta.title = parseTextFrame(frameData, textDecoder);
                        else if (frameId === 'TPE1') meta.artist = parseTextFrame(frameData, textDecoder);
                        else if (frameId === 'TALB') meta.album = parseTextFrame(frameData, textDecoder);
                        else if (frameId === 'TCON') meta.genre = parseTextFrame(frameData, textDecoder);
                        else if (frameId === 'TDRC' || frameId === 'TYER') meta.year = parseTextFrame(frameData,
                            textDecoder);
                        else if (frameId === 'APIC') {
                            const pic = parseAPIC(frameData);
                            if (pic) { meta.coverMime = pic.mime;
                                meta.coverBytes = pic.bytes; }
                        }
                        offset += headerSize + frameSize;
                    }
                    return meta;
                } catch (e) { return null; }
            }

            function parseTextFrame(data, decoder) {
                if (data.length < 2) return '';
                const enc = data[0];
                let text = '';
                if (enc === 0x01 || enc === 0x02) {
                    try { text = new TextDecoder('utf-16').decode(data.slice(1)); } catch (e) { text = decoder.decode(data
                            .slice(1)); }
                } else { text = decoder.decode(data.slice(1)); }
                return text.replace(/\0/g, '').trim();
            }

            function parseAPIC(data) {
                if (data.length < 10) return null;
                let idx = 1;
                const mimeEnd = Array.prototype.indexOf.call(data, 0, idx);
                if (mimeEnd === -1) return null;
                const mime = new TextDecoder().decode(data.slice(idx, mimeEnd));
                idx = mimeEnd + 2;
                const descEnd = Array.prototype.indexOf.call(data, 0, idx);
                if (descEnd === -1) return null;
                idx = descEnd + 1;
                const bytes = data.slice(idx);
                return { mime, bytes };
            }

            function parseFilename(fileName) {
                let name = fileName.replace(/\.[^.]+$/, '').replace(/_/g, ' ').trim();
                name = name.replace(/^\d+[\s.-]+/, '');
                const separators = [' - ', ' – ', ' — ', '-'];
                for (const sep of separators) {
                    if (name.includes(sep)) {
                        const parts = name.split(sep);
                        if (parts.length === 2) return { artist: parts[0].trim(), title: parts[1].trim() };
                        if (parts.length >= 3) return { artist: parts[0].trim(), album: parts[1].trim(), title: parts[2]
                                .trim() };
                    }
                }
                return { title: name, artist: 'Unknown Artist' };
            }

            async function parseAudioMetadataFromFile(file) {
                const result = { title: '', artist: '', album: '', genre: '', year: '', bpm: '', duration: 0,
                    coverBlob: null, coverUrl: '', palette: ['#38d7ff', '#2563eb', '#020617'], sourceMap: {} };
                const fn = parseFilename(file.name);
                result.title = fn.title || file.name;
                result.artist = fn.artist || 'Unknown Artist';
                if (fn.album) result.album = fn.album;
                if (file.type.startsWith('audio/mpeg')) {
                    const slice = file.slice(0, 2 * 1024 * 1024);
                    const buffer = await slice.arrayBuffer();
                    const id3 = parseID3v2(buffer);
                    if (id3) {
                        if (id3.title) result.title = id3.title;
                        if (id3.artist) result.artist = id3.artist;
                        if (id3.album) result.album = id3.album;
                        if (id3.genre) result.genre = id3.genre;
                        if (id3.year) result.year = id3.year;
                        if (id3.coverBytes) {
                            const blob = new Blob([id3.coverBytes], { type: id3.coverMime || 'image/jpeg' });
                            result.coverBlob = blob;
                            result.coverUrl = URL.createObjectURL(blob);
                            state.objectUrls.push(result.coverUrl);
                        }
                    }
                }
                const tempAudio = new Audio();
                tempAudio.src = URL.createObjectURL(file);
                state.objectUrls.push(tempAudio.src);
                return new Promise(resolve => {
                    tempAudio.addEventListener('loadedmetadata', () => {
                        result.duration = tempAudio.duration || 0;
                        resolve(result);
                    });
                    tempAudio.addEventListener('error', () => resolve(result));
                    setTimeout(() => resolve(result), 2000);
                });
            }

            function generateSlug(title) {
                return (title || 'track').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
            }

            async function handleFileSelect() {
                const file = document.getElementById('cfAudio').files[0];
                if (!file) return;
                const meta = await parseAudioMetadataFromFile(file);
                document.getElementById('cfTitle').value = meta.title;
                document.getElementById('cfArtist').value = meta.artist;
                document.getElementById('cfAlbum').value = meta.album || '';
                document.getElementById('cfGenre').value = meta.genre || '';
                document.getElementById('cfYear').value = meta.year || '2026';
                document.getElementById('cfQuality').value = 'Spatial';
                if (meta.coverUrl) {
                    const coverInput = document.getElementById('cfCover');
                    const dt = new DataTransfer();
                    if (meta.coverBlob) dt.items.add(new File([meta.coverBlob], 'cover.jpg', { type: meta.coverBlob.type ||
                            'image/jpeg' }));
                    coverInput.files = dt.files;
                }
                window._tempMeta = meta;
            }

            async function addImportedTrack() {
                const file = document.getElementById('cfAudio').files[0];
                if (!file) { showToast('Select an audio file first'); return; }
                const meta = window._tempMeta || await parseAudioMetadataFromFile(file);
                const title = document.getElementById('cfTitle').value.trim() || meta.title;
                const artist = document.getElementById('cfArtist').value.trim() || meta.artist;
                const album = document.getElementById('cfAlbum').value.trim() || meta.album || '';
                const genre = document.getElementById('cfGenre').value.trim() || meta.genre || '';
                const year = document.getElementById('cfYear').value.trim() || meta.year || '2026';
                const quality = document.getElementById('cfQuality').value;
                const coverFile = document.getElementById('cfCover').files[0];
                let coverSrc = meta.coverUrl || '';
                if (coverFile) {
                    if (coverSrc) URL.revokeObjectURL(coverSrc);
                    coverSrc = URL.createObjectURL(coverFile);
                    state.objectUrls.push(coverSrc);
                }
                const lyricsFile = document.getElementById('cfLyrics').files[0];
                let lyricsArr = [];
                if (lyricsFile) {
                    const text = await lyricsFile.text();
                    const parsed = parseLRC(text);
                    lyricsArr = parsed ? parsed.map(l => l.text) : text.split(/\r?\n/).filter(l => l.trim());
                }
                const slug = generateSlug(title);
                const newTrack = {
                    id: 'imported-' + Date.now(),
                    title,
                    artist,
                    album,
                    genre,
                    mood: '',
                    year: parseInt(year) || 2026,
                    duration: meta.duration || 0,
                    quality,
                    bpm: 120,
                    audioSrc: URL.createObjectURL(file),
                    coverSrc,
                    lyricsSrc: '',
                    palette: ['#38d7ff', '#2563eb', '#020617'],
                    verified: false,
                    lyrics: lyricsArr,
                    isImported: true
                };
                state.objectUrls.push(newTrack.audioSrc);
                state.tracks.push(newTrack);
                setTrackByIndex(state.tracks.length - 1);
                closePanel('creator');
                showToast(`Added: ${title} (temporary session)`);
            }

            function generateManifestJSON() {
                const title = document.getElementById('cfTitle').value.trim() || 'My Track';
                const artist = document.getElementById('cfArtist').value.trim() || 'Unknown';
                const album = document.getElementById('cfAlbum').value.trim() || '';
                const genre = document.getElementById('cfGenre').value.trim() || '';
                const year = document.getElementById('cfYear').value.trim() || '2026';
                const quality = document.getElementById('cfQuality').value;
                const slug = generateSlug(title);
                const entry = {
                    id: slug,
                    title,
                    artist,
                    album,
                    genre,
                    mood: '',
                    year: parseInt(year),
                    duration: window._tempMeta ? window._tempMeta.duration : 0,
                    quality,
                    bpm: 120,
                    audioSrc: `songs/${slug}.mp3`,
                    coverSrc: `covers/${slug}.jpg`,
                    lyricsSrc: `lyrics/${slug}.lrc`,
                    palette: ['#38d7ff', '#2563eb', '#020617'],
                    verified: false
                };
                return JSON.stringify(entry, null, 2);
            }

            function copyToClipboard(text) {
                if (navigator.clipboard) { navigator.clipboard.writeText(text).then(() => showToast(
                    'Copied!')); } else { const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    ta.remove();
                    showToast('Copied!'); }
            }

            function setupAudioEvents() {
                audio.addEventListener('loadstart', () => {
                    state.audioLoading = true;
                    state.audioError = false;
                    updateAudioStatusBadges();
                });
                audio.addEventListener('loadedmetadata', () => {
                    state.duration = audio.duration;
                    state.audioReady = true;
                    state.audioLoading = false;
                    updateAudioStatusBadges();
                    document.getElementById('timeDuration').textContent = formatTime(state.duration);
                    if (state.isPlaying) audio.play().catch(() => {});
                });
                audio.addEventListener('canplay', () => {
                    state.audioLoading = false;
                    updateAudioStatusBadges();
                });
                audio.addEventListener('timeupdate', () => {
                    if (!state.draggingSeek) {
                        state.currentTime = audio.currentTime;
                        updateProgressDisplay();
                        const now = Date.now();
                        if (now - state.lastTimeUpdate > 300) {
                            updateActiveLyric();
                            state.lastTimeUpdate = now;
                        }
                    }
                });
                audio.addEventListener('ended', () => {
                    if (state.repeat === 'one') {
                        audio.currentTime = 0;
                        audio.play().catch(() => {});
                    } else if (state.repeat === 'all' || state.shuffle || state.currentIndex < state.tracks.length -
                        1) {
                        nextTrack();
                    } else {
                        safePause();
                        state.currentTime = 0;
                        updateProgressDisplay();
                    }
                });
                audio.addEventListener('error', () => {
                    state.audioError = true;
                    state.audioLoading = false;
                    updateAudioStatusBadges();
                    showToast('Audio error. Skipping disabled. Tap to retry.');
                });
            }

            function setupProgressDrag() {
                const track = document.getElementById('progressTrack');
                track.addEventListener('pointerdown', function(e) {
                    state.draggingSeek = true;
                    track.classList.add('dragging');
                    track.setPointerCapture(e.pointerId);
                    const rect = track.getBoundingClientRect();
                    seekTo(clamp((e.clientX - rect.left) / rect.width, 0, 1));
                });
                track.addEventListener('pointermove', function(e) {
                    if (!state.draggingSeek) return;
                    const rect = track.getBoundingClientRect();
                    seekTo(clamp((e.clientX - rect.left) / rect.width, 0, 1));
                });
                track.addEventListener('pointerup', () => {
                    state.draggingSeek = false;
                    track.classList.remove('dragging');
                });
                track.addEventListener('pointercancel', () => {
                    state.draggingSeek = false;
                    track.classList.remove('dragging');
                });
            }

            function setupCarouselDrag() {
                const wrap = document.getElementById('carouselWrap');
                wrap.addEventListener('pointerdown', function(e) {
                    if (state.activePanel) return;
                    state.carouselDragStartX = e.clientX;
                    state.carouselDragDelta = 0;
                    state.carouselDragging = false;
                    wrap.setPointerCapture(e.pointerId);
                });
                wrap.addEventListener('pointermove', function(e) {
                    if (!wrap.hasPointerCapture(e.pointerId)) return;
                    state.carouselDragDelta = e.clientX - state.carouselDragStartX;
                    if (Math.abs(state.carouselDragDelta) > 6) state.carouselDragging = true;
                });
                wrap.addEventListener('pointerup', function() {
                    if (!state.carouselDragging) return;
                    if (Math.abs(state.carouselDragDelta) > 40) {
                        if (state.carouselDragDelta < -40) nextTrack();
                        else prevTrack();
                    }
                    state.carouselDragging = false;
                });
            }

            function setupWheelNav() {
                const wrap = document.getElementById('carouselWrap');
                wrap.addEventListener('wheel', function(e) {
                    if (state.activePanel || state.draggingSeek || state.carouselDragging) return;
                    if (Date.now() - (setupWheelNav._last || 0) < 500) return;
                    setupWheelNav._last = Date.now();
                    if (e.deltaY > 25 || e.deltaX > 25) nextTrack();
                    else if (e.deltaY < -25 || e.deltaX < -25) prevTrack();
                }, { passive: true });
            }

            function setupKeyboard() {
                document.addEventListener('keydown', function(e) {
                    const active = document.activeElement;
                    const isTyping = active && (active.tagName === 'INPUT' || active.tagName ===
                        'TEXTAREA' || active.isContentEditable);
                    if (e.key === 'Escape') { e.preventDefault();
                        closeAllPanels(); return; }
                    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault();
                        openPanel('search'); return; }
                    if (isTyping) return;
                    switch (e.key) {
                        case ' ':
                            e.preventDefault();
                            togglePlay();
                            break;
                        case 'ArrowRight':
                            e.preventDefault();
                            nextTrack();
                            break;
                        case 'ArrowLeft':
                            e.preventDefault();
                            prevTrack();
                            break;
                        case 'ArrowUp':
                            e.preventDefault();
                            setVolume(Math.min(1, state.volume + .05));
                            break;
                        case 'ArrowDown':
                            e.preventDefault();
                            setVolume(Math.max(0, state.volume - .05));
                            break;
                        case 'm':
                        case 'M':
                            e.preventDefault();
                            toggleMute();
                            break;
                        case 'l':
                        case 'L':
                            e.preventDefault();
                            openPanel('lyrics');
                            break;
                        case 'q':
                        case 'Q':
                            e.preventDefault();
                            openPanel('queue');
                            break;
                        case 'h':
                        case 'H':
                            e.preventDefault();
                            openPanel('library');
                            break;
                        case 'c':
                        case 'C':
                            e.preventDefault();
                            openPanel('creator');
                            break;
                        case 'f':
                        case 'F':
                            e.preventDefault();
                            toggleLike();
                            break;
                    }
                });
            }

            async function loadManifest() {
                try {
                    const resp = await fetch('songs/manifest.json', { cache: 'no-store' });
                    if (!resp.ok) throw new Error('Not found');
                    const data = await resp.json();
                    if (data && Array.isArray(data.tracks) && data.tracks.length > 0) {
                        state.tracks = data.tracks.map((t, i) => ({
                            id: t.id || 'track-' + i,
                            title: t.title || 'Untitled',
                            artist: t.artist || 'Unknown',
                            album: t.album || '',
                            genre: t.genre || '',
                            mood: t.mood || '',
                            year: t.year || 2026,
                            duration: t.duration || 0,
                            quality: t.quality || 'Lossless',
                            bpm: t.bpm || 120,
                            audioSrc: t.audioSrc || '',
                            coverSrc: t.coverSrc || '',
                            lyricsSrc: t.lyricsSrc || '',
                            palette: t.palette || ['#38d7ff', '#2563eb', '#020617'],
                            verified: t.verified === true,
                            lyrics: t.lyrics || [],
                            liked: false
                        }));
                        state.currentIndex = 0;
                    } else throw new Error('Invalid manifest');
                } catch (e) {
                    state.tracks = FALLBACK_TRACKS.map(t => ({ ...t, liked: false }));
                    state.currentIndex = 0;
                }
            }

            function createParticles() {
                const layer = document.getElementById('particleLayer');
                if (!layer) return;
                layer.innerHTML = '';
                if (state.performanceProfile === 'low') return;
                const count = state.performanceProfile === 'medium' ? 8 : 16;
                const frag = document.createDocumentFragment();
                for (let i = 0; i < count; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = Math.random() * 100 + '%';
                    p.style.top = Math.random() * 100 + '%';
                    p.style.width = (Math.random() * 2 + 1) + 'px';
                    p.style.height = p.style.width;
                    p.style.animationDuration = (Math.random() * 12 + 8) + 's';
                    p.style.animationDelay = Math.random() * 8 + 's';
                    frag.appendChild(p);
                }
                layer.appendChild(frag);
            }

            function init() {
                loadState();
                detectPerformanceProfile();
                loadManifest().then(() => {
                    updatePlayerUI();
                    renderCarousel();
                    renderQueuePanel();
                    renderLyricsPanel();
                    renderLibraryPanel();
                    renderSearchResults('');
                    setDynamicPalette(getTrack());
                    createParticles();
                    setupAudioEvents();
                    setupProgressDrag();
                    setupCarouselDrag();
                    setupWheelNav();
                    setupKeyboard();
                    document.getElementById('btnPlay').addEventListener('click', togglePlay);
                    document.getElementById('btnPrev').addEventListener('click', prevTrack);
                    document.getElementById('btnNext').addEventListener('click', nextTrack);
                    document.getElementById('btnBack').addEventListener('click', prevTrack);
                    document.getElementById('btnForward').addEventListener('click', nextTrack);
                    document.getElementById('btnShuffle').addEventListener('click', toggleShuffle);
                    document.getElementById('btnRepeat').addEventListener('click', cycleRepeat);
                    document.getElementById('btnLike').addEventListener('click', toggleLike);
                    document.getElementById('btnMute').addEventListener('click', toggleMute);
                    document.getElementById('volumeSlider').addEventListener('input', function() {
                        setVolume(parseInt(this.value) / 100);
                    });
                    document.getElementById('btnSearch').addEventListener('click', () => openPanel('search'));
                    document.getElementById('btnQueue').addEventListener('click', () => openPanel('queue'));
                    document.getElementById('btnQueuePanel').addEventListener('click', () => openPanel('queue'));
                    document.getElementById('btnLyrics').addEventListener('click', () => openPanel('lyrics'));
                    document.getElementById('btnLyricsPanel').addEventListener('click', () => openPanel('lyrics'));
                    document.getElementById('btnLibrary').addEventListener('click', () => openPanel('library'));
                    document.getElementById('btnCreator').addEventListener('click', () => openPanel('creator'));
                    document.getElementById('btnCloseQueue').addEventListener('click', () => closePanel('queue'));
                    document.getElementById('btnCloseLyrics').addEventListener('click', () => closePanel('lyrics'));
                    document.getElementById('btnCloseLibrary').addEventListener('click', () => closePanel('library'));
                    document.getElementById('btnCloseCreator').addEventListener('click', () => closePanel('creator'));
                    document.getElementById('overlayBackdrop').addEventListener('click', closeAllPanels);
                    document.getElementById('searchInput').addEventListener('input', function() {
                        renderSearchResults(this.value);
                    });
                    document.getElementById('cfAudio').addEventListener('change', handleFileSelect);
                    document.getElementById('btnAddTempTrack').addEventListener('click', addImportedTrack);
                    document.getElementById('btnCopyManifest').addEventListener('click', () => {
                        const json = generateManifestJSON();
                        document.getElementById('manifestPreview').textContent = json;
                        document.getElementById('manifestPreview').style.display = 'block';
                        copyToClipboard(json);
                    });
                    document.body.addEventListener('click', function() { state.userInteracted = true; }, { once: true });
                    window.addEventListener('resize', () => { detectPerformanceProfile();
                        renderCarousel(); });
                    if (state.isPlaying && audio.src) { safePlay(); }
                    announce('Auralis Vision Ultra ready');
                });
            }
            document.addEventListener('DOMContentLoaded', init);
            window.addEventListener('beforeunload', () => {
                state.objectUrls.forEach(url => URL.revokeObjectURL(url));
            });
        })();
    </script>
