<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مدار آبی - Spatial Music</title>
    <style>
        :root {
            --bg: #080c14;
            --panel: rgba(12, 18, 28, 0.75);
            --glass: rgba(16, 22, 36, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #4da8da;
            --accent-rgb: 77, 168, 218;
            --glow: rgba(77, 168, 218, 0.45);
            --fog-tint: rgba(30, 60, 100, 0.18);
            --grid-color: rgba(77, 168, 218, 0.15);
            --text: #e8ecf2;
            --muted: #8899b4;
            --danger: #e0556a;
            --radius-xl: 28px;
            --shadow-glass: 0 8px 40px rgba(0, 0, 0, 0.55);
            --card-w: clamp(160px, 20vw, 280px);
            --card-h: calc(var(--card-w) * 1.5);
            --perspective: 1400px;
            --font-stack: 'Inter', 'SF Pro Display', 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }
        body {
            font-family: var(--font-stack);
            background: var(--bg);
            color: var(--text);
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            -webkit-overflow-scrolling: none;
            touch-action: manipulation;
        }
        #app {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: var(--perspective);
            perspective-origin: 50% 48%;
        }
        canvas#spaceCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 45%, rgba(20, 50, 90, 0.5) 0%, rgba(6, 10, 20, 0.9) 55%, #040810 100%);
            transition: background 1.5s ease;
        }
        .volumetric-fog {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: var(--fog-tint);
            opacity: 0.35;
            animation: fogDrift 18s ease-in-out infinite;
            transition: background 2s ease;
        }
        @keyframes fogDrift {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(1.5vw, -0.5vh) scale(1.04);
            }
            50% {
                transform: translate(-1vw, 1vh) scale(0.97);
            }
            75% {
                transform: translate(-1.5vw, -0.8vh) scale(1.03);
            }
        }
        .grid-floor {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) perspective(800px) rotateX(62deg);
            width: 180vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: linear-gradient(to top, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.15) 35%, transparent 70%);
            -webkit-mask-image: linear-gradient(to top, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.15) 35%, transparent 70%);
            transition: background-image 2s ease;
            transform-origin: bottom center;
        }
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(2, 4, 10, 0.7) 100%);
        }
        .film-grain {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }
        .top-bar {
            position: fixed;
            top: clamp(12px, 2.5vh, 28px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: clamp(300px, 72vw, 820px);
            padding: 10px 20px;
            background: var(--glass);
            backdrop-filter: blur(28px) saturate(140%);
            -webkit-backdrop-filter: blur(28px) saturate(140%);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            box-shadow: var(--shadow-glass), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transition: background 0.8s ease, border-color 0.8s ease;
        }
        @supports not (backdrop-filter: blur(28px)) {
            .top-bar {
                background: rgba(10, 16, 26, 0.88);
            }
        }
        .top-left,
        .top-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .top-center {
            flex: 1;
            text-align: center;
            min-width: 0;
            padding: 0 12px;
        }
        .current-title-top {
            font-size: clamp(0.8rem, 1.4vw, 1rem);
            font-weight: 600;
            letter-spacing: 0.03em;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.6s ease;
        }
        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: background 0.25s, color 0.25s, transform 0.2s;
            flex-shrink: 0;
            position: relative;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .icon-btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }
        .icon-btn:active {
            transform: scale(0.9);
        }
        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        main.stage {
            position: relative;
            z-index: 5;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            pointer-events: none;
        }
        .carousel-scene {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            pointer-events: auto;
        }
        .carousel-track {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
        }
        .album-card {
            position: absolute;
            width: var(--card-w);
            height: var(--card-h);
            border-radius: var(--radius-xl);
            overflow: hidden;
            cursor: pointer;
            transition: none;
            will-change: transform, opacity, filter;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06);
            transform-style: preserve-3d;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }
        .album-card:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 6px;
            z-index: 20 !important;
        }
        .album-card .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: inherit;
            overflow: hidden;
            background: #0a0f18;
        }
        .album-card .card-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: inherit;
        }
        .album-card .card-art-fallback {
            width: 100%;
            height: 100%;
            display: none;
            border-radius: inherit;
        }
        .album-card .card-gloss {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.08) 0%, transparent 35%, transparent 65%, rgba(0, 0, 0, 0.35) 100%);
            z-index: 2;
        }
        .album-card .card-reflection {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            z-index: 3;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.06) 0%, transparent 40%);
        }
        .album-card .card-edge-glow {
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            box-shadow: 0 0 30px 6px var(--glow), inset 0 0 20px 3px rgba(255, 255, 255, 0.04);
            transition: opacity 0.7s ease;
        }
        .album-card.active .card-edge-glow {
            opacity: 1;
        }
        .album-card .card-text {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 4;
            padding: clamp(16px, 3vh, 28px) 14px 12px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.4) 55%, transparent 100%);
            border-radius: 0 0 var(--radius-xl) var(--radius-xl);
            pointer-events: none;
            text-align: center;
        }
        .album-card .card-title {
            font-size: clamp(0.75rem, 1.3vw, 0.95rem);
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #fff;
            line-height: 1.3;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
        }
        .album-card .card-artist {
            font-size: clamp(0.6rem, 1vw, 0.72rem);
            font-weight: 500;
            color: rgba(255, 255, 255, 0.78);
            letter-spacing: 0.03em;
            margin-top: 2px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }
        .orbital-halos {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }
        .halo-ring {
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: border-color 0.8s ease;
        }
        .shockwave-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 2;
        }
        .shockwave-pulse {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--accent);
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
        }
        canvas#waveformCanvas {
            position: absolute;
            bottom: clamp(90px, 15vh, 140px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            pointer-events: none;
            width: clamp(240px, 50vw, 500px);
            height: 48px;
            opacity: 0.55;
        }
        .playback-bar {
            position: fixed;
            bottom: clamp(10px, 2vh, 24px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            display: flex;
            align-items: center;
            gap: clamp(8px, 1.5vw, 18px);
            width: clamp(340px, 76vw, 860px);
            padding: 10px 18px;
            background: var(--glass);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            box-shadow: var(--shadow-glass), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: background 0.8s ease;
        }
        @supports not (backdrop-filter: blur(30px)) {
            .playback-bar {
                background: rgba(10, 16, 26, 0.9);
            }
        }
        .now-playing {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            min-width: 0;
        }
        .now-playing .thumbnail {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        }
        .now-playing .meta {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .now-playing .track-title {
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }
        .now-playing .track-artist {
            font-size: 0.68rem;
            font-weight: 400;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .transport {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .transport .icon-btn.play-btn {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 1.3rem;
        }
        .progress-area {
            flex: 1;
            min-width: 60px;
            display: flex;
            align-items: center;
            position: relative;
            height: 44px;
            cursor: pointer;
            touch-action: none;
        }
        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 4px;
            position: relative;
            overflow: visible;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            width: 0%;
            transition: background 0.6s ease;
            box-shadow: 0 0 10px var(--glow);
        }
        .progress-thumb {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid var(--accent);
            cursor: pointer;
            z-index: 2;
            box-shadow: 0 0 10px var(--glow);
            left: 0%;
            pointer-events: auto;
            touch-action: none;
        }
        .playback-actions {
            display: flex;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }
        .queue-panel {
            position: fixed;
            right: clamp(8px, 2vw, 24px);
            top: 50%;
            transform: translateY(-50%) translateX(120%);
            z-index: 35;
            width: clamp(200px, 26vw, 300px);
            background: var(--panel);
            backdrop-filter: blur(34px) saturate(140%);
            -webkit-backdrop-filter: blur(34px) saturate(140%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 16px;
            box-shadow: var(--shadow-glass);
            transition: transform 0.45s cubic-bezier(0.22, 0.61, 0.36, 1);
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 60vh;
            overflow-y: auto;
        }
        .queue-panel.open {
            transform: translateY(-50%) translateX(0);
        }
        .queue-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.2s;
            background: rgba(255, 255, 255, 0.03);
            min-height: 44px;
        }
        .queue-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .queue-item .qi-thumb {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .queue-item .qi-info {
            min-width: 0;
        }
        .queue-item .qi-title {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .queue-item .qi-artist {
            font-size: 0.65rem;
            color: var(--muted);
        }
        .toast-region {
            position: fixed;
            top: clamp(70px, 12vh, 100px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .toast {
            padding: 10px 22px;
            background: var(--panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: var(--text);
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            opacity: 0;
            transform: translateY(-12px);
            transition: all 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            white-space: nowrap;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .ripple-layer {
            position: fixed;
            inset: 0;
            z-index: 45;
            pointer-events: none;
        }
        .ripple {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.35);
            animation: rippleOut 0.7s ease-out forwards;
            pointer-events: none;
        }
        @keyframes rippleOut {
            0% {
                width: 0;
                height: 0;
                opacity: 0.8;
            }
            100% {
                width: 120px;
                height: 120px;
                opacity: 0;
                margin-left: -60px;
                margin-top: -60px;
            }
        }
        @media (max-width: 768px) {
            :root {
                --card-w: clamp(120px, 28vw, 180px);
                --perspective: 1000px;
            }
            .top-bar {
                width: 92vw;
                padding: 8px 14px;
                border-radius: 40px;
            }
            .playback-bar {
                width: 94vw;
                padding: 8px 12px;
                gap: 6px;
                border-radius: 40px;
            }
            .now-playing .meta {
                display: none;
            }
            .playback-actions {
                gap: 0;
            }
            .icon-btn {
                width: 38px;
                height: 38px;
                font-size: 0.95rem;
            }
            .transport .icon-btn.play-btn {
                width: 42px;
                height: 42px;
            }
            canvas#waveformCanvas {
                bottom: 80px;
                width: 70vw;
                height: 36px;
            }
        }
        @media (max-width: 480px) {
            :root {
                --card-w: clamp(90px, 32vw, 130px);
                --perspective: 800px;
            }
            .top-bar {
                width: 96vw;
                padding: 7px 10px;
                border-radius: 34px;
            }
            .top-left,
            .top-right {
                gap: 2px;
            }
            .playback-bar {
                width: 96vw;
                padding: 7px 10px;
                gap: 4px;
                border-radius: 34px;
            }
            .progress-area {
                min-width: 30px;
            }
            .icon-btn {
                width: 34px;
                height: 34px;
                font-size: 0.85rem;
            }
            .transport .icon-btn.play-btn {
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }
            .now-playing .thumbnail {
                width: 34px;
                height: 34px;
                border-radius: 8px;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            .volumetric-fog {
                animation: none;
            }
            .shockwave-pulse {
                display: none;
            }
            .halo-ring {
                animation: none !important;
            }
            .album-card {
                transition: transform 0.3s ease, opacity 0.3s ease !important;
            }
            .ripple {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="app" class="app-shell">
        <canvas id="spaceCanvas" aria-hidden="true"></canvas>
        <div class="bg-gradient"></div>
        <div class="volumetric-fog"></div>
        <div class="grid-floor"></div>
        <div class="vignette"></div>
        <div class="film-grain"></div>
        <header class="top-bar" role="banner">
            <nav class="top-left" aria-label="Navigation">
                <button class="icon-btn" aria-label="Menu" tabindex="0">☰</button>
            </nav>
            <div class="top-center">
                <span class="current-title-top" aria-live="polite">مدار آبی</span>
            </div>
            <div class="top-right">
                <button class="icon-btn" aria-label="Settings" tabindex="0">⚙</button>
            </div>
        </header>
        <main class="stage" role="main" aria-label="Music Carousel">
            <section class="carousel-scene" aria-label="Album Carousel">
                <div class="carousel-track" id="carouselTrack"></div>
                <div class="orbital-halos" id="orbitalHalos"></div>
                <div class="shockwave-layer" id="shockwaveLayer"></div>
                <canvas id="waveformCanvas" aria-hidden="true"></canvas>
            </section>
        </main>
        <aside class="queue-panel" id="queuePanel" role="complementary" aria-label="Queue">
            <div style="font-weight:600;font-size:0.9rem;color:var(--text);padding:4px 0;">صف پخش</div>
            <div id="queueList"></div>
        </aside>
        <footer class="playback-bar" role="region" aria-label="Playback Controls">
            <div class="now-playing">
                <img class="thumbnail" id="pbThumb" src="" alt="Album art" width="44" height="44" loading="eager">
                <div class="meta">
                    <div class="track-title" id="pbTitle">مدار آبی</div>
                    <div class="track-artist" id="pbArtist">آرش</div>
                </div>
            </div>
            <div class="transport">
                <button class="icon-btn" id="btnPrev" aria-label="Previous track">⏮</button>
                <button class="icon-btn play-btn" id="btnPlay" aria-label="Play" aria-pressed="false">▶</button>
                <button class="icon-btn" id="btnNext" aria-label="Next track">⏭</button>
            </div>
            <div class="progress-area" id="progressArea" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
                <div class="progress-track">

    <script>

            const AppState = {
                activeTrackIndex: 0,

                duration: tracks[0].duration,
                visualMode: 'spatial',
                audioUnlocked: false,
                lowPower: false,

            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) AppState.reducedMotion = true;
            if (navigator.hardwareConcurrency && navigator.hardwareConcurrency < 4) AppState.lowPower = true;
            if (window.innerWidth < 480) AppState.lowPower = true;

            const dom = {
                carouselTrack: document.getElementById('carouselTrack'),
                orbitalHalos: document.getElementById('orbitalHalos'),
                shockwaveLayer: document.getElementById('shockwaveLayer'),
                waveformCanvas: document.getElementById('waveformCanvas'),

                progressThumb: document.getElementById('progressThumb'),
                progressArea: document.getElementById('progressArea'),
                btnPlay: document.getElementById('btnPlay'),
                btnPrev: document.getElementById('btnPrev'),
                btnNext: document.getElementById('btnNext'),
                btnQueue: document.getElementById('btnQueue'),
                btnLyrics: document.getElementById('btnLyrics'),
                btnVolume: document.getElementById('btnVolume'),
                queuePanel: document.getElementById('queuePanel'),
                queueList: document.getElementById('queueList'),
                toastRegion: document.getElementById('toastRegion'),
                rippleLayer: document.getElementById('rippleLayer'),
                topTitle: document.querySelector('.current-title-top'),
                bgGradient: document.querySelector('.bg-gradient'),
                volumetricFog: document.querySelector('.volumetric-fog'),
                gridFloor: document.querySelector('.grid-floor'),
            };

            let cardElements = [];
            let audioCtx = null;
            let analyser = null;
            let audioSource = null;
            let gainNode = null;
            let procNodes = [];
            let analyserDataArray = null;
            let analyserFreqArray = null;
            let beatEnergyHistory = [];
            let beatCooldown = 0;
            let beatThreshold = 0;
            let simulatedAnalyserData = new Uint8Array(128).fill(10);
            let simulatedFreqData = new Uint8Array(64).fill(8);
            let spaceParticles = [];
            let threeRenderer = null;
            let threeScene = null;
            let threeCamera = null;
            let threeParticles = null;
            let rafId = null;
            let lastTime = 0;
            let fogPhase = 0;
            let starfieldTime = 0;

            function buildSlotTransform(slotOffset) {
                const cfg = SLOT_CONFIG[String(slotOffset)];
                return {
                    x: cfg.x,
                    y: cfg.y,
                    z: cfg.z,
                    rotateY: cfg.ry,
                    rotateZ: cfg.rz,
                    scale: cfg.scale,
                    opacity: cfg.opacity,
                    blur: cfg.blur,
                    brightness: cfg.brightness,
                    zIndex: cfg.zIndex
                };
            }

            function getTrackForSlot(slotOffset) {
                return tracks[(AppState.activeTrackIndex + slotOffset + TOTAL_TRACKS) % TOTAL_TRACKS];
            }

            function createCardElement(slotOffset) {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.setAttribute('role', 'button');
                card.setAttribute('aria-label', 'Album card');
                card.setAttribute('tabindex', '0');
                card.dataset.slotOffset = slotOffset;
                card.innerHTML = `
                    <div class="card-inner">
                        <img class="card-art" src="" alt="" loading="eager" crossorigin="anonymous">
                        <canvas class="card-art-fallback" width="300" height="450"></canvas>
                        <div class="card-gloss"></div>
                        <div class="card-reflection"></div>
                        <div class="card-edge-glow"></div>
                        <div class="card-text">
                            <div class="card-title"></div>
                            <div class="card-artist"></div>
                        </div>
                    </div>`;
                card.addEventListener('click', () => onCardClick(slotOffset));
                card.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault();
                        onCardClick(slotOffset); } });
                return card;
            }

            function initCarouselDOM() {
                dom.carouselTrack.innerHTML = '';
                cardElements = [];
                SLOT_OFFSETS.forEach(offset => {
                    const card = createCardElement(offset);
                    dom.carouselTrack.appendChild(card);
                    cardElements.push({ el: card, slotOffset: offset });
                });
                updateAllCardContent();
                applyAllSlotTransforms(false);
            }

            function updateCardContent(cardEl, track) {
                const img = cardEl.querySelector('.card-art');
                const fallbackCanvas = cardEl.querySelector('.card-art-fallback');
                const titleEl = cardEl.querySelector('.card-title');
                const artistEl = cardEl.querySelector('.card-artist');
                titleEl.textContent = track.title;
                artistEl.textContent = track.artist;
                cardEl.setAttribute('aria-label', track.title + ' - ' + track.artist);
                img.alt = track.title;
                img.src = track.artUrl;
                img.style.display = 'block';
                fallbackCanvas.style.display = 'none';
                img.onerror = function() {
                    img.style.display = 'none';
                    fallbackCanvas.style.display = 'block';
                    generateFallbackArt(fallbackCanvas, track);
                };
                img.onload = function() {
                    img.style.display = 'block';
                    fallbackCanvas.style.display = 'none';
                };
            }

            function updateAllCardContent() {
                cardElements.forEach(({ el, slotOffset }) => {
                    const track = getTrackForSlot(slotOffset);
                    updateCardContent(el, track);
                });
                updateActiveCardHighlight();
            }

            function updateActiveCardHighlight() {
                cardElements.forEach(({ el, slotOffset }) => {
                    el.classList.toggle('active', slotOffset === 0);
                });
            }

            function applySlotTransform(el, slotOffset, animate = true) {
                const cfg = buildSlotTransform(slotOffset);
                const props = {
                    x: cfg.x,
                    y: cfg.y,
                    z: cfg.z,
                    rotateY: cfg.rotateY,
                    rotateZ: cfg.rotateZ,
                    scale: cfg.scale,
                    opacity: cfg.opacity,
                    filter: `blur(${cfg.blur}) brightness(${cfg.brightness})`,
                    zIndex: cfg.zIndex
                };
                if (animate && HAS_GSAP && !AppState.reducedMotion) {
                    gsap.to(el, {
                        x: cfg.x,
                        y: cfg.y,
                        z: cfg.z,
                        rotateY: cfg.rotateY,
                        rotateZ: cfg.rotateZ,
                        scale: cfg.scale,
                        opacity: cfg.opacity,
                        filter: `blur(${cfg.blur}) brightness(${cfg.brightness})`,
                        zIndex: cfg.zIndex,
                        duration: 0.8,
                        ease: 'power3.out',
                        overwrite: 'auto'
                    });
                } else {
                    el.style.transform =
                        `translate3d(${cfg.x}, ${cfg.y}, ${cfg.z}) rotateY(${cfg.rotateY}) rotateZ(${cfg.rotateZ}) scale(${cfg.scale})`;
                    el.style.opacity = cfg.opacity;
                    el.style.filter = `blur(${cfg.blur}) brightness(${cfg.brightness})`;
                    el.style.zIndex = cfg.zIndex;
                }
            }

            function applyAllSlotTransforms(animate = true) {
                cardElements.forEach(({ el, slotOffset }) => {
                    applySlotTransform(el, slotOffset, animate);
                });
            }

            function onCardClick(slotOffset) {
                if (slotOffset === 0) return;
                const steps = slotOffset;
                const newIndex = (AppState.activeTrackIndex + steps + TOTAL_TRACKS) % TOTAL_TRACKS;
                navigateToTrack(newIndex, steps > 0 ? 'right' : 'left');
            }

            function navigateToTrack(newIndex, direction = 'right') {
                if (newIndex === AppState.activeTrackIndex) return;
                AppState.activeTrackIndex = newIndex;
                AppState.progress = 0;
                AppState.duration = tracks[newIndex].duration;
                updateAllCardContent();
                applyAllSlotTransforms(true);
                updatePlaybackBarUI();
                updateTopBar();
                triggerShockwave();
                triggerLightTrail(direction);
                updateTheme();
                restartProceduralAudio();
                showToast(tracks[newIndex].title + ' - ' + tracks[newIndex].artist);
                if (AppState.queueOpen) renderQueuePanel();
            }

            function navigateNext() {
                const newIndex = (AppState.activeTrackIndex + 1) % TOTAL_TRACKS;
                navigateToTrack(newIndex, 'right');
            }

            function navigatePrev() {
                const newIndex = (AppState.activeTrackIndex - 1 + TOTAL_TRACKS) % TOTAL_TRACKS;
                navigateToTrack(newIndex, 'left');
            }

            function updatePlaybackBarUI() {
                const track = tracks[AppState.activeTrackIndex];
                dom.pbTitle.textContent = track.title;
                dom.pbArtist.textContent = track.artist;
                dom.pbThumb.src = track.artUrl;
                dom.pbThumb.alt = track.title;
                dom.pbThumb.onerror = function() {
                    const fallbackCanvas = document.createElement('canvas');
                    fallbackCanvas.width = 88;
                    fallbackCanvas.height = 88;
                    generateFallbackArt(fallbackCanvas, track);
                    dom.pbThumb.src = fallbackCanvas.toDataURL();
                };
                updateProgressUI();
            }

            function updateTopBar() {
                dom.topTitle.textContent = tracks[AppState.activeTrackIndex].title;
            }

            function updateProgressUI() {
                const pct = AppState.duration > 0 ? (AppState.progress / AppState.duration) * 100 : 0;
                const clamped = Math.min(100, Math.max(0, pct));
                dom.progressFill.style.width = clamped + '%';
                dom.progressThumb.style.left = clamped + '%';
                dom.progressArea.setAttribute('aria-valuenow', Math.round(clamped));
            }

            function triggerShockwave() {
                if (AppState.reducedMotion) return;
                const pulse = document.createElement('div');
                pulse.className = 'shockwave-pulse';
                dom.shockwaveLayer.appendChild(pulse);
                const size = clampVal(180, 340, window.innerWidth * 0.35);
                if (HAS_GSAP) {
                    gsap.fromTo(pulse, { width: 0, height: 0, opacity: 0.7, borderWidth: 3 }, {
                        width: size,
                        height: size,
                        opacity: 0,
                        borderWidth: 0.5,
                        duration: 0.9,
                        ease: 'power2.out',
                        onComplete: () => pulse.remove()
                    });
                } else {
                    pulse.style.transition = 'all 0.9s ease-out';
                    requestAnimationFrame(() => {
                        pulse.style.width = size + 'px';
                        pulse.style.height = size + 'px';
                        pulse.style.opacity = '0';
                        pulse.style.borderWidth = '0.5px';
                    });
                    setTimeout(() => pulse.remove(), 950);
                }
            }

            function triggerLightTrail(direction) {
                if (AppState.reducedMotion) return;
                const trail = document.createElement('div');
                trail.style.cssText = `
                    position:fixed;pointer-events:none;z-index:3;top:50%;left:50%;
                    width:60px;height:4px;border-radius:4px;
                    background:linear-gradient(90deg, transparent, var(--accent), transparent);
                    opacity:0.7;transform:translate(-50%,-50%) translateX(${direction==='right'?'-30px':'30px'});
                    transition:all 0.7s ease-out;
                `;
                document.body.appendChild(trail);
                requestAnimationFrame(() => {
                    trail.style.transform =
                        `translate(-50%,-50%) translateX(${direction==='right'?'80px':'-80px'})`;
                    trail.style.opacity = '0';
                });
                setTimeout(() => trail.remove(), 750);
            }

            function showToast(msg) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = msg;
                dom.toastRegion.appendChild(toast);
                requestAnimationFrame(() => toast.classList.add('show'));
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 400);
                }, 1800);
            }

            function triggerRipple(x, y) {
                if (AppState.reducedMotion) return;
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                dom.rippleLayer.appendChild(ripple);
                setTimeout(() => ripple.remove(), 750);
            }

            function generateFallbackArt(canvas, track) {
                const ctx = canvas.getContext('2d');
                const w = canvas.width;
                const h = canvas.height;
                const pal = track.palette || [30, 50, 100];
                const grad = ctx.createLinearGradient(0, 0, w, h);
                grad.addColorStop(0, `rgb(${pal[0]},${pal[1]},${pal[2]})`);
                grad.addColorStop(0.5, `rgb(${Math.min(255,pal[0]+30)},${Math.min(255,pal[1]+40)},${Math.min(255,pal[2]+50)})`);
                grad.addColorStop(1, `rgb(${Math.max(0,pal[0]-15)},${Math.max(0,pal[1]-10)},${Math.max(0,pal[2]-20)})`);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);
                ctx.fillStyle = 'rgba(255,255,255,0.04)';
                for (let i = 0; i < 20; i++) {
                    ctx.beginPath();
                    ctx.arc(w * (0.2 + (track.seed.charCodeAt(i % track.seed.length) / 255) * 0.6), h * (0.2 + (track
                        .seed.charCodeAt((i + 5) % track.seed.length) / 255) * 0.6), w * 0.08, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(0, h * 0.7, w, h * 0.3);
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${w*0.06}px ${getComputedStyle(document.body).fontFamily}`;
                ctx.textAlign = 'center';
                ctx.fillText(track.title, w / 2, h * 0.82);
                ctx.font = `${w*0.04}px ${getComputedStyle(document.body).fontFamily}`;
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.fillText(track.artist, w / 2, h * 0.89);
            }

            function clampVal(min, max, val) { return Math.max(min, Math.min(max, val)); }

            function initAudioEngine() {
                if (!audioCtx) {
                    try {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                        analyser = audioCtx.createAnalyser();
                        analyser.fftSize = 256;
                        analyser.smoothingTimeConstant = 0.7;
                        gainNode = audioCtx.createGain();
                        gainNode.gain.value = 0.08;
                        gainNode.connect(analyser);
                        analyser.connect(audioCtx.destination);
                        analyserDataArray = new Uint8Array(analyser.frequencyBinCount);
                        analyserFreqArray = new Uint8Array(analyser.frequencyBinCount);
                        AppState.audioUnlocked = true;
                    } catch (e) {
                        AppState.audioUnlocked = false;
                    }
                }
                if (AppState.audioUnlocked && audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume().catch(() => {});
                }
            }

            function startProceduralAudio() {
                if (!audioCtx || !analyser || !gainNode) return;
                stopProceduralAudio();
                const track = tracks[AppState.activeTrackIndex];
                const p = track.proc;
                procNodes = [];
                const bassOsc = audioCtx.createOscillator();
                bassOsc.type = 'sine';
                bassOsc.frequency.value = p.baseFreq;
                const bassGain = audioCtx.createGain();
                bassGain.gain.value = 0.25;
                const bassLFO = audioCtx.createOscillator();
                bassLFO.frequency.value = p.bassRate;
                const bassLFOGain = audioCtx.createGain();
                bassLFOGain.gain.value = 8;
                bassLFO.connect(bassLFOGain);
                bassLFOGain.connect(bassOsc.frequency);
                bassOsc.connect(bassGain);
                bassGain.connect(gainNode);
                bassOsc.start();
                bassLFO.start();
                procNodes.push(bassOsc, bassLFO, bassGain, bassLFOGain);
                const padOsc = audioCtx.createOscillator();
                padOsc.type = 'triangle';
                padOsc.frequency.value = p.padFreq;
                const padGain = audioCtx.createGain();
                padGain.gain.value = 0.1;
                padOsc.connect(padGain);
                padGain.connect(gainNode);
                padOsc.start();
                procNodes.push(padOsc, padGain);
                if (p.noiseAmt > 0) {
                    const bufferSize = audioCtx.sampleRate * 0.5;
                    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = noiseBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * p.noiseAmt;
                    const noiseSrc = audioCtx.createBufferSource();
                    noiseSrc.buffer = noiseBuffer;
                    noiseSrc.loop = true;
                    const noiseGain = audioCtx.createGain();
                    noiseGain.gain.value = 0.06;
                    const noiseFilter = audioCtx.createBiquadFilter();
                    noiseFilter.type = 'lowpass';
                    noiseFilter.frequency.value = 400;
                    noiseSrc.connect(noiseFilter);
                    noiseFilter.connect(noiseGain);
                    noiseGain.connect(gainNode);
                    noiseSrc.start();
                    procNodes.push(noiseSrc, noiseGain, noiseFilter);
                }
            }

            function stopProceduralAudio() {
                procNodes.forEach(n => {
                    try { n.stop(); } catch (e) {} try { n.disconnect(); } catch (e) {}
                });
                procNodes = [];
            }

            function restartProceduralAudio() {
                if (AppState.isPlaying && AppState.audioUnlocked) {
                    stopProceduralAudio();
                    startProceduralAudio();
                }
            }

            function togglePlay() {
                initAudioEngine();
                if (!AppState.audioUnlocked && audioCtx) {
                    audioCtx.resume().then(() => {
                        AppState.audioUnlocked = true;
                        startPlayback();
                    }).catch(() => {
                        AppState.audioUnlocked = true;
                        startPlayback();
                    });
                } else if (!AppState.audioUnlocked) {
                    AppState.audioUnlocked = true;
                    startPlayback();
                } else {
                    if (AppState.isPlaying) {
                        pausePlayback();
                    } else {
                        startPlayback();
                    }
                }
            }

            function startPlayback() {
                AppState.isPlaying = true;
                dom.btnPlay.setAttribute('aria-pressed', 'true');
                dom.btnPlay.textContent = '⏸';
                if (AppState.audioUnlocked && audioCtx && audioCtx.state !== 'running') {
                    audioCtx.resume().catch(() => {});
                }
                if (AppState.audioUnlocked && procNodes.length === 0) {
                    startProceduralAudio();
                }
                if (audioCtx && gainNode && AppState.audioUnlocked) {
                    gainNode.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 0.3);
                }
            }

            function pausePlayback() {
                AppState.isPlaying = false;
                dom.btnPlay.setAttribute('aria-pressed', 'false');
                dom.btnPlay.textContent = '▶';
                if (audioCtx && gainNode) {
                    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                }
            }

            function updateAnalyserData() {
                if (analyser && AppState.audioUnlocked && audioCtx && audioCtx.state === 'running') {
                    analyser.getByteTimeDomainData(analyserDataArray);
                    analyser.getByteFrequencyData(analyserFreqArray);
                } else {
                    for (let i = 0; i < simulatedAnalyserData.length; i++) {
                        simulatedAnalyserData[i] = 128 + Math.sin(i * 0.3 + performance.now() * 0.005) * 40 + (Math.random() -
                            0.5) * 20;
                        if (AppState.isPlaying) simulatedAnalyserData[i] += Math.sin(performance.now() * 0.01) * 25;
                    }
                    for (let i = 0; i < simulatedFreqData.length; i++) {
                        simulatedFreqData[i] = Math.max(0, Math.min(255, 30 + Math.sin(i * 0.5 + performance.now() * 0.008) *
                            50 + (AppState.isPlaying ? 40 + Math.random() * 30 : 10)));
                    }
                    analyserDataArray = simulatedAnalyserData;
                    analyserFreqArray = simulatedFreqData;
                }
            }

            function detectBeat() {
                if (!analyserFreqArray || analyserFreqArray.length < 8) return false;
                let lowEnergy = 0;
                for (let i = 0; i < 8; i++) lowEnergy += analyserFreqArray[i];
                lowEnergy /= 8;
                beatEnergyHistory.push(lowEnergy);
                if (beatEnergyHistory.length > 30) beatEnergyHistory.shift();
                if (beatEnergyHistory.length < 10) return false;
                const avg = beatEnergyHistory.reduce((a, b) => a + b, 0) / beatEnergyHistory.length;
                if (beatThreshold === 0) beatThreshold = avg * 1.5;
                beatThreshold = beatThreshold * 0.92 + avg * 1.35 * 0.08;
                beatCooldown = Math.max(0, beatCooldown - 1);
                if (lowEnergy > beatThreshold && beatCooldown === 0 && AppState.isPlaying) {
                    beatCooldown = 12;
                    return true;
                }
                return false;
            }

            function drawWaveform() {
                const canvas = dom.waveformCanvas;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const dpr = AppState.dpr;
                const rect = canvas.getBoundingClientRect();
                const w = rect.width;
                const h = rect.height;
                if (canvas.width !== w * dpr || canvas.height !== h * dpr) {
                    canvas.width = w * dpr;
                    canvas.height = h * dpr;
                    canvas.style.width = w + 'px';
                    canvas.style.height = h + 'px';
                }
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const data = analyserDataArray || simulatedAnalyserData;
                const len = data.length;
                const cw = canvas.width;
                const ch = canvas.height;
                const step = cw / len;
                ctx.beginPath();
                ctx.moveTo(0, ch / 2);
                for (let i = 0; i < len; i++) {
                    const v = (data[i] - 128) / 128;
                    const x = i * step;
                    const y = ch / 2 - v * ch * 0.4;
                    ctx.lineTo(x, y);
                }
                ctx.strokeStyle = 'rgba(var(--accent-rgb), 0.7)';
                ctx.lineWidth = 2 * dpr;
                ctx.shadowColor = 'var(--glow)';
                ctx.shadowBlur = 8 * dpr;
                ctx.stroke();
                ctx.shadowBlur = 0;
                const grad = ctx.createLinearGradient(0, 0, 0, ch);
                grad.addColorStop(0, 'rgba(var(--accent-rgb), 0.25)');
                grad.addColorStop(0.5, 'rgba(var(--accent-rgb), 0.05)');
                grad.addColorStop(1, 'rgba(var(--accent-rgb), 0.25)');
                ctx.fillStyle = grad;
                ctx.lineTo(cw, ch / 2);
                ctx.fill();
            }

            function updateHalos() {
                const energy = analyserFreqArray ? analyserFreqArray.slice(0, 16).reduce((a, b) => a + b, 0) / (16 * 255) :
                    0.3;
                const halos = dom.orbitalHalos.querySelectorAll('.halo-ring');
                const pulse = AppState.isPlaying ? 1 + energy * 0.12 : 1;
                halos.forEach((h, i) => {
                    const baseSize = 120 + i * 50;
                    const size = baseSize * pulse;
                    h.style.width = size + 'px';
                    h.style.height = size + 'px';
                    h.style.opacity = AppState.isPlaying ? 0.25 + energy * 0.35 : 0.12;
                    if (AppState.isPlaying && !AppState.reducedMotion) {
                        h.style.animation = `haloSpin ${3+i*1.5}s linear infinite`;
                    } else {
                        h.style.animation = 'none';
                    }
                });
                if (halos.length === 0) {
                    for (let i = 0; i < 3; i++) {
                        const ring = document.createElement('div');
                        ring.className = 'halo-ring';
                        ring.style.width = (130 + i * 55) + 'px';
                        ring.style.height = (130 + i * 55) + 'px';
                        ring.style.borderColor = 'rgba(var(--accent-rgb),' + (0.18 - i * 0.05) + ')';
                        dom.orbitalHalos.appendChild(ring);
                    }
                }
            }

            function updateTheme() {
                const track = tracks[AppState.activeTrackIndex];
                let r, g, b;
                if (HAS_COLORTHIEF && track.artUrl) {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.src = track.artUrl;
                    img.onload = function() {
                        try {
                            const colorThief = new ColorThief();
                            const dominant = colorThief.getColor(img);
                            r = dominant[0];
                            g = dominant[1];
                            b = dominant[2];
                            applyThemeColors(r, g, b);
                        } catch (e) {
                            applyFallbackTheme(track);
                        }
                    };
                    img.onerror = function() { applyFallbackTheme(track); };
                } else {
                    applyFallbackTheme(track);
                }
            }

            function applyFallbackTheme(track) {
                const pal = track.palette;
                applyThemeColors(pal[0], pal[1], pal[2]);
            }

            function applyThemeColors(r, g, b) {
                const root = document.documentElement;
                const accentStr = `rgb(${r},${g},${b})`;
                const glowStr = `rgba(${r},${g},${b},0.45)`;
                const fogStr = `rgba(${r},${g},${b},0.12)`;
                const gridStr = `rgba(${r},${g},${b},0.15)`;
                if (HAS_GSAP) {
                    gsap.to(root, {
                        '--accent': accentStr,
                        '--accent-rgb': `${r},${g},${b}`,
                        '--glow': glowStr,
                        '--fog-tint': fogStr,
                        '--grid-color': gridStr,
                        duration: 1.2,
                        ease: 'power2.out'
                    });
                } else {
                    root.style.setProperty('--accent', accentStr);
                    root.style.setProperty('--accent-rgb', `${r},${g},${b}`);
                    root.style.setProperty('--glow', glowStr);
                    root.style.setProperty('--fog-tint', fogStr);
                    root.style.setProperty('--grid-color', gridStr);
                }
                dom.progressFill.style.background = accentStr;
            }

            function initStarfield() {
                const canvas = dom.spaceCanvas;
                const ctx = canvas.getContext('2d');
                const resizeStarfield = () => {
                    const dpr = AppState.dpr;
                    canvas.width = window.innerWidth * dpr;
                    canvas.height = window.innerHeight * dpr;
                    canvas.style.width = window.innerWidth + 'px';
                    canvas.style.height = window.innerHeight + 'px';
                };
                resizeStarfield();
                window.addEventListener('resize', debounce(resizeStarfield, 300));
                const count = AppState.lowPower ? 80 : 200;
                spaceParticles = [];
                const seededRandom = (seed) => { let s = seed; return () => { s = (s * 16807 + 0) % 2147483647; return (
                        s - 1) / 2147483646; }; };
                const rng = seededRandom(42);
                for (let i = 0; i < count; i++) {
                    spaceParticles.push({
                        x: rng() * canvas.width,
                        y: rng() * canvas.height,
                        r: rng() * 1.8 + 0.3,
                        depth: rng() * 0.9 + 0.1,
                        twinkle: rng() * Math.PI * 2
                    });
                }
            }

            function drawStarfield(time) {
                const canvas = dom.spaceCanvas;
                const ctx = canvas.getContext('2d');
                const dpr = AppState.dpr;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                starfieldTime += 0.0003;
                spaceParticles.forEach(p => {
                    const sy = p.y - starfieldTime * p.depth * canvas.height * 0.15;
                    const wrappedY = ((sy % (canvas.height + 20)) + (canvas.height + 20)) % (canvas.height + 20) -
                        10;
                    const alpha = 0.35 + Math.sin(time * 0.001 + p.twinkle) * 0.2 + p.depth * 0.4;
                    ctx.fillStyle = `rgba(180,210,255,${Math.max(0.1,Math.min(0.9,alpha))})`;
                    ctx.beginPath();
                    ctx.arc(p.x, wrappedY, p.r * dpr, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            function initThreeParticles() {
                if (!HAS_THREE) return false;
                try {
                    const canvas = document.createElement('canvas');
                    canvas.id = 'threeLayer';
                    canvas.style.cssText =
                        'position:fixed;inset:0;z-index:0;pointer-events:none;';
                    document.getElementById('app').prepend(canvas);
                    threeScene = new THREE.Scene();
                    threeCamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.5, 200);
                    threeCamera.position.z = 30;
                    threeRenderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
                    threeRenderer.setPixelRatio(AppState.dpr);
                    threeRenderer.setSize(window.innerWidth, window.innerHeight);
                    const geom = new THREE.BufferGeometry();
                    const count = AppState.lowPower ? 150 : 400;
                    const positions = new Float32Array(count * 3);
                    const sizes = new Float32Array(count);
                    for (let i = 0; i < count; i++) {
                        positions[i * 3] = (Math.random() - 0.5) * 80;
                        positions[i * 3 + 1] = (Math.random() - 0.5) * 50;
                        positions[i * 3 + 2] = (Math.random() - 0.5) * 40;
                        sizes[i] = Math.random() * 0.12 + 0.02;
                    }
                    geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                    geom.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
                    const mat = new THREE.PointsMaterial({
                        color: 0x88bbee,
                        size: 0.08,
                        transparent: true,
                        opacity: 0.5,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false
                    });
                    threeParticles = new THREE.Points(geom, mat);
                    threeScene.add(threeParticles);
                    window.addEventListener('resize', debounce(() => {
                        if (threeRenderer && threeCamera) {
                            threeRenderer.setSize(window.innerWidth, window.innerHeight);
                            threeCamera.aspect = window.innerWidth / window.innerHeight;
                            threeCamera.updateProjectionMatrix();
                        }
                    }, 300));
                    return true;
                } catch (e) {
                    return false;
                }
            }

            function renderThreeParticles(time) {
                if (!threeScene || !threeRenderer || !threeCamera || !threeParticles) return;
                threeParticles.rotation.y += 0.0004;
                threeParticles.rotation.x += 0.0002;
                const pos = threeParticles.geometry.attributes.position.array;
                for (let i = 0; i < pos.length; i += 3) {
                    pos[i + 1] += Math.sin(time * 0.0005 + i) * 0.003;
                }
                threeParticles.geometry.attributes.position.needsUpdate = true;
                threeRenderer.render(threeScene, threeCamera);
            }

            function renderQueuePanel() {
                dom.queueList.innerHTML = '';
                for (let i = 1; i < TOTAL_TRACKS; i++) {
                    const idx = (AppState.activeTrackIndex + i) % TOTAL_TRACKS;
                    const track = tracks[idx];
                    const item = document.createElement('div');
                    item.className = 'queue-item';
                    item.setAttribute('role', 'button');
                    item.setAttribute('tabindex', '0');
                    item.setAttribute('aria-label', track.title);
                    item.innerHTML = `
                        <img class="qi-thumb" src="${track.artUrl}" alt="${track.title}" width="40" height="40" loading="lazy" onerror="this.style.display='none'">
                        <div class="qi-info">
                            <div class="qi-title">${track.title}</div>
                            <div class="qi-artist">${track.artist}</div>
                        </div>`;
                    item.addEventListener('click', () => {
                        navigateToTrack(idx, idx > AppState.activeTrackIndex ? 'right' : 'left');
                        toggleQueue(false);
                    });
                    dom.queueList.appendChild(item);
                }
            }

            function toggleQueue(forceState) {
                AppState.queueOpen = typeof forceState === 'boolean' ? forceState : !AppState.queueOpen;
                dom.queuePanel.classList.toggle('open', AppState.queueOpen);
                dom.btnQueue.setAttribute('aria-pressed', AppState.queueOpen ? 'true' : 'false');
                if (AppState.queueOpen) {
                    renderQueuePanel();
                    showToast('صف پخش باز شد');
                }
            }

            function setupDraggable() {
                if (!HAS_DRAGGABLE || !HAS_GSAP) {
                    setupFallbackDrag();
                    return;
                }
                try {
                    Draggable.create('.carousel-track', {
                        type: 'x',
                        inertia: true,
                        bounds: { minX: -window.innerWidth * 0.6, maxX: window.innerWidth * 0.6 },
                        onDragEnd: function() {
                            const dx = this.endX - this.startX;
                            const threshold = window.innerWidth * 0.12;
                            if (Math.abs(dx) > threshold) {
                                if (dx < -threshold) navigateNext();
                                else if (dx > threshold) navigatePrev();
                            }
                            if (HAS_GSAP) gsap.to('.carousel-track', { x: 0, duration: 0.5,
                                ease: 'power2.out' });
                        },
                        onDrag: function() {
                            if (this.x > 5 || this.x < -5) {
                                dom.carouselTrack.style.transform = `translateX(${this.x}px)`;
                            }
                        }
                    });
                } catch (e) {
                    setupFallbackDrag();
                }
            }

            function setupFallbackDrag() {
                let startX = 0;
                let currentX = 0;
                let dragging = false;
                let velX = 0;
                let lastX = 0;
                let lastTime = 0;
                const el = dom.carouselTrack;
                el.addEventListener('pointerdown', (e) => {
                    dragging = true;
                    startX = e.clientX;
                    currentX = 0;
                    velX = 0;
                    lastX = e.clientX;
                    lastTime = performance.now();
                    el.style.transition = 'none';
                    el.setPointerCapture(e.pointerId);
                });
                el.addEventListener('pointermove', (e) => {
                    if (!dragging) return;
                    currentX = e.clientX - startX;
                    velX = (e.clientX - lastX) / Math.max(1, performance.now() - lastTime);
                    lastX = e.clientX;
                    lastTime = performance.now();
                    el.style.transform = `translateX(${currentX}px)`;
                });
                el.addEventListener('pointerup', (e) => {
                    if (!dragging) return;
                    dragging = false;
                    el.style.transition = 'transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1)';
                    const threshold = window.innerWidth * 0.1;
                    const totalVel = Math.abs(currentX) + Math.abs(velX) * 200;
                    if (totalVel > threshold) {
                        if (currentX < -threshold || velX < -0.3) navigateNext();
                        else if (currentX > threshold || velX > 0.3) navigatePrev();
                    }
                    el.style.transform = 'translateX(0)';
                    setTimeout(() => { el.style.transition = 'none'; }, 550);
                });
            }

            function setupProgressDrag() {
                const area = dom.progressArea;
                const thumb = dom.progressThumb;
                let dragging = false;
                const updateProgressFromEvent = (e) => {
                    const rect = area.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const pct = Math.max(0, Math.min(100, (x / rect.width) * 100));
                    AppState.progress = (pct / 100) * AppState.duration;
                    updateProgressUI();
                };
                area.addEventListener('pointerdown', (e) => {
                    dragging = true;
                    updateProgressFromEvent(e);
                    area.setPointerCapture(e.pointerId);
                });
                area.addEventListener('pointermove', (e) => {
                    if (dragging) updateProgressFromEvent(e);
                });
                area.addEventListener('pointerup', () => { dragging = false; });
                thumb.addEventListener('pointerdown', (e) => {
                    e.stopPropagation();
                    dragging = true;
                    thumb.setPointerCapture(e.pointerId);
                });
                thumb.addEventListener('pointermove', (e) => {
                    if (dragging) updateProgressFromEvent(e);
                });
                thumb.addEventListener('pointerup', () => { dragging = false; });
            }

            function debounce(fn, ms) {
                let timer;
                return function(...args) {
                    clearTimeout(timer);
                    timer = setTimeout(() => fn.apply(this, args), ms);
                };
            }

            function handleResize() {
                applyAllSlotTransforms(false);
            }

            function handleVisibilityChange() {
                if (document.hidden) {
                    if (rafId) cancelAnimationFrame(rafId);
                    rafId = null;
                } else {
                    if (!rafId) rafId = requestAnimationFrame(masterLoop);
                }
            }

            function masterLoop(time) {
                if (!lastTime) lastTime = time;
                const dt = Math.min(time - lastTime, 100);
                lastTime = time;
                fogPhase += dt * 0.0002;
                updateAnalyserData();
                if (AppState.isPlaying && AppState.audioUnlocked) {
                    AppState.progress += dt / 1000;
                    if (AppState.progress >= AppState.duration) {
                        AppState.progress = 0;
                        navigateNext();
                    }
                }
                if (detectBeat() && AppState.isPlaying) {
                    triggerShockwave();
                }
                updateProgressUI();
                drawWaveform();
                updateHalos();
                drawStarfield(time);
                if (HAS_THREE && threeRenderer) renderThreeParticles(time);
                if (AppState.reducedMotion) {
                    dom.volumetricFog.style.transform = 'none';
                } else {
                    const fogX = Math.sin(fogPhase) * 1.2;
                    const fogY = Math.cos(fogPhase * 0.7) * 0.8;
                    dom.volumetricFog.style.transform = `translate(${fogX}vw, ${fogY}vh) scale(${1+Math.sin(fogPhase*1.3)*0.03})`;
                }
                rafId = requestAnimationFrame(masterLoop);
            }

            function init() {
                initCarouselDOM();
                updatePlaybackBarUI();
                updateTopBar();
                updateTheme();
                initStarfield();
                const threeOk = initThreeParticles();
                if (!threeOk) {
                    const extraStars = AppState.lowPower ? 40 : 120;
                    const canvas = dom.spaceCanvas;
                    const ctx = canvas.getContext('2d');
                    const seededRandom = () => { let s = 99; return () => { s = (s * 16807 + 0) % 2147483647; return (s -
                            1) / 2147483646; }; };
                    const rng = seededRandom();
                    for (let i = 0; i < extraStars; i++) {
                        spaceParticles.push({
                            x: rng() * canvas.width,
                            y: rng() * canvas.height,
                            r: rng() * 1.4 + 0.2,
                            depth: rng() * 0.8 + 0.15,
                            twinkle: rng() * Math.PI * 2
                        });
                    }
                }
                setupDraggable();
                setupProgressDrag();
                dom.btnPlay.addEventListener('click', togglePlay);
                dom.btnPrev.addEventListener('click', navigatePrev);
                dom.btnNext.addEventListener('click', navigateNext);
                dom.btnQueue.addEventListener('click', () => toggleQueue());
                dom.btnLyrics.addEventListener('click', () => showToast('متن آهنگ به‌زودی'));
                dom.btnVolume.addEventListener('click', () => {
                    if (audioCtx && gainNode) {
                        const newGain = gainNode.gain.value > 0.01 ? 0 : 0.08;
                        gainNode.gain.linearRampToValueAtTime(newGain, audioCtx.currentTime + 0.15);
                        showToast(gainNode.gain.value > 0.01 ? 'صدا روشن' : 'صدا خاموش');
                    }
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowRight') { e.preventDefault();
                        navigateNext(); } else if (e.key === 'ArrowLeft') { e.preventDefault();
                        navigatePrev(); } else if (e.key === ' ') { e.preventDefault();
                        togglePlay(); } else if (e.key === 'v' || e.key === 'V') {
                        e.preventDefault();
                        const modes = ['focus', 'gallery', 'spatial'];
                        const idx = modes.indexOf(AppState.visualMode);
                        AppState.visualMode = modes[(idx + 1) % 3];
                        showToast('حالت: ' + AppState.visualMode);
                        applyVisualMode();
                    }
                });
                document.addEventListener('click', (e) => {
                    if (e.target.closest('button') || e.target.closest('.album-card') || e.target.closest(
                            '.queue-item')) {
                        triggerRipple(e.clientX, e.clientY);
                    }
                    if (!AppState.audioUnlocked) {
                        initAudioEngine();
                        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
                        AppState.audioUnlocked = true;
                        if (AppState.isPlaying) startProceduralAudio();
                    }
                });
                window.addEventListener('resize', debounce(handleResize, 250));
                document.addEventListener('visibilitychange', handleVisibilityChange);
                window.matchMedia('(prefers-reduced-motion: reduce)').addEventListener('change', (e) => {
                    AppState.reducedMotion = e.matches;
                });
                rafId = requestAnimationFrame(masterLoop);
                updatePlaybackBarUI();
                updateTopBar();
                applyAllSlotTransforms(false);
            }

            function applyVisualMode() {
                const mode = AppState.visualMode;
                let mods = {};
                if (mode === 'focus') {
                    mods = { '-2': { opacity: 0.22, blur: '9px', brightness: 0.4 }, '-1': { opacity: 0.55, blur: '4px',
                            brightness: 0.6 }, '0': { scale: 1.15, opacity: 1, blur: '0px', brightness: 1.2 },
                        '1': { opacity: 0.55, blur: '4px', brightness: 0.6 }, '2': { opacity: 0.22, blur: '9px',
                            brightness: 0.4 } };
                } else if (mode === 'gallery') {
                    mods = { '-2': { opacity: 0.55, blur: '4px', brightness: 0.7 }, '-1': { opacity: 0.8, blur: '1.5px',
                            brightness: 0.88 }, '0': { scale: 1.05, opacity: 1, blur: '0px', brightness: 1.08 },
                        '1': { opacity: 0.8, blur: '1.5px', brightness: 0.88 }, '2': { opacity: 0.55, blur: '4px',
                            brightness: 0.7 } };
                } else {
                    applyAllSlotTransforms(true);
                    return;
                }
                cardElements.forEach(({ el, slotOffset }) => {
                    const cfg = buildSlotTransform(slotOffset);
                    const m = mods[String(slotOffset)] || {};
                    const target = { ...cfg, ...m };
                    if (HAS_GSAP && !AppState.reducedMotion) {
                        gsap.to(el, {
                            scale: target.scale,
                            opacity: target.opacity,
                            filter: `blur(${target.blur}) brightness(${target.brightness})`,
                            duration: 0.7,
                            ease: 'power2.out'
                        });
                    } else {
                        el.style.scale = target.scale;
                        el.style.opacity = target.opacity;
                        el.style.filter = `blur(${target.blur}) brightness(${target.brightness})`;
                    }
                });
            }
            const styleSheet = document.createElement('style');
            styleSheet.textContent =
                `@keyframes haloSpin{from{transform:translate(-50%,-50%) rotate(0deg);}to{transform:translate(-50%,-50%) rotate(360deg);}}`;
            document.head.appendChild(styleSheet);
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
