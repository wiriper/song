<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cosmic Wave — پلتفرم موزیک فضایی</title>
    <style>
        :root {
            --bg-deep: #0a0a14;
            --bg-space: #0d0d1f;
            --primary: #4dc9f6;
            --primary-glow: rgba(77, 201, 246, 0.5);
            --secondary: #a78bfa;
            --secondary-glow: rgba(167, 139, 250, 0.5);
            --accent: #22d3bb;
            --accent-glow: rgba(34, 211, 187, 0.4);
            --surface: rgba(15, 15, 35, 0.65);
            --surface-border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(18, 18, 40, 0.55);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: 24px;
            --text: #e8e8f0;
            --text-secondary: #b0b0c8;
            --text-muted: #7878a0;
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --shadow-card: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 80px rgba(77, 201, 246, 0.08);
            --shadow-glow: 0 0 40px rgba(77, 201, 246, 0.25), 0 0 80px rgba(167, 139, 250, 0.12);
            --shadow-player: 0 -4px 30px rgba(0, 0, 0, 0.6), 0 0 60px rgba(77, 201, 246, 0.1);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
            --font-ui: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }
        :root[data-theme="aurora"] {
            --primary: #c084fc;
            --primary-glow: rgba(192, 132, 252, 0.5);
            --secondary: #f472b6;
            --secondary-glow: rgba(244, 114, 182, 0.45);
            --accent: #fbbf24;
            --accent-glow: rgba(251, 191, 36, 0.35);
            --shadow-glow: 0 0 40px rgba(192, 132, 252, 0.25), 0 0 80px rgba(244, 114, 182, 0.12);
            --shadow-player: 0 -4px 30px rgba(0, 0, 0, 0.6), 0 0 60px rgba(192, 132, 252, 0.1);
        }
        :root[data-theme="solar"] {
            --primary: #f59e0b;
            --primary-glow: rgba(245, 158, 11, 0.5);
            --secondary: #ef4444;
            --secondary-glow: rgba(239, 68, 68, 0.4);
            --accent: #fbbf24;
            --accent-glow: rgba(251, 191, 36, 0.45);
            --shadow-glow: 0 0 40px rgba(245, 158, 11, 0.25), 0 0 80px rgba(239, 68, 68, 0.1);
            --shadow-player: 0 -4px 30px rgba(0, 0, 0, 0.6), 0 0 60px rgba(245, 158, 11, 0.1);
        }
        @media(prefers-reduced-motion:reduce) {
            :root {
                --transition: 0.05s linear;
                --transition-slow: 0.1s linear;
            }
            .star,.nebula,.visualizer-bar,.eq-bar,.glow-pulse{animation-duration:8s !important;}
            .carousel-track{transition: none !important;}
        }
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            font-size: clamp(14px, 1.6vw, 17px);
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: var(--font-ui);
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding-bottom: calc(110px + var(--safe-bottom));
        }
        /* ===== SPACE BACKGROUND ===== */
        .space-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse 70% 50% at 30% 20%, rgba(30, 40, 100, 0.5) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 75% 60%, rgba(60, 20, 80, 0.35) 0%, transparent 55%),
                radial-gradient(ellipse 60% 30% at 50% 80%, rgba(10, 30, 60, 0.5) 0%, transparent 50%),
                linear-gradient(180deg, #060612 0%, #0a0a1a 30%, #0d0d22 60%, #0a0a18 100%);
        }
        .nebula {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
            animation: nebulaDrift 20s ease-in-out infinite;
        }
        .nebula.n1 {
            width: 55vw;
            height: 55vw;
            max-width: 700px;
            max-height: 700px;
            top: -15%;
            left: -10%;
            background: radial-gradient(circle, rgba(77, 180, 240, 0.4) 0%, transparent 70%);
        }
        .nebula.n2 {
            width: 40vw;
            height: 40vw;
            max-width: 500px;
            max-height: 500px;
            bottom: 10%;
            right: -8%;
            background: radial-gradient(circle, rgba(140, 100, 220, 0.35) 0%, transparent 65%);
            animation-delay: -8s;
            animation-duration: 24s;
        }
        .nebula.n3 {
            width: 30vw;
            height: 30vw;
            max-width: 380px;
            max-height: 380px;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(34, 200, 180, 0.2) 0%, transparent 60%);
            animation-delay: -14s;
            animation-duration: 18s;
        }
        @keyframes nebulaDrift {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(3vw, -2vh) scale(1.08);
            }
            50% {
                transform: translate(-1vw, 3vh) scale(0.94);
            }
            75% {
                transform: translate(-3vw, -1vh) scale(1.04);
            }
        }
        .stars-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.2;
            }
            50% {
                opacity: 0.9;
            }
        }
        /* ===== MAIN APP SHELL ===== */
        .app-shell {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
        }
        /* ===== TOP NAV ===== */
        .top-nav {
            position: sticky;
            top: 12px;
            z-index: 100;
            width: 100%;
            max-width: 960px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 10px 18px;
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            flex-wrap: nowrap;
            transition: var(--transition);
        }
        @supports not (backdrop-filter:blur(1px)) {
            .top-nav,
            .player-bar,
            .glass-panel {
                background: rgba(15, 15, 35, 0.85);
            }
        }
        .nav-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
            font-size: 1rem;
            position: relative;
        }
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--primary);
            box-shadow: 0 0 16px var(--primary-glow);
        }
        .nav-btn:active {
            transform: scale(0.92);
            transition: 0.1s;
        }
        .nav-btn:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 3px;
        }
        .nav-spacer {
            flex: 1;
            min-width: 4px;
        }
        .nav-now-playing {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 1;
            min-width: 0;
            overflow: hidden;
        }
        .nav-now-playing .mini-cover {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            flex-shrink: 0;
            border: 1px solid var(--glass-border);
        }
        .nav-track-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }
        .nav-track-title {
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
            max-width: 140px;
        }
        .nav-track-artist {
            font-size: 0.68rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px;
        }
        .search-wrapper {
            position: relative;
            flex-shrink: 0;
        }
        .search-input {
            width: 180px;
            height: 36px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            padding: 0 36px 0 12px;
            font-size: 0.78rem;
            transition: var(--transition);
            font-family: var(--font-ui);
            outline: none;
        }
        .search-input:focus {
            width: 220px;
            border-color: var(--primary);
            box-shadow: 0 0 18px var(--primary-glow);
            background: rgba(255, 255, 255, 0.08);
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }
        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            font-size: 0.85rem;
        }
        .search-results {
            position: absolute;
            top: 44px;
            right: 0;
            width: 280px;
            max-height: 320px;
            overflow-y: auto;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            box-shadow: var(--shadow-card);
            display: none;
            z-index: 200;
            padding: 6px;
        }
        .search-results.active {
            display: block;
        }
        .search-result-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .search-result-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--glass-border);
        }
        .search-result-cover {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            flex-shrink: 0;
        }
        .search-result-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .search-result-title {
            font-size: 0.78rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .search-result-artist {
            font-size: 0.68rem;
            color: var(--text-muted);
        }
        .search-no-result {
            padding: 16px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        /* ===== CAROUSEL ===== */
        .carousel-container {
            width: 100%;
            max-width: 960px;
            position: relative;
            perspective: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: clamp(320px, 45vw, 480px);
            margin: 10px 0;
        }
        .carousel-viewport {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .carousel-track {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            width: 100%;
            height: 100%;
            transition: var(--transition-slow);
            position: relative;
        }
        .carousel-card {
            position: absolute;
            width: clamp(180px, 22vw, 280px);
            aspect-ratio: 3/4;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-slow);
            border: 2px solid transparent;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .carousel-card .card-artwork {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            z-index: 0;
        }
        .carousel-card .card-overlay {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            z-index: 1;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.2) 40%, rgba(0, 0, 0, 0.05) 70%, transparent 100%);
        }
        .carousel-card .card-info {
            position: relative;
            z-index: 2;
            padding: 20px 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .carousel-card .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
            line-height: 1.3;
        }
        .carousel-card .card-artist {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        }
        .carousel-card .card-badge {
            display: inline-block;
            font-size: 0.6rem;
            padding: 3px 8px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(6px);
            color: #fff;
            letter-spacing: 0.04em;
            align-self: flex-start;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .carousel-card.center {
            z-index: 10;
            transform: translateX(0) scale(1.08);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: var(--shadow-glow), 0 20px 60px rgba(0, 0, 0, 0.55);
            opacity: 1;
        }
        .carousel-card.left {
            z-index: 6;
            transform: translateX(-55%) scale(0.8) rotateY(18deg);
            opacity: 0.55;
            filter: brightness(0.7) blur(0.5px);
        }
        .carousel-card.right {
            z-index: 6;
            transform: translateX(55%) scale(0.8) rotateY(-18deg);
            opacity: 0.55;
            filter: brightness(0.7) blur(0.5px);
        }
        .carousel-card.far-left {
            z-index: 3;
            transform: translateX(-95%) scale(0.6) rotateY(30deg);
            opacity: 0.25;
            filter: brightness(0.5) blur(1.5px);
            pointer-events: none;
        }
        .carousel-card.far-right {
            z-index: 3;
            transform: translateX(95%) scale(0.6) rotateY(-30deg);
            opacity: 0.25;
            filter: brightness(0.5) blur(1.5px);
            pointer-events: none;
        }
        .carousel-card.hidden-card {
            z-index: 0;
            transform: translateX(0) scale(0.4);
            opacity: 0;
            pointer-events: none;
        }
        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            color: #fff;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .carousel-nav:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .carousel-nav:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 3px;
        }
        .carousel-prev {
            left: 8px;
        }
        .carousel-next {
            right: 8px;
        }
        /* ===== SHELVES ===== */
        .shelves-section {
            width: 100%;
            max-width: 960px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 10px;
        }
        .shelf {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .shelf-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 0.03em;
            padding: 0 4px;
        }
        .shelf-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            padding: 4px 0 8px;
            scrollbar-width: none;
        }
        .shelf-scroll::-webkit-scrollbar {
            display: none;
        }
        .mini-card {
            flex-shrink: 0;
            width: clamp(100px, 13vw, 140px);
            aspect-ratio: 3/4;
            border-radius: var(--radius);
            cursor: pointer;
            border: 1px solid var(--glass-border);
            background: var(--surface);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .mini-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5), 0 0 20px var(--primary-glow);
        }
        .mini-card .mini-artwork {
            position: absolute;
            inset: 0;
            z-index: 0;
        }
        .mini-card .mini-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, transparent 55%);
        }
        .mini-card .mini-info {
            position: relative;
            z-index: 2;
            padding: 10px;
        }
        .mini-card .mini-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .mini-card .mini-artist {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.7);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* ===== PLAYER BAR ===== */
        .player-bar {
            position: fixed;
            bottom: 12px;
            bottom: calc(12px + var(--safe-bottom));
            z-index: 150;
            width: calc(100% - 24px);
            max-width: 960px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 10px 16px;
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            box-shadow: var(--shadow-player);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap;
            transition: var(--transition);
        }
        .player-cover-sm {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            flex-shrink: 0;
            border: 1px solid var(--glass-border);
            cursor: pointer;
        }
        .player-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
            flex-shrink: 1;
            gap: 1px;
        }
        .player-title {
            font-size: 0.82rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
            max-width: 180px;
        }
        .player-artist {
            font-size: 0.68rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }
        .player-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .ctrl-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .ctrl-btn:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }
        .ctrl-btn.play-btn {
            width: 44px;
            height: 44px;
            background: var(--primary);
            color: #0a0a14;
            border-radius: 50%;
            font-size: 1.2rem;
            box-shadow: 0 0 24px var(--primary-glow);
            position: relative;
        }
        .ctrl-btn.play-btn:hover {
            box-shadow: 0 0 36px var(--primary-glow), 0 0 60px var(--primary-glow);
            transform: scale(1.05);
        }
        .ctrl-btn.play-btn:active {
            transform: scale(0.9);
        }
        .ctrl-btn.liked {
            color: #ff5e7e;
        }
        .player-progress-area {
            flex: 1;
            min-width: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 1;
        }
        .time-display {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            flex-shrink: 0;
            min-width: 34px;
            text-align: center;
        }
        .progress-bar {
            flex: 1;
            height: 5px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.12);
            cursor: pointer;
            position: relative;
            min-width: 30px;
        }
        .progress-fill {
            height: 100%;
            border-radius: 6px;
            background: var(--primary);
            position: relative;

                ],

            let tracks = [...sampleTracks];

            let isPlaying = false;

            let queueIndices = []; // indices into tracks array for queue order

            function buildQueue() {
                if (isShuffled && shuffleOrder.length === tracks.length) {
                    queueIndices = [...shuffleOrder];
                } else {
                    queueIndices = tracks.map((_, i) => i);
                }
                // Ensure current is first
                const ci = queueIndices.indexOf(currentTrackIndex);
                if (ci > 0) {
                    queueIndices.splice(ci, 1);
                    queueIndices.unshift(currentTrackIndex);
                }
            }

            function getCurrentTrack() {
                return tracks[currentTrackIndex] || tracks[0];
            }

            function formatTime(seconds) {
                if (!isFinite(seconds) || seconds < 0) return '00:00';
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
            }

            // ===== CREATE ARTWORK STYLE =====
            function createArtworkStyle(colors) {
                const [c1, c2, c3, c4] = colors || ['#1a1a40', '#2d1b4e', '#0f0f2e', '#3a1f5c'];
                return `background:linear-gradient(160deg,${c1} 0%,${c2} 35%,${c3} 65%,${c4} 100%);` +
                    `position:relative;overflow:hidden;`;
            }

            function createArtworkHTML(colors, badge) {
                const style = createArtworkStyle(colors);
                let svgPattern = '';
                const hash = (badge || '').length + colors[0].length;
                if (hash % 3 === 0) {
                    svgPattern =
                        `<svg style="position:absolute;inset:0;opacity:0.3;width:100%;height:100%;" viewBox="0 0 200 260"><circle cx="100" cy="100" r="70" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/><circle cx="100" cy="100" r="40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/><line x1="30" y1="180" x2="170" y2="180" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/><polygon points="100,30 110,60 140,65 115,85 120,115 100,100 80,115 85,85 60,65 90,60" fill="rgba(255,255,255,0.06)"/></svg>`;
                } else if (hash % 3 === 1) {
                    svgPattern =
                        `<svg style="position:absolute;inset:0;opacity:0.3;width:100%;height:100%;" viewBox="0 0 200 260"><ellipse cx="100" cy="130" rx="80" ry="90" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/><rect x="50" y="30" width="100" height="80" rx="40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.6"/><circle cx="60" cy="50" r="8" fill="rgba(255,255,255,0.12)"/><circle cx="140" cy="50" r="5" fill="rgba(255,255,255,0.08)"/></svg>`;
                } else {
                    svgPattern =
                        `<svg style="position:absolute;inset:0;opacity:0.3;width:100%;height:100%;" viewBox="0 0 200 260"><path d="M0,200 Q50,120 100,180 T200,200" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/><path d="M0,220 Q60,150 120,210 T200,220" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/><circle cx="160" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.7" stroke-dasharray="8,4"/></svg>`;
                }
                return `<div style="${style}width:100%;height:100%;position:absolute;inset:0;border-radius:inherit;">${svgPattern}<div style="position:absolute;top:12%;left:10%;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.06);filter:blur(8px);"></div><div style="position:absolute;bottom:20%;right:15%;width:45px;height:45px;border-radius:50%;background:rgba(255,255,255,0.04);filter:blur(12px);"></div></div>`;
            }

            // ===== DOM REFS =====
            const $ = (s) => document.querySelector(s);

            const playerCoverSm = $('#playerCoverSm');
            const navTrackTitle = $('#navTrackTitle');
            const navTrackArtist = $('#navTrackArtist');
            const navMiniCover = $('#navMiniCover');
            const toastContainer = $('#toastContainer');
            const visualizerCanvas = $('#visualizerCanvas');
            const ctx2d = visualizerCanvas ? visualizerCanvas.getContext('2d') : null;

            // ===== STARS =====
            function createStars() {
                const container = $('#starsContainer');
                if (!container) return;
                container.innerHTML = '';
                const count = window.innerWidth < 500 ? 60 : 120;
                for (let i = 0; i < count; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    const size = Math.random() * 2.5 + 0.8;
                    star.style.cssText = `
                width:${size}px;height:${size}px;

                --dur:${Math.random()*3+2}s;--delay:${Math.random()*5}s;

              `;
                    container.appendChild(star);

            }
            createStars();
            window.addEventListener('resize', () => { createStars();
                resizeVisualizer(); });

            // ===== VISUALIZER =====
            function resizeVisualizer() {
                if (visualizerCanvas) {
                    visualizerCanvas.width = window.innerWidth;
                    visualizerCanvas.height = 120;
                }
            }
            resizeVisualizer();

            function setupAudioContext() {
                if (!audioContext && audioEl.src && audioEl.src !== window.location.href && audioEl.src !== '') {
                    try {
                        audioContext = new(window.AudioContext || window.webkitAudioContext)();
                        analyserNode = audioContext.createAnalyser();
                        analyserNode.fftSize = 128;
                        const source = audioContext.createMediaElementSource(audioEl);
                        source.connect(analyserNode);
                        analyserNode.connect(audioContext.destination);
                    } catch (e) {
                        audioContext = null;
                        analyserNode = null;
                    }
                }
            }

            function drawVisualizerFallback() {
                if (!ctx2d || !visualizerCanvas) return;
                const w = visualizerCanvas.width;
                const h = visualizerCanvas.height;
                ctx2d.clearRect(0, 0, w, h);
                const bars = 40;
                const barW = w / bars - 1;
                const t = Date.now() / 1000;
                for (let i = 0; i < bars; i++) {
                    let val;
                    if (analyserNode && audioContext && audioContext.state === 'running') {
                        const freqData = new Uint8Array(analyserNode.frequencyBinCount);
                        analyserNode.getByteFrequencyData(freqData);
                        val = freqData[Math.floor(i * freqData.length / bars)] / 255;
                    } else if (isPlaying) {
                        val = 0.25 + 0.35 * Math.abs(Math.sin(t * 3 + i * 0.4) * Math.cos(t * 1.7 + i * 0.25));
                    } else {
                        val = 0.08 + 0.05 * Math.sin(t * 0.5 + i * 0.3);
                    }
                    const barH = val * h * 0.85;
                    const x = i * (barW + 1);
                    const y = h - barH;
                    const grad = ctx2d.createLinearGradient(x, y, x, h);
                    const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--primary')
                        .trim() || '#4dc9f6';
                    grad.addColorStop(0, primaryColor);
                    grad.addColorStop(1, 'transparent');
                    ctx2d.fillStyle = grad;
                    ctx2d.beginPath();
                    ctx2d.roundRect(x, y, barW, barH, [2, 2, 0, 0]);
                    ctx2d.fill();
                }
            }

            function startVisualizerLoop() {
                if (visualizerAnimationId) return;
                function loop() {
                    drawVisualizerFallback();
                    visualizerAnimationId = requestAnimationFrame(loop);
                }
                loop();
            }

            function stopVisualizerLoop() {
                if (visualizerAnimationId) {
                    cancelAnimationFrame(visualizerAnimationId);
                    visualizerAnimationId = null;
                }
                if (ctx2d && visualizerCanvas) ctx2d.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
            }
            startVisualizerLoop();

            // ===== TOAST =====
            function showToast(msg, type = '') {
                const toast = document.createElement('div');
                toast.className = 'toast ' + type;
                toast.textContent = msg;
                toastContainer.appendChild(toast);
                setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3200);
            }

            // ===== THEME =====
            function setTheme(theme) {
                document.body.setAttribute('data-theme', theme);
                try { localStorage.setItem('cosmicwave-theme', theme); } catch (e) {}
                $$('.theme-dot').forEach(d => d.classList.toggle('active-theme', d.dataset.theme === theme));
            }
            const savedTheme = (() => { try { return localStorage.getItem('cosmicwave-theme'); } catch (e) { return null; } })();
            if (savedTheme) setTheme(savedTheme);
            $$('.theme-dot').forEach(dot => {
                dot.addEventListener('click', () => setTheme(dot.dataset.theme));
                dot.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault();
                        setTheme(dot.dataset.theme); } });
            });

            // ===== PANEL HELPERS =====
            function openPanel(overlayId) {
                const ov = document.getElementById(overlayId);
                if (ov) ov.classList.add('open');
            }

            function closePanel(overlayId) {
                const ov = document.getElementById(overlayId);
                if (ov) ov.classList.remove('open');

            function closeAllPanels() {
                ['queueOverlay', 'lyricsOverlay', 'uploadOverlay'].forEach(id => closePanel(id));
            }
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeAllPanels(); });
            $('#queueClose').addEventListener('click', () => closePanel('queueOverlay'));
            $('#lyricsClose').addEventListener('click', () => closePanel('lyricsOverlay'));
            $('#uploadClose').addEventListener('click', () => closePanel('uploadOverlay'));
            document.getElementById('queueOverlay').addEventListener('click', function(e) { if (e.target === this)
                    closePanel('queueOverlay'); });
            document.getElementById('lyricsOverlay').addEventListener('click', function(e) { if (e.target === this)
                    closePanel('lyricsOverlay'); });
            document.getElementById('uploadOverlay').addEventListener('click', function(e) { if (e.target === this)
                    closePanel('uploadOverlay'); });

            // ===== UPDATE UI =====
            function updatePlayerUI() {
                const track = getCurrentTrack();
                if (!track) return;
                playerTitle.textContent = track.title;
                playerArtist.textContent = track.artist;
                navTrackTitle.textContent = track.title;
                navTrackArtist.textContent = track.artist;
                playerCoverSm.style.cssText = createArtworkStyle(track.colors);
                navMiniCover.style.cssText = createArtworkStyle(track.colors);
                timeDurationEl.textContent = formatTime(track.duration);
                btnLike.textContent = likedTracks.has(track.id) ? '❤️' : '🤍';
                btnLike.classList.toggle('liked', likedTracks.has(track.id));
                const repeatIcons = { off: '🔁', one: '🔂', all: '🔁' };
                btnRepeat.textContent = repeatIcons[repeatMode] || '🔁';
                if (repeatMode === 'all') btnRepeat.style.color = 'var(--primary)';
                else if (repeatMode === 'one') btnRepeat.style.color = 'var(--accent)';
                else btnRepeat.style.color = '';
                btnShuffle.style.color = isShuffled ? 'var(--primary)' : '';
                updatePlayIcon();
                renderQueuePanel();
                updateLyricsPanel();
                updateCarouselHighlight();
            }

            function updatePlayIcon() {
                btnPlay.textContent = isPlaying ? '⏸' : '▶';
                const eqBarsEl = $('#eqBars');
                if (eqBarsEl) {
                    eqBarsEl.querySelectorAll('.eq-bar').forEach(b => b.classList.toggle('playing', isPlaying));
                }
            }

            function updateCarouselHighlight() {
                const cards = carouselTrack.querySelectorAll('.carousel-card');
                cards.forEach((card, i) => {
                    const idx = parseInt(card.dataset.trackIndex);
                    card.classList.toggle('center', idx === currentTrackIndex);
                    card.classList.remove('left', 'right', 'far-left', 'far-right', 'hidden-card');
                });
                positionCarouselCards();
            }

            function positionCarouselCards() {
                const cards = Array.from(carouselTrack.querySelectorAll('.carousel-card'));
                const ci = cards.findIndex(c => parseInt(c.dataset.trackIndex) === currentTrackIndex);
                if (ci < 0) return;
                const n = cards.length;
                cards.forEach((card, i) => {
                    let offset = i - ci;
                    if (offset < -2) offset += n;
                    if (offset > 2) offset -= n;
                    if (Math.abs(offset) > 2) offset = offset > 0 ? 3 : -3;
                    card.classList.remove('center', 'left', 'right', 'far-left', 'far-right', 'hidden-card');
                    if (offset === 0) card.classList.add('center');
                    else if (offset === -1) card.classList.add('left');
                    else if (offset === 1) card.classList.add('right');
                    else if (offset === -2) card.classList.add('far-left');
                    else if (offset === 2) card.classList.add('far-right');
                    else card.classList.add('hidden-card');
                });
            }

            // ===== RENDER CAROUSEL =====
            function renderCarousel() {
                carouselTrack.innerHTML = '';
                tracks.forEach((track, i) => {
                    const card = document.createElement('div');
                    card.className = 'carousel-card';
                    card.dataset.trackIndex = i;
                    card.setAttribute('role', 'button');
                    card.setAttribute('aria-label', `${track.title} از ${track.artist}`);
                    card.tabIndex = 0;
                    card.innerHTML = `
                <div class="card-artwork">${createArtworkHTML(track.colors,track.badge)}</div>
                <div class="card-overlay"></div>
                <div class="card-info">
                  <span class="card-badge">${track.badge||''}</span>
                  <span class="card-title">${track.title}</span>
                  <span class="card-artist">${track.artist}</span>
                </div>`;
                    card.addEventListener('click', () => selectTrack(i));
                    card.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault();
                            selectTrack(i); } });
                    carouselTrack.appendChild(card);
                });
                positionCarouselCards();
            }

            function renderShelves() {
                const shelves = {
                    shelfSuggested: [0, 2, 5, 1],
                    shelfNew: [3, 6, 0, 4],

                    const shelf = document.getElementById(shelfId);

                    shelf.innerHTML = '';

                        const track = tracks[i];

                        card.className = 'mini-card';

                        card.innerHTML = `
                  <div class="mini-artwork">${createArtworkHTML(track.colors,track.badge)}</div>
                  <div class="mini-overlay"></div>
                  <div class="mini-info">
                    <span class="mini-title">${track.title}</span>
                    <span class="mini-artist">${track.artist}</span>

                        card.addEventListener('click', () => selectTrack(i));

                                .preventDefault();

            // ===== QUEUE PANEL =====
            function renderQueuePanel() {
                const list = $('#queueList');
                if (!list) return;
                buildQueue();
                list.innerHTML = '';
                queueIndices.forEach((i, qi) => {
                    const track = tracks[i];
                    if (!track) return;
                    const item = document.createElement('div');
                    item.className = 'queue-item' + (i === currentTrackIndex ? ' current' : '');
                    item.innerHTML = `
                <div class="queue-cover-sm" style="${createArtworkStyle(track.colors)}border-radius:6px;"></div>
                <div class="queue-info">
                  <div class="queue-title">${track.title}</div>
                  <div class="queue-artist">${track.artist}</div>
                </div>
                <span class="queue-duration">${formatTime(track.duration)}</span>
                ${track.isUploaded?`<button class="queue-remove" data-idx="${i}" aria-label="حذف از صف">✕</button>`:''}
              `;
                    item.addEventListener('click', (e) => {
                        if (!e.target.classList.contains('queue-remove')) selectTrack(i);
                    });
                    const rmBtn = item.querySelector('.queue-remove');
                    if (rmBtn) {
                        rmBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            removeUploadedTrack(i);
                        });
                    }
                    list.appendChild(item);
                });
            }

            function removeUploadedTrack(index) {
                if (!tracks[index] || !tracks[index].isUploaded) return;
                const track = tracks[index];
                if (track.src && track.src.startsWith('blob:')) {
                    URL.revokeObjectURL(track.src);
                }
                tracks.splice(index, 1);
                if (currentTrackIndex >= tracks.length) currentTrackIndex = Math.max(0, tracks.length - 1);
                if (tracks.length === 0) {
                    tracks = [...sampleTracks];
                    currentTrackIndex = 0;
                }
                buildQueue();
                stopPlayback();
                renderCarousel();
                renderShelves();
                updatePlayerUI();
                renderQueuePanel();
                showToast('آهنگ آپلودشده حذف شد.', '');
            }

            function updateLyricsPanel() {
                const content = $('#lyricsContent');
                if (!content) return;
                const track = getCurrentTrack();
                content.innerHTML = '';
                if (!track || !track.lyrics || track.lyrics.length === 0) {
                    content.innerHTML =
                        '<p style="text-align:center;color:var(--text-muted);padding:20px;">متن آهنگ برای این فایل موجود نیست.</p>';
                    return;
                }
                const activeIdx = track.isUploaded ? -1 : Math.floor((demoCurrentTime / Math.max(track.duration, 1)) * track
                    .lyrics.length);
                track.lyrics.forEach((line, i) => {
                    const div = document.createElement('div');
                    div.className = 'lyrics-line' + (i === activeIdx ? ' active' : '');
                    div.textContent = line;
                    content.appendChild(div);
                });
                if (activeIdx >= 0 && content.children[activeIdx]) {
                    content.children[activeIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }

            // ===== PLAYBACK LOGIC =====
            function stopPlayback() {
                isPlaying = false;
                demoCurrentTime = 0;
                if (demoProgressInterval) { clearInterval(demoProgressInterval);
                    demoProgressInterval = null; }
                if (!audioEl.paused) { audioEl.pause(); }
                updatePlayIcon();
                updateProgressUI();
                updateLyricsPanel();
            }

            function playTrack(index) {
                stopPlayback();
                currentTrackIndex = index;
                buildQueue();
                const track = getCurrentTrack();
                updatePlayerUI();
                if (track.isUploaded && track.src) {
                    audioEl.src = track.src;
                    audioEl.load();
                    setupAudioContext();
                    audioEl.play().then(() => {
                        isPlaying = true;
                        updatePlayIcon();
                        startVisualizerLoop();
                    }).catch(() => {
                        showToast('برای پخش کلیک کنید (محدودیت مرورگر)', '');
                        isPlaying = false;
                        updatePlayIcon();
                    });
                } else {
                    // Demo playback
                    demoCurrentTime = 0;
                    isPlaying = true;
                    updatePlayIcon();
                    startVisualizerLoop();
                    demoProgressInterval = setInterval(() => {
                        demoCurrentTime += 0.25;
                        if (demoCurrentTime >= track.duration) {
                            demoCurrentTime = track.duration;
                            if (repeatMode === 'one') {
                                demoCurrentTime = 0;
                            } else {
                                handleTrackEnd();
                            }
                        }
                        updateProgressUI();
                        updateLyricsPanel();
                    }, 250);
                }
                renderCarousel();
                renderShelves();
                updatePlayerUI();
            }

            function pauseTrack() {
                isPlaying = false;
                if (demoProgressInterval) { clearInterval(demoProgressInterval);
                    demoProgressInterval = null; }
                if (!audioEl.paused) audioEl.pause();
                updatePlayIcon();
                updateLyricsPanel();
            }

            function togglePlay() {
                if (isPlaying) {
                    pauseTrack();
                } else {
                    const track = getCurrentTrack();
                    if (track.isUploaded && track.src) {
                        audioEl.play().then(() => {
                            isPlaying = true;
                            updatePlayIcon();
                            startVisualizerLoop();
                        }).catch(() => { showToast('خطا در پخش', 'error'); });
                    } else {
                        isPlaying = true;
                        updatePlayIcon();
                        startVisualizerLoop();
                        demoProgressInterval = setInterval(() => {
                            demoCurrentTime += 0.25;
                            if (demoCurrentTime >= track.duration) {
                                demoCurrentTime = track.duration;
                                if (repeatMode === 'one') {
                                    demoCurrentTime = 0;
                                } else {
                                    handleTrackEnd();
                                }
                            }
                            updateProgressUI();
                            updateLyricsPanel();
                        }, 250);
                    }
                }
            }

            function handleTrackEnd() {
                if (repeatMode === 'one') {
                    demoCurrentTime = 0;
                    if (getCurrentTrack().isUploaded && getCurrentTrack().src) {
                        audioEl.currentTime = 0;
                        audioEl.play().catch(() => {});
                    }
                    return;
                }
                if (repeatMode === 'all' || true) {
                    nextTrack();
                } else {
                    pauseTrack();
                }
            }

            function nextTrack() {
                buildQueue();
                const ci = queueIndices.indexOf(currentTrackIndex);
                const nextIdx = (ci + 1) % queueIndices.length;
                playTrack(queueIndices[nextIdx]);
            }

            function prevTrack() {
                buildQueue();
                const ci = queueIndices.indexOf(currentTrackIndex);
                const prevIdx = (ci - 1 + queueIndices.length) % queueIndices.length;
                playTrack(queueIndices[prevIdx]);
            }

            function selectTrack(index) {
                if (index >= 0 && index < tracks.length) {
                    playTrack(index);
                }
            }

            function updateProgressUI() {
                const track = getCurrentTrack();
                const dur = track.duration || 1;
                let ct;
                if (track.isUploaded && track.src && audioEl.duration) {
                    ct = audioEl.currentTime;
                } else {
                    ct = demoCurrentTime;
                }
                const pct = Math.min(100, (ct / dur) * 100);
                progressFill.style.width = pct + '%';
                timeCurrentEl.textContent = formatTime(ct);
                timeDurationEl.textContent = formatTime(dur);
                progressBar.setAttribute('aria-valuenow', Math.round(pct));
            }

            // ===== AUDIO EVENTS =====
            audioEl.addEventListener('loadedmetadata', () => {
                const track = getCurrentTrack();
                if (track.isUploaded && audioEl.duration && isFinite(audioEl.duration)) {
                    track.duration = Math.round(audioEl.duration);
                    updatePlayerUI();
                }
                setupAudioContext();
            });
            audioEl.addEventListener('timeupdate', () => {
                if (getCurrentTrack().isUploaded && getCurrentTrack().src) {
                    demoCurrentTime = audioEl.currentTime;
                    updateProgressUI();
                    updateLyricsPanel();
                }
            });
            audioEl.addEventListener('ended', () => {
                if (getCurrentTrack().isUploaded && getCurrentTrack().src) {
                    handleTrackEnd();
                }
            });
            audioEl.addEventListener('play', () => { isPlaying = true;
                updatePlayIcon();
                startVisualizerLoop(); });
            audioEl.addEventListener('pause', () => { if (!audioEl.ended) { isPlaying = false;
                    updatePlayIcon(); } });
            audioEl.addEventListener('error', () => { showToast('خطا در بارگذاری فایل صوتی', 'error');
                pauseTrack(); });

            // ===== PROGRESS BAR =====
            progressBar.addEventListener('click', (e) => {
                const rect = progressBar.getBoundingClientRect();
                const pct = (e.clientX - rect.left) / rect.width;
                seekToPercent(Math.max(0, Math.min(1, pct)));
            });
            progressBar.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
                    e.preventDefault();
                    const track = getCurrentTrack();
                    const dur = track.duration || 1;
                    const delta = e.key === 'ArrowRight' ? 5 : -5;
                    let ct = track.isUploaded && track.src && audioEl.duration ? audioEl.currentTime :
                        demoCurrentTime;
                    ct = Math.max(0, Math.min(dur, ct + delta));
                    seekToTime(ct);
                }
            });
            let progressDragging = false;
            progressBar.addEventListener('pointerdown', (e) => {
                progressDragging = true;
                progressBar.setPointerCapture(e.pointerId);
                const rect = progressBar.getBoundingClientRect();
                const pct = (e.clientX - rect.left) / rect.width;
                seekToPercent(Math.max(0, Math.min(1, pct)));
            });
            document.addEventListener('pointermove', (e) => {
                if (!progressDragging) return;
                const rect = progressBar.getBoundingClientRect();
                const pct = (e.clientX - rect.left) / rect.width;
                seekToPercent(Math.max(0, Math.min(1, pct)));
            });
            document.addEventListener('pointerup', () => { progressDragging = false; });

            function seekToPercent(pct) {
                const track = getCurrentTrack();
                const dur = track.duration || 1;
                seekToTime(pct * dur);
            }

            function seekToTime(time) {
                const track = getCurrentTrack();
                if (track.isUploaded && track.src && audioEl.duration) {
                    audioEl.currentTime = time;
                } else {
                    demoCurrentTime = time;
                }
                updateProgressUI();
                updateLyricsPanel();
            }

            // ===== VOLUME =====
            volumeSlider.addEventListener('input', () => {
                volume = parseInt(volumeSlider.value) / 100;
                audioEl.volume = isMuted ? 0 : volume;
            });
            $('#btnVolume').addEventListener('click', () => {
                isMuted = !isMuted;
                audioEl.volume = isMuted ? 0 : volume;
                $('#btnVolume').textContent = isMuted ? '🔇' : '🔊';
            });

            // ===== BUTTON EVENTS =====
            btnPlay.addEventListener('click', togglePlay);
            $('#btnNext').addEventListener('click', nextTrack);
            $('#btnPrev').addEventListener('click', prevTrack);
            btnShuffle.addEventListener('click', () => {
                isShuffled = !isShuffled;
                if (isShuffled) {
                    shuffleOrder = [...Array(tracks.length).keys()];
                    for (let i = shuffleOrder.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [shuffleOrder[i], shuffleOrder[j]] = [shuffleOrder[j], shuffleOrder[i]];
                    }
                }
                buildQueue();
                btnShuffle.style.color = isShuffled ? 'var(--primary)' : '';
                renderQueuePanel();
                showToast(isShuffled ? 'پخش تصادفی فعال شد' : 'پخش تصادفی غیرفعال شد', '');
            });
            btnRepeat.addEventListener('click', () => {
                const modes = ['off', 'all', 'one'];
                const ci = modes.indexOf(repeatMode);
                repeatMode = modes[(ci + 1) % 3];
                updatePlayerUI();
                showToast({ off: 'تکرار غیرفعال', all: 'تکرار همه آهنگ‌ها', one: 'تکرار یک آهنگ' } [repeatMode],
                    '');
            });
            btnLike.addEventListener('click', () => {
                const track = getCurrentTrack();
                if (likedTracks.has(track.id)) {
                    likedTracks.delete(track.id);
                } else {
                    likedTracks.add(track.id);
                }
                updatePlayerUI();
                showToast(likedTracks.has(track.id) ? 'به علاقه‌مندی‌ها اضافه شد ❤️' : 'از علاقه‌مندی‌ها حذف شد',
                    '');
            });
            $('#btnLyrics').addEventListener('click', () => {
                updateLyricsPanel();
                openPanel('lyricsOverlay');
            });
            $('#btnQueue').addEventListener('click', () => {
                renderQueuePanel();
                openPanel('queueOverlay');
            });
            $('#btnUpload').addEventListener('click', () => openPanel('uploadOverlay'));
            $('#carouselPrev').addEventListener('click', prevTrack);
            $('#carouselNext').addEventListener('click', nextTrack);

            // ===== KEYBOARD NAVIGATION =====
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if (e.key === 'ArrowLeft') { e.preventDefault();
                    nextTrack(); } else if (e.key === 'ArrowRight') { e.preventDefault();
                    prevTrack(); } else if (e.key === ' ') { e.preventDefault();
                    togglePlay(); }
            });

            // ===== SEARCH =====
            searchInput.addEventListener('input', () => {
                const query = searchInput.value.trim().toLowerCase();
                searchResults.innerHTML = '';
                if (!query) { searchResults.classList.remove('active'); return; }
                const results = tracks.filter(t =>
                    t.title.toLowerCase().includes(query) || t.artist.toLowerCase().includes(query) || t.genre
                    .toLowerCase().includes(query)
                );
                if (results.length === 0) {
                    searchResults.innerHTML =
                        '<div class="search-no-result">🎵 هیچ نتیجه‌ای یافت نشد<br><small>عبارت دیگری را امتحان کنید</small></div>';
                } else {
                    results.forEach(track => {
                        const item = document.createElement('div');
                        item.className = 'search-result-item';
                        item.setAttribute('role', 'option');
                        item.innerHTML = `
                  <div class="search-result-cover" style="${createArtworkStyle(track.colors)}border-radius:6px;"></div>
                  <div class="search-result-info">
                    <span class="search-result-title">${track.title}</span>
                    <span class="search-result-artist">${track.artist} · ${track.genre}</span>
                  </div>`;
                        item.addEventListener('click', () => {
                            const idx = tracks.indexOf(track);
                            if (idx >= 0) selectTrack(idx);
                            searchResults.classList.remove('active');
                            searchInput.value = '';
                        });
                        searchResults.appendChild(item);
                    });
                }
                searchResults.classList.add('active');
            });
            searchInput.addEventListener('focus', () => {
                if (searchInput.value.trim()) searchResults.classList.add('active');
            });
            document.addEventListener('click', (e) => {
                if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                    searchResults.classList.remove('active');
                }
            });

            // ===== UPLOAD =====
            const dropZone = $('#dropZone');
            const fileInput = $('#fileInput');
            dropZone.addEventListener('click', () => fileInput.click());
            dropZone.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault();
                    fileInput.click(); } });
            fileInput.addEventListener('change', handleFileSelect);
            dropZone.addEventListener('dragover', (e) => { e.preventDefault();
                dropZone.classList.add('drag-over'); });
            dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('drag-over'); });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                const files = e.dataTransfer.files;
                if (files.length > 0) processFile(files[0]);
            });

            function handleFileSelect(e) {
                const files = e.target.files;
                if (files.length > 0) processFile(files[0]);
                fileInput.value = '';
            }

            function processFile(file) {
                if (!file.type.startsWith('audio/')) {
                    showToast('⚠️ لطفاً فقط فایل صوتی انتخاب کنید (mp3, wav, ogg)', 'error');
                    return;
                }
                const url = URL.createObjectURL(file);
                const nameWithoutExt = file.name.replace(/\.[^.]+$/, '');
                const hash = nameWithoutExt.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
                const hue1 = (hash * 37) % 360;
                const hue2 = (hue1 + 40) % 360;
                const hue3 = (hue1 + 180) % 360;
                const colors = [
                    `hsl(${hue1},50%,12%)`,
                    `hsl(${hue2},45%,18%)`,
                    `hsl(${hue3},40%,8%)`,
                    `hsl(${hue1+20},55%,22%)`
                ];
                const newTrack = {
                    id: 'upload_' + Date.now(),
                    title: nameWithoutExt,
                    artist: 'آپلود شده توسط شما',
                    album: 'کتابخانه شخصی',
                    duration: 0,
                    genre: 'Unknown',
                    mood: 'Custom',
                    badge: 'Upload',
                    colors: colors,
                    lyrics: [],
                    isUploaded: true,
                    src: url,
                    file: file
                };
                // Get duration
                const tempAudio = new Audio();
                tempAudio.preload = 'metadata';
                tempAudio.src = url;
                tempAudio.addEventListener('loadedmetadata', () => {
                    if (tempAudio.duration && isFinite(tempAudio.duration)) {
                        newTrack.duration = Math.round(tempAudio.duration);
                    } else {
                        newTrack.duration = 180;
                    }
                    updatePlayerUI();
                    renderQueuePanel();
                });
                tempAudio.addEventListener('error', () => {
                    newTrack.duration = 180;
                    updatePlayerUI();
                });
                tracks.push(newTrack);
                buildQueue();
                renderCarousel();
                renderShelves();
                updatePlayerUI();
                renderQueuePanel();
                closePanel('uploadOverlay');
                showToast('✅ آهنگ با موفقیت اضافه شد: ' + nameWithoutExt, 'success');
                // Select the new track
                selectTrack(tracks.length - 1);
            }

            // ===== INIT =====
            function initApp() {
                audioEl.volume = volume;
                buildQueue();
                renderCarousel();
                renderShelves();
                updatePlayerUI();
                updateProgressUI();
                updateLyricsPanel();
                // Set initial track
                selectTrack(0);
                pauseTrack(); // Start paused
                updatePlayerUI();
                showToast('🌌 به Cosmic Wave خوش آمدید! موسیقی‌های نمونه برای نمایش رابط کاربری هستند. برای پخش واقعی، آهنگ خودتان را آپلود کنید.',
                    '');
            }

            // ===== HANDLE WINDOW RESIZE FOR CAROUSEL =====
            window.addEventListener('resize', () => {
                positionCarouselCards();
            });

            // ===== START APP =====
            initApp();
            console.log('🚀 Cosmic Wave Music Platform ready.');
            console.log('📝 Demo tracks are for UI demonstration only. Upload your own audio files for real playback.');
            console.log('🔒 All files are processed locally on your device.');
        })();
    </script>
</body>
</html>
