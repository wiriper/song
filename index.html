<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#02030a">
    <title>Auralis Vision Ultra — Spatial Music Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #02030a;
            --bg-1: #050816;
            --bg-2: #07111f;
            --text: #f8fafc;
            --text-soft: rgba(248, 250, 252, .82);
            --muted: rgba(203, 213, 225, .64);
            --faint: rgba(203, 213, 225, .38);
            --glass: rgba(8, 14, 28, .46);
            --glass-strong: rgba(10, 18, 34, .64);
            --glass-soft: rgba(255, 255, 255, .07);
            --border: rgba(255, 255, 255, .14);
            --border-strong: rgba(255, 255, 255, .26);
            --cyan: #38d7ff;
            --blue: #4f8cff;
            --violet: #a78bfa;
            --pink: #fb7185;
            --green: #34d399;
            --amber: #fbbf24;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --shadow: rgba(0, 0, 0, .55);
            --glow-cyan: rgba(56, 215, 255, .3);
            --glow-blue: rgba(79, 140, 255, .28);
            --radius-xl: 36px;
            --radius-lg: 28px;
            --radius-md: 20px;
            --radius-sm: 14px;
            --nav-h: 64px;
            --player-h: 98px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --content-max: 1200px;
            --ease: cubic-bezier(.22, .8, .22, 1);
            --track-a: #38d7ff;
            --track-b: #2563eb;
            --track-c: #020617;
            --mx: 0;
            --my: 0;
            --blur-main: 30px;
            --effect-opacity: 1;
        }
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            height: 100%;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        body {
            font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg-0);
            color: var(--text);
            min-height: 100%;
            min-height: 100svh;
            min-height: 100dvh;
            overflow: hidden;
            position: fixed;
            inset: 0;
            -webkit-user-select: none;
            user-select: none;
            -webkit-overflow-scrolling: touch;
        }
        button {
            font: inherit;
            color: inherit;
            border: 0;
            background: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            touch-action: manipulation;
        }
        button:focus-visible {
            outline: 2px solid var(--cyan);
            outline-offset: 3px;
            border-radius: 8px;
        }
        input,
        select,
        textarea {
            font: inherit;
            color: inherit;
        }
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
            touch-action: pan-y;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 5px;
            border-radius: 5px;
            background: rgba(255, 255, 255, .18);
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            margin-top: -7px;
            box-shadow: 0 0 12px var(--glow-cyan), 0 2px 6px rgba(0, 0, 0, .3);
            cursor: pointer;
            border: 2px solid var(--cyan);
        }
        img,
        svg {
            display: block;
            max-width: 100%;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        @media(prefers-reduced-motion:reduce) {
            * {
                animation-duration: .001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .001ms !important;
                scroll-behavior: auto !important;
            }
        }
        .app {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .background {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 45%, var(--track-b) 0%, var(--track-c) 50%, #01030d 100%);
            transition: background 2.5s var(--ease);
            opacity: var(--effect-opacity);
        }
        .background::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at calc(50% + var(--mx)*2) calc(48% + var(--my)*2), var(--track-a) 0%, transparent 55%),
            radial-gradient(ellipse at calc(28% + var(--mx)*1.5) calc(18% + var(--my)*1.5), var(--track-b) 0%, transparent 48%);
            opacity: .62;
            transition: background 2.5s var(--ease);
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: .35;
            pointer-events: none;
            will-change: transform;
        }
        .orb-one {
            width: 350px;
            height: 350px;
            background: var(--track-a);
            top: -90px;
            left: 8%;
            animation: orbA 25s ease-in-out infinite;
        }
        .orb-two {
            width: 280px;
            height: 280px;
            background: var(--track-b);
            bottom: -80px;
            right: 6%;
            animation: orbB 28s ease-in-out infinite;
            opacity: .28;
        }
        @keyframes orbA {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(40px, -30px) scale(1.1);
            }
        }
        @keyframes orbB {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(-30px, 25px) scale(1.08);
            }
        }
        .particle-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            pointer-events: none;
            animation: floatP linear infinite;
        }
        @keyframes floatP {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: .6;
            }
            90% {
                opacity: .6;
            }
            100% {
                transform: translateY(-100vh) translateX(20px);
                opacity: 0;
            }
        }
        .noise {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: .025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='nz'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23nz)'/%3E%3C/svg%3E");
            background-size: 150px 150px;
        }
        .vignette {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 52%, rgba(0, 0, 0, .55) 100%);
        }
        .top-nav {
            position: fixed;
            top: calc(10px + var(--safe-top));
            left: 50%;
            transform: translateX(-50%);
            width: min(960px, calc(100vw - 28px));
            height: var(--nav-h);
            z-index: 120;
            border-radius: var(--radius-xl);
            background: linear-gradient(135deg, rgba(255, 255, 255, .11), rgba(255, 255, 255, .035));
            background-color: var(--glass-strong);
            backdrop-filter: blur(var(--blur-main)) saturate(160%);
            -webkit-backdrop-filter: blur(var(--blur-main)) saturate(160%);
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5), inset 0 1px 0 rgba(255, 255, 255, .1);
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 4px;
        }
        .nav-cluster {
            display: flex;
            align-items: center;
            gap: 3px;
            flex-shrink: 0;
        }
        .nav-cluster.left {
            flex: 0 0 auto;
        }
        .nav-cluster.center {
            flex: 1 1 auto;
            justify-content: center;
            min-width: 0;
            gap: 7px;
        }
        .nav-cluster.right {
            flex: 0 0 auto;
        }
        .nav-btn {
            width: 40px;
            height: 40px;
            min-width: 40px;
            min-height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-soft);
            transition: all .2s var(--ease);
            flex-shrink: 0;
            position: relative;
        }
        .nav-btn:hover {
            background: rgba(255, 255, 255, .1);
            color: #fff;
        }
        .nav-btn:active {
            transform: scale(.88);
            transition: transform .08s;
        }
        .nav-btn svg {
            width: 19px;
            height: 19px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .nav-center-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 0;
            overflow: hidden;
        }
        .nav-title {
            font-weight: 700;
            font-size: clamp(12px, 1.2vw, 14px);
            letter-spacing: -.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
            color: #fff;
            line-height: 1.2;
        }
        .nav-artist {
            font-weight: 400;
            font-size: 10px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }
        .nav-badge {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--cyan);
            font-weight: 600;
            background: rgba(56, 215, 255, .1);
            padding: 3px 7px;
            border-radius: 14px;
            border: 1px solid rgba(56, 215, 255, .2);
            flex-shrink: 0;
            white-space: nowrap;
        }
        .nav-avatar {
            width: 34px;
            height: 34px;
            min-width: 34px;
            min-height: 34px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--cyan), var(--blue), var(--violet), var(--cyan));
            box-shadow: 0 0 14px var(--glow-cyan);
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, .15);
        }
        .stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: calc(80px + var(--safe-top));
            padding-bottom: calc(140px + var(--safe-bottom));
            position: relative;
            z-index: 2;
            pointer-events: none;
        }
        .stage>* {
            pointer-events: auto;
        }
        .hero-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .hero-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--muted);
            font-weight: 500;
        }
        .hero-badge {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: .05em;
            text-transform: uppercase;
            padding: 5px 11px;
            border-radius: 18px;
            background: var(--glass-soft);
            border: 1px solid var(--border);
            color: var(--text-soft);
        }
        .hero-badge.accent {
            border-color: rgba(56, 215, 255, .32);
            color: var(--cyan);
        }
        .audio-status-badge {
            display: none;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: .06em;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 10px;
            background: rgba(245, 158, 11, .1);
            border: 1px solid rgba(245, 158, 11, .25);
            color: var(--amber);
            flex-shrink: 0;
        }
        .audio-status-badge.visible {
            display: inline-block;
        }
        .audio-status-badge.error {
            background: rgba(239, 68, 68, .12);
            border-color: rgba(239, 68, 68, .3);
            color: var(--danger);
        }
        .carousel-wrap {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1300px;
            height: 480px;
            z-index: 3;
            touch-action: pan-y;
        }
        .carousel {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
        }
        .carousel-card {
            position: absolute;
            width: 300px;
            height: 420px;
            border-radius: var(--radius-xl);
            transition: transform .6s var(--ease), opacity .5s, filter .5s;
            cursor: pointer;
            will-change: transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform-style: preserve-3d;
        }
        .carousel-card.active {
            z-index: 20;
            filter: drop-shadow(0 25px 45px rgba(0, 0, 0, .5)) drop-shadow(0 0 30px var(--glow-cyan));
        }
        .carousel-card.near {
            z-index: 10;
            filter: blur(.2px) drop-shadow(0 15px 30px rgba(0, 0, 0, .4));
        }
        .carousel-card.far {
            z-index: 5;
            filter: blur(.8px) drop-shadow(0 6px 18px rgba(0, 0, 0, .3));
        }
        .carousel-card.hidden-card {
            z-index: 1;
            opacity: 0 !important;
            pointer-events: none;
        }
        .card {
            width: 100%;
            height: 100%;
            border-radius: var(--radius-xl);
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .45), inset 0 1px 0 rgba(255, 255, 255, .08);
            background: #000;
        }
        .card-cover-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-xl);
            z-index: 0;
        }
        .card-art {
            position: absolute;
            inset: 0;
            border-radius: var(--radius-xl);
            overflow: hidden;
            z-index: 1;
        }
        .art-layer {
            position: absolute;
            inset: 0;
            border-radius: var(--radius-xl);
        }
        .card-bottom-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 48%;
            background: linear-gradient(0deg, rgba(0, 0, 0, .88) 0%, transparent 100%);
            border-radius: 0 0 var(--radius-xl) var(--radius-xl);
            z-index: 2;
        }
        .card-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 3;
            padding: 18px 16px 14px;
        }
        .card-badge {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: .06em;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .09);
            border: 1px solid rgba(255, 255, 255, .15);
            color: #fff;
        }
        .card-badge.verified {
            border-color: rgba(56, 215, 255, .35);
            color: var(--cyan);
        }
        .card-title {
            font-weight: 800;
            font-size: 19px;
            letter-spacing: -.03em;
            color: #fff;
            margin: 2px 0 0;
        }
        .card-artist {
            font-weight: 400;
            font-size: 12px;
            color: var(--muted);
        }
        .card-glow-ring {
            position: absolute;
            inset: -3px;
            border-radius: calc(var(--radius-xl) + 3px);
            border: 2px solid transparent;
            z-index: 1;
            pointer-events: none;
            transition: border-color .5s;
        }
        .carousel-card.active .card-glow-ring {
            border-color: rgba(56, 215, 255, .35);
            box-shadow: 0 0 24px rgba(56, 215, 255, .15);
        }
        .now-playing-indicator {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: #fff;
            font-weight: 600;
            background: rgba(0, 0, 0, .5);
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .15);
            display: none;
            align-items: center;
            gap: 5px;
        }
        .carousel-card.active .now-playing-indicator {
            display: flex;
        }
        .now-playing-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--cyan);
            animation: pDot 1.3s ease-in-out infinite;
        }
        @keyframes pDot {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: .3;
            }
        }
        .player {
            position: fixed;
            bottom: calc(14px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%);
            width: min(1060px, calc(100vw - 24px));
            min-height: var(--player-h);
            z-index: 120;
            border-radius: var(--radius-xl);
            background: linear-gradient(135deg, rgba(255, 255, 255, .1), rgba(255, 255, 255, .03));
            background-color: var(--glass-strong);
            backdrop-filter: blur(var(--blur-main)) saturate(160%);
            -webkit-backdrop-filter: blur(var(--blur-main)) saturate(160%);
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5), inset 0 1px 0 rgba(255, 255, 255, .1);
            display: flex;
            align-items: center;
            padding: 8px 16px;
            gap: 12px;
        }
        .player-controls-left {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .player-track-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 0;
        }
        .player-track-info {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        .player-mini-art {
            width: 44px;
            height: 44px;
            min-width: 44px;
            min-height: 44px;
            border-radius: 10px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border);
            background: #000;
        }
        .player-mini-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .player-track-text {
            min-width: 0;
            overflow: hidden;
        }
        .player-track-title {
            font-weight: 700;
            font-size: 13px;
            letter-spacing: -.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }
        .player-track-artist {
            font-weight: 400;
            font-size: 10px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-progress-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .player-time {
            font-size: 9px;
            font-weight: 500;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
            min-width: 30px;
            text-align: center;
        }
        .progress-track {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, .12);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            overflow: visible;
            touch-action: pan-y;
        }
        .progress-fill {
            height: 100%;
            border-radius: 6px;
            background: linear-gradient(90deg, var(--cyan), var(--blue));
            box-shadow: 0 0 8px var(--glow-cyan);
            transition: width .1s linear;
            pointer-events: none;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 10px var(--glow-cyan);
            opacity: 0;
            transition: opacity .2s;
            pointer-events: none;
        }
        .progress-track:hover .progress-fill::after,
        .progress-track.dragging .progress-fill::after {
            opacity: 1;
        }
        .player-controls-right {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .player-btn {
            width: 36px;
            height: 36px;
            min-width: 36px;
            min-height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-soft);
            transition: all .2s var(--ease);
            flex-shrink: 0;
        }
        .player-btn svg {
            width: 17px;
            height: 17px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .player-btn:hover {
            background: rgba(255, 255, 255, .1);
            color: #fff;
        }
        .player-btn:active {
            transform: scale(.86);
            transition: transform .08s;
        }
        .player-btn.accent {
            color: var(--cyan);
        }
        .player-btn.liked {
            color: var(--pink);
        }
        .play-btn-wrap {
            position: relative;
            flex-shrink: 0;
        }
        .play-btn {
            width: 48px;
            height: 48px;
            min-width: 48px;
            min-height: 48px;
            border-radius: 50%;
            background: #fff;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 24px rgba(0, 0, 0, .4), 0 0 30px var(--glow-cyan);
            transition: all .25s var(--ease);
        }
        .play-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            stroke: none;
        }
        .play-btn:hover {
            transform: scale(1.06);
        }
        .play-btn:active {
            transform: scale(.93);
        }
        .volume-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .volume-slider {
            width: 0;
            overflow: hidden;
            transition: width .3s var(--ease);
        }
        .volume-wrap:hover .volume-slider {
            width: 60px;
        }
        .volume-slider input {
            width: 60px;
            height: 4px;
        }
        .overlay-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity .4s;
        }
        .overlay-backdrop.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .panel-overlay {
            position: fixed;
            z-index: 160;
            border-radius: var(--radius-xl);
            background: linear-gradient(135deg, rgba(255, 255, 255, .1), rgba(255, 255, 255, .03));
            background-color: var(--glass-strong);
            backdrop-filter: blur(28px) saturate(160%);
            -webkit-backdrop-filter: blur(28px) saturate(160%);
            border: 1px solid var(--border-strong);
            box-shadow: 0 25px 80px rgba(0, 0, 0, .6), inset 0 1px 0 rgba(255, 255, 255, .1);
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s, transform .4s var(--ease);
            overflow: hidden;
        }
        .panel-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .panel-overlay.center-modal {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(.94);
            width: min(680px, calc(100vw - 20px));
            max-height: 82vh;
        }
        .panel-overlay.center-modal.open {
            transform: translate(-50%, -50%) scale(1);
        }
        .panel-overlay.side-panel {
            top: calc(90px + var(--safe-top));
            bottom: calc(130px + var(--safe-bottom));
            right: 10px;
            width: min(400px, calc(100vw - 20px));
            transform: translateX(calc(100% + 40px));
        }
        .panel-overlay.side-panel.open {
            transform: translateX(0);
        }
        .panel-overlay.bottom-sheet {
            top: auto;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            max-height: 75vh;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            transform: translateY(100%);
        }
        .panel-overlay.bottom-sheet.open {
            transform: translateY(0);
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px 8px;
            border-bottom: 1px solid var(--border);
        }
        .panel-title {
            font-weight: 700;
            font-size: 15px;
            color: #fff;
        }
        .panel-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
        }
        .panel-close:hover {
            background: rgba(255, 255, 255, .1);
            color: #fff;
        }
        .panel-close svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }
        .panel-body {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            padding: 8px 12px 12px;
        }
        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            font-size: 15px;
            color: #fff;
            outline: none;
        }
        .search-input:focus {
            border-color: var(--cyan);
        }
        .search-results {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px 8px;
        }
        .search-result-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            min-height: 44px;
        }
        .search-result-item:hover {
            background: rgba(255, 255, 255, .06);
        }
        .search-mini-art {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            background: #000;
        }
        .search-mini-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .search-result-title {
            font-weight: 600;
            font-size: 13px;
            color: #fff;
        }
        .search-result-artist {
            font-size: 10px;
            color: var(--muted);
        }
        .queue-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px 8px;
        }
        .queue-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            min-height: 44px;
        }
        .queue-item.active {
            background: rgba(56, 215, 255, .08);
            border: 1px solid rgba(56, 215, 255, .2);
        }
        .lyrics-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 6px 18px 18px;
        }
        .lyric-line {
            padding: 6px 0;
            font-size: 13px;
            color: var(--faint);
            transition: all .3s;
        }
        .lyric-line.active {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
        }
        .lyric-line.prev {
            color: var(--muted);
        }
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
            padding: 6px 12px 12px;
        }
        .library-card {
            border-radius: var(--radius-md);
            padding: 14px 10px;
            background: var(--glass-soft);
            border: 1px solid var(--border);
            cursor: pointer;
            text-align: center;
            min-height: 44px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .creator-field {
            display: flex;
            flex-direction: column;
            gap: 3px;
            margin-bottom: 8px;
        }
        .creator-field label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .04em;
            color: var(--muted);
        }
        .creator-field input,
        .creator-field select {
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 9px 11px;
            font-size: 13px;
            color: #fff;
            outline: none;
        }
        .creator-btn {
            padding: 9px 16px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 12px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid var(--border);
            color: #fff;
            cursor: pointer;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .creator-btn.accent {
            background: rgba(56, 215, 255, .12);
            border-color: rgba(56, 215, 255, .3);
            color: var(--cyan);
        }
        .toast-container {
            position: fixed;
            top: calc(90px + var(--safe-top));
            right: 14px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }
        .toast {
            background: var(--glass-strong);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 9px 15px;
            font-size: 12px;
            color: #fff;
            box-shadow: 0 8px 30px rgba(0, 0, 0, .4);
            animation: tIn .35s, tOut .3s 2s forwards;
            pointer-events: auto;
            max-width: 260px;
        }
        @keyframes tIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes tOut {
            to {
                opacity: 0;
                transform: translateX(30px);
            }
        }
        @media(max-width:1023px) {
            .carousel-card {
                width: 270px;
                height: 370px;
            }
            .carousel-wrap {
                height: 420px;
            }
        }
        @media(max-width:699px) {
            .top-nav {
                height: 48px;
                border-radius: 24px;
                padding: 0 8px;
                gap: 2px;
                width: calc(100vw - 12px);
            }
            .nav-btn {
                width: 32px;
                height: 32px;
                min-width: 32px;
                min-height: 32px;
            }
            .nav-btn svg {
                width: 15px;
                height: 15px;
            }
            .nav-title {
                font-size: 10px;
                max-width: 100px;
            }
            .nav-artist {
                font-size: 8px;
            }
            .carousel-card {
                width: min(76vw, 260px);
                height: 340px;
            }
            .carousel-wrap {
                height: 370px;
            }
            .player {
                min-height: auto;
                flex-wrap: wrap;
                border-radius: 24px;
                padding: 6px 10px;
                bottom: calc(6px + var(--safe-bottom));
            }
            .play-btn {
                width: 38px;
                height: 38px;
                min-width: 38px;
                min-height: 38px;
            }
            .player-btn {
                width: 30px;
                height: 30px;
                min-width: 30px;
                min-height: 30px;
            }
            .panel-overlay.center-modal {
                width: calc(100vw - 10px);
                max-height: 88vh;
                border-radius: var(--radius-lg);
            }
            .panel-overlay.side-panel {
                top: auto;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                height: 60vh;
                border-radius: var(--radius-lg) var(--radius-lg) 0 0;
                transform: translateY(100%);
            }
            .panel-overlay.side-panel.open {
                transform: translateY(0);
            }
            .panel-overlay.bottom-sheet {
                max-height: 70vh;
            }
        }
        body.profile-low .orb {
            display: none;
        }
        body.profile-low .particle-layer {
            display: none;
        }
        body.profile-low .top-nav,
        body.profile-low .player {
            backdrop-filter: blur(12px);
        }
        body.profile-low .panel-overlay {
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body>
    <audio id="audio" preload="metadata" playsinline webkit-playsinline></audio>
    <div class="app" id="app">
        <div class="background" aria-hidden="true" id="bgLayer">
            <div class="orb orb-one"></div>
            <div class="orb orb-two"></div>
            <div class="particle-layer" id="particleLayer"></div>
            <div class="noise"></div>
            <div class="vignette"></div>
        </div>
        <div class="sr-only" id="announcer" aria-live="polite"></div>
        <header class="top-nav" id="topNav">
            <div class="nav-cluster left">
                <button class="nav-btn" aria-label="Previous track" id="btnBack"><svg viewBox="0 0 24 24"><polyline points="19 20 9 12 19 4"/></svg></button>
                <button class="nav-btn" aria-label="Next track" id="btnForward"><svg viewBox="0 0 24 24"><polyline points="5 4 15 12 5 20"/></svg></button>
                <button class="nav-btn" aria-label="Library" id="btnLibrary"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></button>
            </div>

                    <span class="nav-artist" id="navArtist">Nova Vale</span>
                </div>
                <span class="nav-badge" id="navBadge">SPATIAL</span>

                <span class="audio-status-badge error" id="audioErrorBadge">ERROR</span>
            </div>
            <div class="nav-cluster right">
                <button class="nav-btn" aria-label="Search" id="btnSearch"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
                <button class="nav-btn" aria-label="Queue" id="btnQueue"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1"/><circle cx="3" cy="12" r="1"/><circle cx="3" cy="18" r="1"/></svg></button>
                <button class="nav-btn" aria-label="Lyrics" id="btnLyrics"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></button>
                <button class="nav-btn" aria-label="Creator Studio" id="btnCreator"><svg viewBox="0 0 24 24"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/></svg></button>
                <div class="nav-avatar"></div>
            </div>
        </header>
        <main class="stage" id="stage">

                <span class="hero-badge" id="heroBPM">118 BPM</span>

        <footer class="player" id="player">
            <div class="player-controls-left">
                <button class="player-btn" aria-label="Shuffle" id="btnShuffle"><svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg></button>
                <button class="player-btn" aria-label="Previous" id="btnPrev"><svg viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20" fill="currentColor" stroke="none"/><line x1="5" y1="5" x2="5" y2="19" stroke="currentColor" stroke-width="2"/></svg></button>
                <div class="play-btn-wrap"><button class="play-btn" aria-label="Play" id="btnPlay"><svg viewBox="0 0 24 24" id="iconPlay"><polygon points="5 3 19 12 5 21 5 3" fill="currentColor"/></svg><svg viewBox="0 0 24 24" id="iconPause" style="display:none"><rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/></svg></button></div>
                <button class="player-btn" aria-label="Next" id="btnNext"><svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4" fill="currentColor" stroke="none"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg></button>
                <button class="player-btn" aria-label="Repeat off" id="btnRepeat"><svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg><span style="font-size:8px;font-weight:700;display:none" id="repeatOneBadge">1</span></button>

                <button class="player-btn" aria-label="Lyrics panel" id="btnLyricsPanel"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></button>
                <button class="player-btn" aria-label="Queue panel" id="btnQueuePanel"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1"/><circle cx="3" cy="12" r="1"/><circle cx="3" cy="18" r="1"/></svg></button>

                    <div class="volume-slider"><input type="range" min="0" max="100" value="76" aria-label="Volume" id="volumeSlider"></div>

        <div class="overlay-backdrop" id="overlayBackdrop"></div>
        <section class="panel-overlay center-modal" id="searchOverlay" role="dialog" aria-modal="true">

                </div>
                <div class="creator-code-block" id="manifestPreview" style="margin-top:10px;max-height:150px;overflow-y:auto;font-size:10px;background:rgba(0,0,0,.4);padding:10px;border-radius:12px;white-space:pre-wrap;display:none"></div>

            function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

            function formatTime(sec) { const s = Math.floor(sec);
                const m = Math.floor(s / 60); return m + ':' + String(s % 60).padStart(2, '0'); }

            function getTrack() { return state.tracks[state.currentIndex] || state.tracks[0] || FALLBACK_TRACKS[0]; }

            function announce(msg) { const el = document.getElementById('announcer'); if (el) el.textContent = msg; }

            function showToast(msg) {
                const container = document.getElementById('toastContainer');
                const t = document.createElement('div');
                t.className = 'toast';
                t.textContent = msg;
                container.appendChild(t);
                setTimeout(() => t.remove(), 2500);
            }

            function saveState() {
                try {
                    const data = {
                        currentIndex: state.currentIndex,
                        volume: state.volume,
                        muted: state.muted,
                        shuffle: state.shuffle,
                        repeat: state.repeat,
                        liked: state.liked,
                        recent: state.recent.slice(0, 30),
                        performanceProfile: state.performanceProfile
                    };
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                } catch (e) {}
            }

            function loadState() {
                try {
                    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
                    if (saved) {
                        if (typeof saved.currentIndex === 'number') state.currentIndex = saved.currentIndex;
                        if (typeof saved.volume === 'number') state.volume = clamp(saved.volume, 0, 1);
                        if (typeof saved.muted === 'boolean') state.muted = saved.muted;
                        if (typeof saved.shuffle === 'boolean') state.shuffle = saved.shuffle;
                        if (['off', 'all', 'one'].includes(saved.repeat)) state.repeat = saved.repeat;
                        if (saved.liked) state.liked = saved.liked;
                        if (Array.isArray(saved.recent)) state.recent = saved.recent;
                        if (saved.performanceProfile) state.performanceProfile = saved.performanceProfile;
                    }
                } catch (e) {}
            }

            function detectPerformanceProfile() {
                let profile = 'high';
                const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                const saveData = navigator.connection && navigator.connection.saveData;
                const memory = navigator.deviceMemory || 4;
                const width = window.innerWidth;
                if (reducedMotion || saveData || memory < 4 || width < 700) profile = 'low';
                else if (memory < 8 || width < 1024) profile = 'medium';
                state.performanceProfile = profile;
                document.body.className = document.body.className.replace(/profile-\w+/g, '');
                document.body.classList.add('profile-' + profile);
                if (reducedMotion) document.body.classList.add('reduced-motion');
            }

            function setDynamicPalette(track) {
                const r = document.documentElement;
                r.style.setProperty('--track-a', track.palette[0]);
                r.style.setProperty('--track-b', track.palette[1]);
                r.style.setProperty('--track-c', track.palette[2] || '#020617');
            }

            function createMiniArtHTML(track) {
                const p = track.palette;
                return `<div style="position:absolute;inset:0;background:linear-gradient(135deg,${p[0]},${p[1]});border-radius:inherit"></div>`;
            }

            function buildCardHTML(track, index) {
                const p = track.palette;
                const verifiedBadge = track.verified ? '<span class="card-badge verified">✓ VERIFIED</span>' : '';
                return `
            <div class="card">
              <img class="card-cover-img" src="${track.coverSrc||''}" alt="" loading="lazy" onerror="this.style.display='none'" onload="this.style.display='block'">
              <div class="card-art">
                <div class="art-layer" style="background:linear-gradient(150deg,${p[0]},${p[1]} 60%,${p[2]||p[0]} 100%)"></div>
                <div class="card-bottom-gradient"></div>
              </div>
              <div class="now-playing-indicator"><span class="now-playing-dot"></span>NOW PLAYING</div>
              <div class="card-glow-ring"></div>
              <div class="card-content">
                <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px"><span class="card-badge">${track.quality||'Spatial'}</span><span class="card-badge">${track.year||2026}</span>${verifiedBadge}</div>
                <h2 class="card-title">${track.title}</h2>
                <p class="card-artist">${track.artist}</p>
              </div>
            </div>`;
            }

            function renderCarousel() {
                const carousel = document.getElementById('carousel');
                carousel.innerHTML = '';
                const total = state.tracks.length;
                const frag = document.createDocumentFragment();
                for (let i = 0; i < total; i++) {
                    let offset = i - state.currentIndex;
                    if (offset > total / 2) offset -= total;
                    if (offset < -total / 2) offset += total;
                    const abs = Math.abs(offset);
                    const card = document.createElement('div');
                    card.className = 'carousel-card';
                    if (abs === 0) card.classList.add('active');
                    else if (abs === 1) card.classList.add('near');
                    else if (abs === 2) card.classList.add('far');
                    else card.classList.add('hidden-card');
                    card.dataset.index = i;
                    card.innerHTML = buildCardHTML(state.tracks[i], i);
                    const isMobile = window.innerWidth <= 699;
                    const nearX = isMobile ? 150 : 230;
                    const farX = isMobile ? 280 : 400;
                    let tx, ry, sc, op;
                    if (abs === 0) { tx = 0;
                        ry = 0;
                        sc = 1;
                        op = 1; } else if (abs === 1) { tx = offset * nearX;
                        ry = offset * -28;
                        sc = 0.8;
                        op = 0.72; } else if (abs === 2) { tx = offset * farX;
                        ry = offset * -42;
                        sc = 0.6;
                        op = 0.38; } else { tx = offset * (farX + 80);
                        ry = offset * -50;
                        sc = 0.45;
                        op = 0; }
                    card.style.transform = `translate3d(${tx}px,0,0) rotateY(${ry}deg) scale(${sc})`;
                    card.style.opacity = op;
                    card.style.zIndex = 100 - abs;
                    card.addEventListener('click', function(e) {
                        if (state.carouselDragging) return;
                        const idx = parseInt(this.dataset.index);
                        if (idx === state.currentIndex) togglePlay();
                        else setTrackByIndex(idx);
                    });
                    frag.appendChild(card);
                }
                carousel.appendChild(frag);
            }

            function updatePlayerUI() {
                const track = getTrack();
                document.getElementById('playerTitle').textContent = track.title;
                document.getElementById('playerArtist').textContent = track.artist;
                document.getElementById('timeDuration').textContent = formatTime(track.duration || state.duration || 0);
                document.getElementById('navTitle').textContent = track.title;
                document.getElementById('navArtist').textContent = track.artist;
                document.getElementById('navBadge').textContent = track.quality || 'SPATIAL';
                document.getElementById('heroQuality').textContent = track.quality || 'SPATIAL';
                document.getElementById('heroMood').textContent = (track.mood || 'COSMIC').toUpperCase();

                const miniArt = document.getElementById('playerMiniArt');
                miniArt.innerHTML =
                    `<img src="${track.coverSrc||''}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:10px" onerror="this.style.display='none'">${createMiniArtHTML(track)}`;

                updateRepeatBtn();
                updateShuffleBtn();
                updateMuteBtn();
                updatePlayBtn();
                updateProgressDisplay();
                setDynamicPalette(track);

            function updateProgressDisplay() {

                const pct = dur > 0 ? (state.currentTime / dur) * 100 : 0;

                document.getElementById('progressTrack').setAttribute('aria-valuenow', Math.round(pct));

            function updatePlayBtn() {
                const ip = document.getElementById('iconPlay');
                const ipa = document.getElementById('iconPause');
                if (state.isPlaying) { ip.style.display = 'none';
                    ipa.style.display = 'block'; } else { ip.style.display = 'block';
                    ipa.style.display = 'none'; }
                document.body.classList.toggle('is-playing', state.isPlaying);
            }

            function updateLikeBtn() {
                const track = getTrack();
                const ih = document.getElementById('iconHeart');
                const ihf = document.getElementById('iconHeartFilled');
                const btn = document.getElementById('btnLike');
                if (track.liked) { ih.style.display = 'none';

            function updateShuffleBtn() {
                const btn = document.getElementById('btnShuffle');

            function updateRepeatBtn() {
                const btn = document.getElementById('btnRepeat');

                if (state.repeat === 'all') btn.classList.add('accent');
                else if (state.repeat === 'one') { btn.classList.add('accent');

            function updateMuteBtn() {
                const iv = document.getElementById('iconVolume');

                if (state.muted || state.volume === 0) { iv.style.display = 'none';
                    im.style.display = 'block'; } else { iv.style.display = 'block';

                document.getElementById('volumeSlider').value = Math.round(state.volume * 100);

            function updateAudioStatusBadges() {
                const lb = document.getElementById('audioLoadingBadge');
                const eb = document.getElementById('audioErrorBadge');

            function loadAudioForTrack(track) {
                if (!audio) return;
                state.audioError = false;
                state.audioLoading = true;
                state.audioReady = false;
                updateAudioStatusBadges();
                audio.src = track.audioSrc || '';
                audio.load();

            function safePlay() {
                if (!state.userInteracted) { state.userInteracted = true; }
                const p = audio.play();
                if (p && p.then) p.catch(e => { state.isPlaying = false;
                    updatePlayBtn(); });
                state.isPlaying = true;
                updatePlayBtn();
            }

            function safePause() {
                audio.pause();
                state.isPlaying = false;
                updatePlayBtn();
            }

            function togglePlay() {
                if (state.isPlaying) safePause();
                else safePlay();
            }

            function setTrackByIndex(index) {
                if (index < 0 || index >= state.tracks.length) return;
                state.currentIndex = index;
                state.currentTime = 0;
                state.activeLyricIndex = -1;
                const track = state.tracks[index];

                    state.recent = state.recent.slice(0, 30); }
                updatePlayerUI();
                renderCarousel();
                renderQueuePanel();
                renderLyricsPanel();
                loadAudioForTrack(track);
                saveState();
                announce(`Now playing: ${track.title} by ${track.artist}`);
                if (state.isPlaying) { safePlay(); }
            }

            function nextTrack() {
                let next;
                if (state.shuffle) {
                    do { next = Math.floor(Math.random() * state.tracks.length); } while (next === state.currentIndex && state
                        .tracks.length > 1);
                } else { next = (state.currentIndex + 1) % state.tracks.length; }
                setTrackByIndex(next);
            }

            function prevTrack() {
                if (state.currentTime > 3) { audio.currentTime = 0;
                    state.currentTime = 0;
                    updateProgressDisplay(); return; }
                let prev;
                if (state.shuffle) {
                    do { prev = Math.floor(Math.random() * state.tracks.length); } while (prev === state.currentIndex && state
                        .tracks.length > 1);
                } else { prev = (state.currentIndex - 1 + state.tracks.length) % state.tracks.length; }
                setTrackByIndex(prev);
            }

            function seekTo(percent) {
                const track = getTrack();
                const dur = track.duration || state.duration || 1;
                state.currentTime = clamp(percent, 0, 1) * dur;
                audio.currentTime = state.currentTime;
                updateProgressDisplay();
            }

            function setVolume(value) {
                state.volume = clamp(value, 0, 1);
                if (state.volume > 0) state.muted = false;
                audio.volume = state.muted ? 0 : state.volume;
                updateMuteBtn();
                saveState();

            function toggleMute() {
                state.muted = !state.muted;
                audio.volume = state.muted ? 0 : state.volume;
                updateMuteBtn();
                saveState();
            }

            function toggleShuffle() {
                state.shuffle = !state.shuffle;
                updateShuffleBtn();
                saveState();

            function cycleRepeat() {
                if (state.repeat === 'off') state.repeat = 'all';
                else if (state.repeat === 'all') state.repeat = 'one';
                else state.repeat = 'off';
