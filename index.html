<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#061014">
<title>Cinematic Spatial Music OS</title>
<style>
/* ===== MODULE: DESIGN TOKENS ===== */
:root{
  --bg:#03070b;
  --ink:#f4fbff;
  --muted:rgba(235,250,255,.68);
  --faint:rgba(235,250,255,.38);
  --glass:rgba(14,28,38,.42);
  --glass-strong:rgba(18,38,52,.58);
  --accent:#42e8ff;
  --accent-rgb:66,232,255;
  --glow:rgba(66,232,255,.58);
  --fog-tint:rgba(31,190,220,.22);
  --grid-color:rgba(66,232,255,.38);
  --warmth:rgba(255,190,120,.06);
  --stage-w:min(100vw,177.7778vh);
  --stage-h:min(100vh,56.25vw);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --ease:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#020509;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Segoe UI",Roboto,Arial,sans-serif}
body{min-width:320px;touch-action:manipulation;-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision}
button,input{font:inherit;color:inherit}
button{border:0;background:none;padding:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
svg{display:block;pointer-events:none}
.hidden{display:none!important}
.glass{
  background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.055) 34%,rgba(0,0,0,.12)),var(--glass);
  border:1px solid rgba(255,255,255,.18);
  border-bottom-color:rgba(0,0,0,.34);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 22px 70px rgba(0,0,0,.32),0 0 48px rgba(var(--accent-rgb),.12);
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
}
.touch{min-width:44px;min-height:44px;display:grid;place-items:center;border-radius:999px;position:relative;overflow:hidden;transition:transform .18s var(--ease),background .18s var(--ease),opacity .18s var(--ease)}
.touch:hover{background:rgba(255,255,255,.1)}
.touch:active{transform:scale(.94)}
.ripple-span{position:absolute;border-radius:50%;pointer-events:none;background:radial-gradient(circle,rgba(255,255,255,.55),rgba(255,255,255,0) 70%);transform:translate(-50%,-50%) scale(0);animation:ripple .72s var(--ease) forwards}
@keyframes ripple{to{transform:translate(-50%,-50%) scale(4.2);opacity:0}}

/* ===== MODULE: LAYERED SPATIAL WORLD ===== */
#app{position:fixed;inset:0;overflow:hidden;background:var(--bg);isolation:isolate}
#stage-wrap{position:absolute;left:50%;top:50%;width:var(--stage-w);height:var(--stage-h);transform:translate(-50%,-50%);overflow:visible}
#scene-bg,#starfield,#grid-floor,#webgl-canvas,#carousel-stage,#waveform-canvas,#top-bar,#bottom-bar,#overlays{position:absolute}
#scene-bg{inset:0;z-index:0;background:
  radial-gradient(circle at 50% 50%,rgba(1,8,12,.8) 0 22%,rgba(3,12,19,.82) 45%,rgba(4,8,22,.96) 70%,#010205 100%),
  radial-gradient(circle at 8% 9%,rgba(44,180,255,.18),transparent 36%),
  radial-gradient(circle at 92% 10%,rgba(84,60,255,.16),transparent 32%),
  radial-gradient(circle at 70% 96%,var(--warmth),transparent 36%);
}
#scene-bg:before{content:"";position:absolute;inset:-20%;background:
  radial-gradient(circle at 18% 36%,var(--fog-tint),transparent 28%),
  radial-gradient(circle at 76% 30%,rgba(70,90,255,.18),transparent 26%),
  radial-gradient(circle at 52% 80%,rgba(28,255,210,.12),transparent 34%);
  filter:blur(45px);mix-blend-mode:screen;opacity:.92;animation:fogDrift 28s ease-in-out infinite alternate;will-change:transform,opacity}
#scene-bg:after{content:"";position:absolute;inset:0;background:
  radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,.34) 72%,rgba(0,0,0,.82) 100%),
  repeating-radial-gradient(circle at 17% 23%,rgba(255,255,255,.028) 0 1px,transparent 1px 3px);
  opacity:.8;mix-blend-mode:overlay;animation:grain 1.8s steps(4) infinite}
@keyframes fogDrift{0%{transform:translate3d(-3%,-2%,0) scale(1)}100%{transform:translate3d(4%,3%,0) scale(1.08)}}
@keyframes grain{0%,100%{transform:translate(0,0)}25%{transform:translate(-1%,1%)}50%{transform:translate(1%,-1%)}75%{transform:translate(.5%,.5%)}}
#starfield{inset:-8%;z-index:1;transform-style:preserve-3d;pointer-events:none}
.star-layer{position:absolute;inset:0;background-repeat:repeat;opacity:.55;will-change:transform}
.star-layer.l1{background-image:radial-gradient(circle,rgba(255,255,255,.8) 0 1px,transparent 1.5px);background-size:92px 92px;filter:blur(.2px)}
.star-layer.l2{background-image:radial-gradient(circle,rgba(135,235,255,.75) 0 1px,transparent 1.6px);background-size:154px 154px;opacity:.38;filter:blur(.45px)}
.star-layer.l3{background-image:radial-gradient(circle,rgba(255,255,255,.62) 0 1px,transparent 1.8px);background-size:238px 238px;opacity:.24;filter:blur(.8px)}
#grid-floor{left:-16%;right:-16%;bottom:-15%;height:55%;z-index:2;perspective:820px;opacity:.9;pointer-events:none;overflow:hidden;mask-image:linear-gradient(to top,black 0%,rgba(0,0,0,.92) 32%,transparent 100%);-webkit-mask-image:linear-gradient(to top,black 0%,rgba(0,0,0,.92) 32%,transparent 100%)}
#grid-floor:before{content:"";position:absolute;inset:-35% -20% 0;transform:rotateX(68deg) translateY(14%);transform-origin:50% 100%;background-image:
  linear-gradient(to right,var(--grid-color) 1px,transparent 1px),
  linear-gradient(to bottom,var(--grid-color) 1px,transparent 1px);
  background-size:72px 72px;box-shadow:0 0 40px var(--glow);animation:gridDrift 14s linear infinite;opacity:.56}
#grid-floor:after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(2,8,12,.18),rgba(2,8,12,.62) 45%,rgba(2,8,12,.96));}
@keyframes gridDrift{to{background-position:0 72px,0 72px}}
#webgl-canvas{inset:0;z-index:3;pointer-events:none}
#carousel-stage{inset:0;z-index:4;perspective:1800px;transform-style:preserve-3d;pointer-events:none;animation:sceneBreath 7s ease-in-out infinite}
@keyframes sceneBreath{50%{transform:scale(1.012)}}
#waveform-canvas{left:50%;top:50%;z-index:5;width:min(56vh,54vw);height:min(56vh,54vw);transform:translate(-50%,-50%);pointer-events:none;opacity:.95;filter:drop-shadow(0 0 22px var(--glow))}

/* ===== MODULE: CAROUSEL CARDS ===== */
.card{
  position:absolute;left:50%;top:47%;width:clamp(150px,18vw,285px);aspect-ratio:3/4.2;border-radius:22px;overflow:visible;
  transform-style:preserve-3d;pointer-events:auto;will-change:transform,opacity,filter;cursor:pointer;
}
.card-shell{position:absolute;inset:0;border-radius:22px;overflow:hidden;background:#111;box-shadow:0 42px 90px rgba(0,0,0,.48),0 0 60px rgba(var(--accent-rgb),.14);transform:translateZ(1px)}
.card-art{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scale(1.025);filter:saturate(1.08) contrast(1.04)}
.card-glass{position:absolute;inset:0;border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.04) 42%,rgba(0,0,0,.14));border:1px solid rgba(255,255,255,.22);border-bottom-color:rgba(0,0,0,.42);box-shadow:inset 0 1px 0 rgba(255,255,255,.36),inset 0 -1px 0 rgba(0,0,0,.28)}
.card-sheen{position:absolute;left:-25%;top:-35%;width:70%;height:120%;transform:rotate(18deg);background:linear-gradient(90deg,transparent,rgba(255,255,255,.24),transparent);filter:blur(10px);opacity:.5}
.card-meta{position:absolute;left:0;right:0;bottom:0;padding:56px 18px 18px;background:linear-gradient(to top,rgba(0,0,0,.76),rgba(0,0,0,.36) 54%,transparent);border-radius:0 0 22px 22px;text-shadow:0 2px 18px rgba(0,0,0,.75)}
.card-title{font-size:clamp(18px,2vw,28px);font-weight:740;letter-spacing:-.04em;line-height:.96}
.card-artist{margin-top:7px;color:rgba(245,252,255,.76);font-size:clamp(12px,1vw,15px);font-weight:520}
.card-reflection{position:absolute;left:5%;right:5%;top:103%;height:35%;border-radius:0 0 24px 24px;background:var(--reflection) center top/cover no-repeat;transform:scaleY(-1) rotateX(32deg);transform-origin:top;opacity:.22;filter:blur(3px);mask-image:linear-gradient(to bottom,rgba(0,0,0,.6),transparent 84%);-webkit-mask-image:linear-gradient(to bottom,rgba(0,0,0,.6),transparent 84%);pointer-events:none}
.card.active .card-shell{box-shadow:0 48px 110px rgba(0,0,0,.56),0 0 95px var(--glow)}
.vinyl-ring,.halo-ring{position:absolute;inset:-18px;border-radius:28px;pointer-events:none;opacity:0;transform:translateZ(-28px)}
.vinyl-ring{background:conic-gradient(from 0deg,transparent,rgba(var(--accent-rgb),.16),transparent 38%,rgba(255,255,255,.11),transparent 72%);filter:blur(1px);animation:spin 6s linear infinite}
.halo-ring{inset:-34px;border:1px solid rgba(var(--accent-rgb),.34);box-shadow:0 0 30px var(--glow),inset 0 0 24px rgba(var(--accent-rgb),.18);animation:orbit 4.5s linear infinite}
.card.active.playing .vinyl-ring,.card.active.playing .halo-ring{opacity:1}
@keyframes spin{to{transform:translateZ(-28px) rotate(360deg)}}
@keyframes orbit{to{transform:translateZ(-24px) rotateZ(-360deg)}}

/* ===== MODULE: NAVIGATION AND PLAYER GLASS ===== */
#top-bar{left:50%;top:calc(18px + var(--safe-top));z-index:7;width:min(840px,calc(100% - 32px));height:58px;transform:translateX(-50%);border-radius:999px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;padding:7px 9px;pointer-events:auto}
.nav-cluster{display:flex;align-items:center;gap:4px}
.search-pill{height:44px;border-radius:999px;background:rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;padding:0 16px;min-width:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.12)}
.search-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:650;letter-spacing:-.02em}
.avatar{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-weight:800;background:linear-gradient(135deg,var(--accent),#7869ff 48%,#fff);color:#041018;box-shadow:0 0 25px var(--glow)}
#bottom-bar{left:50%;bottom:calc(18px + var(--safe-bottom));z-index:7;width:min(980px,calc(100% - 28px));min-height:82px;transform:translateX(-50%);border-radius:30px;display:grid;grid-template-columns:minmax(170px,1fr) minmax(280px,1.4fr) minmax(180px,1fr);align-items:center;gap:18px;padding:13px 16px;pointer-events:auto}
.now{display:flex;align-items:center;gap:12px;min-width:0}
.now img{width:54px;height:54px;border-radius:14px;object-fit:cover;box-shadow:0 12px 28px rgba(0,0,0,.36)}
.now-title,.now-artist{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.now-title{font-weight:720;letter-spacing:-.03em}
.now-artist{margin-top:3px;color:var(--muted);font-size:13px}
.controls{display:grid;gap:8px;min-width:0}
.control-row{display:flex;justify-content:center;align-items:center;gap:12px}
.play-btn{width:54px;height:54px;background:radial-gradient(circle at 35% 28%,rgba(255,255,255,.55),rgba(255,255,255,.08) 36%,rgba(var(--accent-rgb),.23));box-shadow:0 0 34px var(--glow),inset 0 1px 0 rgba(255,255,255,.36)}
.progress-row{display:grid;grid-template-columns:42px 1fr 42px;align-items:center;gap:9px;color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums}
.progress{height:22px;position:relative;cursor:pointer}
.progress:before{content:"";position:absolute;left:0;right:0;top:10px;height:3px;border-radius:999px;background:rgba(255,255,255,.16)}
.progress-fill{position:absolute;left:0;top:10px;height:3px;border-radius:999px;background:linear-gradient(90deg,var(--accent),#fff);box-shadow:0 0 18px var(--glow);width:0%}
.scrubber{position:absolute;top:50%;left:0;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 0 18px var(--glow);transform:translate(-50%,-50%)}
.player-tools{display:flex;align-items:center;justify-content:flex-end;gap:8px;min-width:0}
.volume{width:112px;height:22px;position:relative;cursor:pointer}
.volume:before{content:"";position:absolute;left:0;right:0;top:10px;height:3px;border-radius:999px;background:rgba(255,255,255,.17)}
.volume-fill{position:absolute;left:0;top:10px;height:3px;border-radius:999px;background:var(--accent);box-shadow:0 0 12px var(--glow);width:72%}

/* ===== MODULE: OVERLAYS ===== */
#overlays{inset:0;z-index:8;pointer-events:none}
.panel{position:absolute;right:24px;top:96px;width:min(360px,calc(100% - 48px));max-height:calc(100% - 210px);border-radius:28px;padding:18px;pointer-events:auto;transform:translateX(120%);opacity:0}
.panel h2{margin:0 0 14px;font-size:19px;letter-spacing:-.04em}
.queue-item{display:grid;grid-template-columns:48px 1fr auto;align-items:center;gap:12px;padding:10px;border-radius:18px;transform-style:preserve-3d;cursor:pointer}
.queue-item:hover{background:rgba(255,255,255,.08)}
.queue-item img{width:48px;height:48px;border-radius:12px;object-fit:cover}
.queue-item b{display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.queue-item span{display:block;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#lyrics-panel{left:24px;right:auto}
.lyrics-line{margin:10px 0;color:var(--muted);line-height:1.45}
#toast{position:absolute;left:50%;top:calc(90px + var(--safe-top));transform:translate(-50%,-20px);border-radius:999px;padding:12px 18px;opacity:0;white-space:nowrap;pointer-events:none}
#view-hint{position:absolute;left:50%;bottom:calc(118px + var(--safe-bottom));transform:translateX(-50%);border-radius:999px;padding:10px 15px;color:var(--muted);opacity:.72;font-size:13px}

/* ===== MODULE: RESPONSIVE AND ACCESSIBILITY ===== */
@media (max-width:760px){
  #top-bar{height:54px;width:calc(100% - 20px);gap:6px}
  .search-pill{padding:0 11px}
  #bottom-bar{grid-template-columns:1fr;gap:10px;min-height:160px;border-radius:28px;padding:13px;width:calc(100% - 20px)}
  .now{justify-content:center}
  .player-tools{justify-content:center}
  .card{width:clamp(132px,38vw,205px);top:42%}
  #waveform-canvas{width:min(68vw,44vh);height:min(68vw,44vh)}
  #lyrics-panel{display:none}
}
@media (prefers-reduced-motion:reduce){
  *,*:before,*:after{animation-duration:.001ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important}
  #carousel-stage{animation:none}
}
</style>
</head>
<body>
<div id="app" aria-label="Cinematic spatial music interface">
  <div id="stage-wrap">
<div id="scene-bg"></div>
<div id="starfield" aria-hidden="true">
<div class="star-layer l1"></div>
<div class="star-layer l2"></div>
<div class="star-layer l3"></div>
</div>
<div id="grid-floor" aria-hidden="true"></div>
<canvas id="webgl-canvas" aria-hidden="true"></canvas>
<div id="carousel-stage" aria-label="Spatial album carousel"></div>
<canvas id="waveform-canvas" aria-hidden="true"></canvas>

<nav id="top-bar" class="glass" aria-label="Top navigation">
<div class="nav-cluster">
<button class="touch js-ripple" id="back-btn" aria-label="Previous album"><svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
<button class="touch js-ripple" id="forward-btn" aria-label="Next album"><svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
<button class="touch js-ripple" id="sidebar-btn" aria-label="Toggle queue"><svg width="21" height="21" viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="14" rx="3" stroke="currentColor" stroke-width="2"/><path d="M9 5v14" stroke="currentColor" stroke-width="2"/></svg></button>
</div>
<div class="search-pill" role="search">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
<div class="search-title" id="search-title">Black Hole</div>
</div>
<div class="nav-cluster">
<button class="touch js-ripple" id="share-btn" aria-label="Share"><svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M12 16V4m0 0L7.5 8.5M12 4l4.5 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 14v3a3 3 0 003 3h8a3 3 0 003-3v-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
<button class="touch js-ripple" id="more-btn" aria-label="More"><svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg></button>
<button class="avatar js-ripple" id="avatar-btn" aria-label="Profile">∞</button>
</div>
</nav>

<section id="bottom-bar" class="glass" aria-label="Player controls">
<div class="now">
<img id="now-art" alt="Current album art" crossorigin="anonymous">
<div>
<div class="now-title" id="now-title">Black Hole</div>
<div class="now-artist" id="now-artist">Nova Drift</div>
</div>
</div>
<div class="controls">
<div class="control-row">
<button class="touch js-ripple" id="prev-btn" aria-label="Previous track"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h2v14H6zM10 12l9-7v14z"/></svg></button>
<button class="touch play-btn js-ripple" id="play-btn" aria-label="Play"><svg id="play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
<button class="touch js-ripple" id="next-btn" aria-label="Next track"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M16 5h2v14h-2zM5 19l9-7-9-7z"/></svg></button>
</div>
<div class="progress-row">
<span id="elapsed">0:00</span>
<div class="progress" id="progress" role="slider" aria-label="Playback progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
<div class="progress-fill" id="progress-fill"></div>
<div class="scrubber" id="scrubber"></div>
</div>
<span id="duration">0:00</span>
</div>
</div>
<div class="player-tools">
<button class="touch js-ripple" id="lyrics-btn" aria-label="Toggle lyrics"><svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M5 6h14M5 11h10M5 16h13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
<button class="touch js-ripple" id="queue-btn" aria-label="Toggle queue"><svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
<button class="touch" aria-label="Volume icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 9v6h4l5 4V5L8 9H4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></button>
<div class="volume" id="volume" role="slider" aria-label="Volume" aria-valuemin="0" aria-valuemax="100" aria-valuenow="72" tabindex="0"><div class="volume-fill" id="volume-fill"></div></div>
</div>
</section>

<div id="overlays">
<aside id="queue-panel" class="panel glass" aria-label="Queue panel"><h2>Up Next</h2><div id="queue-list"></div></aside>
<aside id="lyrics-panel" class="panel glass" aria-label="Lyrics panel"><h2>Spatial Lyrics</h2><p class="lyrics-line">Light bends softly through the room.</p><p class="lyrics-line">Every echo finds a new orbit.</p><p class="lyrics-line">Black holes bloom where silence moves.</p><p class="lyrics-line">Hold the signal. Let it breathe.</p></aside>
<div id="toast" class="glass" role="status" aria-live="polite"></div>
<div id="view-hint" class="glass">Press V for Focus / Gallery / Spatial</div>
</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/InertiaPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.4.0/color-thief.umd.js"></script>
<script>
/* ===== MODULE: DATA ===== */
(function(){
"use strict";

const TRACKS = [
  { title: "Black Hole",    artist: "Nova Drift",   art: "https://picsum.photos/seed/blackhole/600/800", audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
  { title: "Aurora Tides",  artist: "Lyra Echo",    art: "https://picsum.photos/seed/aurora/600/800",     audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
  { title: "Neon Mirage",   artist: "Solace VX",    art: "https://picsum.photos/seed/neon/600/800",       audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
  { title: "Velvet Static", artist: "Mono Halo",    art: "https://picsum.photos/seed/velvet/600/800",     audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" },

const state = {

/* ===== MODULE: AUDIO ENGINE ===== */
const audio = new Audio();
audio.crossOrigin = "anonymous";
audio.preload = "metadata";
audio.volume = state.volume;
let audioCtx = null;
let analyser = null;
let sourceNode = null;
let freqData = new Uint8Array(128);

function ensureAudioContext(){
  if (audioCtx) return audioCtx;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return null;
  audioCtx = new AC();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  analyser.smoothingTimeConstant = 0.82;
  freqData = new Uint8Array(analyser.frequencyBinCount);
  try {
sourceNode = audioCtx.createMediaElementSource(audio);
sourceNode.connect(analyser);
analyser.connect(audioCtx.destination);
  } catch (err) {
analyser.connect(audioCtx.destination);
  }
  return audioCtx;
}

function unlockAudio(){
  state.userInteracted = true;
  const ctx = ensureAudioContext();
  if (ctx && ctx.state === "suspended") ctx.resume().catch(function(){});
}

function loadTrack(i, autoplay){
  const track = TRACKS[i];
  if (!track) return;
  const wasPlaying = state.isPlaying || autoplay;
  audio.pause();
  audio.src = track.audio;
  audio.load();
  updateText();
  updateTheme(track);
  if (wasPlaying) playCurrent();
}

function playCurrent(){
  unlockAudio();
  audio.play().then(function(){
state.isPlaying = true;
updatePlayIcon();
updateCards();
showToast("Playing " + TRACKS[state.index].title);
  }).catch(function(){
state.isPlaying = true;
updatePlayIcon();
updateCards();
showToast("Preview mode until audio unlocks");
  });
}

function pauseCurrent(){
  audio.pause();
  state.isPlaying = false;
  updatePlayIcon();
  updateCards();
}

function togglePlay(){
  if (state.isPlaying) pauseCurrent();
  else playCurrent();
}

audio.addEventListener("ended", function(){ navigate(1, true); });
audio.addEventListener("loadedmetadata", updateProgress);
audio.addEventListener("timeupdate", function(){ if (!state.draggingProgress) updateProgress(); });
audio.addEventListener("error", function(){ showToast("Audio stream unavailable; using visual preview"); });

/* ===== MODULE: CAROUSEL BUILD ===== */
const cards = TRACKS.map(function(track, i){
  const card = document.createElement("article");
  card.className = "card";
  card.setAttribute("role","button");

'<div class="vinyl-ring"></div><div class="halo-ring"></div><div class="card-shell">' +
'<img class="card-art" crossorigin="anonymous" alt="' + escapeHtml(track.title) + ' album art" src="' + track.art + '">' +
'<div class="card-glass"></div><div class="card-sheen"></div><div class="card-meta">' +
'<div class="card-title">' + escapeHtml(track.title) + '</div><div class="card-artist">' + escapeHtml(track.artist) + '</div>' +
'</div></div><div class="card-reflection"></div>';
  card.style.setProperty("--reflection", "url(" + track.art + ")");
  card.addEventListener("click", function(){
const diff = shortestDiff(i, state.index);
if (diff === 0) togglePlay();
else focusIndex(i, true);
  });

if (e.key === "Enter" || e.key === " ") { e.preventDefault(); card.click(); }
  });

function updateCards(){
  const vwScale = Math.max(0.62, Math.min(1.14, stageWrap.clientWidth / 1100));
  cards.forEach(function(card, i){
let diff = shortestDiff(i, state.index);
const visible = Math.abs(diff) <= 2;
const slot = SLOTS[String(Math.max(-2, Math.min(2, diff)))] || SLOTS["0"];
card.classList.toggle("active", diff === 0);
card.classList.toggle("playing", state.isPlaying);
card.style.pointerEvents = visible ? "auto" : "none";
card.style.zIndex = String(20 - Math.abs(diff));
const vars = {
xPercent:-50,
yPercent:-50,
x:slot.x * vwScale,
y:0,
z:slot.z,
rotationY:slot.rotateY,
scale:slot.scale,
opacity:visible ? slot.opacity : 0,
filter:"blur(" + slot.blur + "px)",
duration:.9,
ease:"expo.out"
};
if (supports.gsap) gsap.to(card, vars);
else Object.assign(card.style, { opacity:vars.opacity, filter:vars.filter, transform:"translate(-50%,-50%) translate3d("+vars.x+"px,0,"+vars.z+"px) rotateY("+vars.rotationY+"deg) scale("+vars.scale+")" });
  });
}

function entrance(){
  if (!supports.gsap || supports.reduced) { updateCards(); return; }
  gsap.fromTo(cards, { y:140, opacity:0, rotationX:18 }, { y:0, opacity:function(i){return cards[i].style.opacity || 1;}, rotationX:0, duration:1.25, ease:"elastic.out(1,.72)", stagger:.08, delay:.18, onUpdate:updateCards });
}

/* ===== MODULE: THEME ENGINE ===== */
function updateTheme(track){
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.onload = function(){
let colors = null;
if (supports.colorThief) {
try { colors = new ColorThief().getPalette(img, 4); } catch(e) { colors = null; }
}
if (!colors) colors = sampleImagePalette(img);
applyPalette(colors);
  };
  img.onerror = function(){ applyPalette([[66,232,255],[80,120,255],[20,40,48]]); };
  img.src = track.art;
}

function sampleImagePalette(img){
  const c = document.createElement("canvas");
  const ctx = c.getContext("2d", { willReadFrequently:true });
  c.width = 24; c.height = 32;
  try {
ctx.drawImage(img,0,0,c.width,c.height);
const data = ctx.getImageData(0,0,c.width,c.height).data;
let r=0,g=0,b=0,count=0, bright=[66,232,255];
for (let i=0;i<data.length;i+=16) {
const rr=data[i], gg=data[i+1], bb=data[i+2];
const lum=rr+gg+bb;
if (lum > bright[0]+bright[1]+bright[2]) bright=[rr,gg,bb];
r+=rr; g+=gg; b+=bb; count++;
}
return [[r/count,g/count,b/count].map(Math.round), bright, [20,40,50]];
  } catch(e) {
return [[66,232,255],[100,110,255],[20,40,50]];
  }
}

function applyPalette(colors){
  const dominant = normalizeColor(colors[0] || [66,232,255]);
  const accent = normalizeColor(colors[1] || dominant);
  const mixed = [
Math.round((dominant[0] + accent[0]) / 2),
Math.round((dominant[1] + accent[1]) / 2),
Math.round((dominant[2] + accent[2]) / 2)
  ];
  const vars = {
"--accent": "rgb(" + accent.join(",") + ")",
"--accent-rgb": accent.join(","),
"--glow": "rgba(" + accent.join(",") + ",.58)",
"--fog-tint": "rgba(" + mixed.join(",") + ",.22)",
"--grid-color": "rgba(" + accent.join(",") + ",.38)"
  };
  if (supports.gsap) gsap.to(root, { duration:.8, ease:"power2.out", css:vars });
  else Object.keys(vars).forEach(function(k){ root.style.setProperty(k, vars[k]); });
}

function normalizeColor(c){
  const night = new Date().getHours() < 7 || new Date().getHours() > 19;
  return c.map(function(v, idx){
const boost = idx === 2 ? 28 : 14;
return Math.max(36, Math.min(255, Math.round(v * (night ? .82 : .95) + boost)));
  });
}

/* ===== MODULE: THREE.JS PARTICLES, TRAILS, SHOCKWAVES ===== */
let three = { ready:false, scene:null, camera:null, renderer:null, dust:null, shockwaves:[], trails:[] };

function initThree(){
  if (!supports.three || three.ready) return;
  const THREE = window.THREE;
  three.scene = new THREE.Scene();
  three.camera = new THREE.PerspectiveCamera(55, 16/9, .1, 1000);
  three.camera.position.z = 90;
  three.renderer = new THREE.WebGLRenderer({ canvas:webglCanvas, alpha:true, antialias:!supports.lowPower });
  three.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  const count = supports.lowPower ? 220 : 520;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i=0;i<count;i++){
pos[i*3]=(Math.random()-.5)*150;
pos[i*3+1]=(Math.random()-.5)*90;
pos[i*3+2]=(Math.random()-.5)*120;
  }
  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color:0x88eeff, size:supports.lowPower?.22:.32, transparent:true, opacity:.58, blending:THREE.AdditiveBlending, depthWrite:false });
  three.dust = new THREE.Points(geo, mat);
  three.scene.add(three.dust);
  three.ready = true;
  resizeThree();
}

function createShockwave(){
  if (!three.ready || supports.reduced) return;
  const THREE = window.THREE;
  const geo = new THREE.RingGeometry(6, 6.35, 96);
  const mat = new THREE.MeshBasicMaterial({ color:0x7eeeff, transparent:true, opacity:.72, blending:THREE.AdditiveBlending, side:THREE.DoubleSide, depthWrite:false });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData.life = 0;
  three.scene.add(mesh);
  three.shockwaves.push(mesh);
}

function createTrail(dir){
  if (!three.ready || supports.reduced) return;
  const THREE = window.THREE;
  const geo = new THREE.PlaneGeometry(26, .8);
  const mat = new THREE.MeshBasicMaterial({ color:0x7eeeff, transparent:true, opacity:.48, blending:THREE.AdditiveBlending, depthWrite:false });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(dir * -26, (Math.random()-.5)*16, 8);
  mesh.rotation.z = (Math.random()-.5)*.2;
  mesh.userData.life = 0;
  mesh.userData.dir = dir;
  three.scene.add(mesh);
  three.trails.push(mesh);
}

function updateThree(dt){
  if (!three.ready) return;
  if (three.dust) {
three.dust.rotation.y += dt * .035;
three.dust.rotation.x = state.tiltY * .018;
three.dust.rotation.z = state.tiltX * .012;
three.dust.material.opacity = .42 + state.energy * .28;
  }
  for (let i=three.shockwaves.length-1;i>=0;i--){
const m = three.shockwaves[i];
m.userData.life += dt * 1.45;
const life = m.userData.life;
m.scale.setScalar(1 + life * 8);
m.material.opacity = Math.max(0, .7 * (1 - life));
if (life >= 1) { three.scene.remove(m); m.geometry.dispose(); m.material.dispose(); three.shockwaves.splice(i,1); }
  }
  for (let i=three.trails.length-1;i>=0;i--){
const m = three.trails[i];
m.userData.life += dt * 1.2;
m.position.x += m.userData.dir * dt * 70;
m.material.opacity = Math.max(0, .48 * (1 - m.userData.life));
if (m.userData.life >= 1) { three.scene.remove(m); m.geometry.dispose(); m.material.dispose(); three.trails.splice(i,1); }
  }
  three.renderer.render(three.scene, three.camera);
}

function resizeThree(){
  if (!three.ready) return;
  const w = stageWrap.clientWidth, h = stageWrap.clientHeight;
  three.renderer.setSize(w, h, false);
  three.camera.aspect = w / h;
  three.camera.updateProjectionMatrix();
}

/* ===== MODULE: VISUALIZER AND BEAT DETECTION ===== */
function getFrequencyData(dt){
  if (analyser && audioCtx && audioCtx.state === "running" && !audio.paused) {
analyser.getByteFrequencyData(freqData);
  } else {
state.simulatedPhase += dt * (state.isPlaying ? 4.2 : 1.2);
for (let i=0;i<freqData.length;i++){
const lowBoost = i < 10 ? 48 : 0;
freqData[i] = Math.max(0, Math.min(255, 30 + lowBoost + Math.sin(state.simulatedPhase + i*.23) * 34 + Math.sin(state.simulatedPhase*1.7 + i*.07) * 18));
}
  }
  let low = 0;
  const bins = Math.min(14, freqData.length);
  for (let i=0;i<bins;i++) low += freqData[i];
  const energy = low / bins;
  state.beatAvg = state.beatAvg * .94 + energy * .06;
  state.energy = Math.max(0, Math.min(1, energy / 170));
  state.beatCooldown = Math.max(0, state.beatCooldown - dt);
  if (energy > state.beatAvg * 1.28 && energy > 82 && state.beatCooldown <= 0 && state.isPlaying) {
state.beatCooldown = .28;
beatPulse();
  }
}

function drawWaveform(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const rect = waveformCanvas.getBoundingClientRect();
  const w = Math.max(1, Math.floor(rect.width * dpr));
  const h = Math.max(1, Math.floor(rect.height * dpr));
  if (waveformCanvas.width !== w || waveformCanvas.height !== h) { waveformCanvas.width = w; waveformCanvas.height = h; }
  waveCtx.clearRect(0,0,w,h);
  const cx=w/2, cy=h/2;
  const base=Math.min(w,h)*.34;
  waveCtx.save();
  waveCtx.translate(cx,cy);
  for (let pass=0; pass<2; pass++){
waveCtx.beginPath();
for (let i=0;i<freqData.length;i++){
const a = (i/freqData.length) * Math.PI * 2;
const amp = (freqData[i]/255) * Math.min(w,h) * (pass ? .07 : .04);
const r = base + amp + Math.sin(state.elapsed*1.4 + i*.2) * 2 * dpr;
const x = Math.cos(a) * r;
const y = Math.sin(a) * r;
if (i===0) waveCtx.moveTo(x,y); else waveCtx.lineTo(x,y);
}
waveCtx.closePath();
waveCtx.strokeStyle = pass ? "rgba(255,255,255,.46)" : getComputedStyle(root).getPropertyValue("--accent").trim();
waveCtx.lineWidth = pass ? 1.1*dpr : 2.2*dpr;
waveCtx.shadowBlur = pass ? 8*dpr : 24*dpr;
waveCtx.shadowColor = getComputedStyle(root).getPropertyValue("--glow").trim();
waveCtx.stroke();
  }
  waveCtx.restore();
}

function beatPulse(){
  const active = cards[state.index];
  if (supports.gsap && active) {
gsap.fromTo(active, { scale:1.025 }, { scale:1, duration:.42, ease:"elastic.out(1,.45)", overwrite:"auto" });
gsap.fromTo(active.querySelector(".card-shell"), { boxShadow:"0 0 140px var(--glow)" }, { boxShadow:"", duration:.7, ease:"power2.out" });
  }
  createShockwave();
}

/* ===== MODULE: NAVIGATION AND VIEW MODES ===== */
function navigate(dir, autoplay){
  focusIndex((state.index + dir + TRACKS.length) % TRACKS.length, autoplay);
  createTrail(dir);
}

function focusIndex(i, autoplay){
  if (i === state.index && !autoplay) return;
  state.index = (i + TRACKS.length) % TRACKS.length;
  loadTrack(state.index, autoplay);
  updateCards();
}

function cycleViewMode(){
  state.viewMode = (state.viewMode + 1) % 3;
  const names = ["Focus", "Gallery", "Spatial"];
  app.dataset.view = names[state.viewMode].toLowerCase();
  const z = state.viewMode === 2 ? -120 : 0;
  const sc = state.viewMode === 1 ? .88 : 1;
  if (supports.gsap) gsap.to(carousel, { z:z, scale:sc, duration:.75, ease:"expo.out" });
  showToast(names[state.viewMode] + " view");
}

function updateProgress(){
  const dur = isFinite(audio.duration) ? audio.duration : 0;
  const cur = isFinite(audio.currentTime) ? audio.currentTime : 0;
  const pct = dur ? Math.max(0, Math.min(100, (cur/dur)*100)) : 0;
  progressFill.style.width = pct + "%";
  scrubber.style.left = pct + "%";
  progress.setAttribute("aria-valuenow", String(Math.round(pct)));
  $("#elapsed").textContent = formatTime(cur);
  $("#duration").textContent = formatTime(dur);
}

function formatTime(s){
  if (!isFinite(s) || s <= 0) return "0:00";
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return m + ":" + String(sec).padStart(2,"0");
}

function showToast(msg){
  toast.textContent = msg;
  if (supports.gsap) {
gsap.killTweensOf(toast);
gsap.fromTo(toast, { opacity:0, y:-20 }, { opacity:1, y:0, duration:.28, ease:"power2.out", onComplete:function(){
gsap.to(toast, { opacity:0, y:-14, delay:1.8, duration:.35, ease:"power2.in" });
}});
  } else {
toast.style.opacity = 1;
setTimeout(function(){ toast.style.opacity = 0; }, 1800);
  }
}

function togglePanel(panel){

function buildQueue(){
  queueList.innerHTML = "";

const item = document.createElement("div");

item.innerHTML = '<img crossorigin="anonymous" src="' + t.art + '" alt=""><div><b>' + escapeHtml(t.title) + '</b><span>' + escapeHtml(t.artist) + '</span></div><small>' + (i === state.index ? "Now" : String(i+1).padStart(2,"0")) + '</small>';

/* ===== MODULE: INPUTS AND MICROINTERACTIONS ===== */
function bindEvents(){
  document.addEventListener("pointerdown", unlockAudio, { once:true, passive:true });
  $$(".js-ripple, .avatar").forEach(function(el){ el.addEventListener("pointerdown", ripple); });
  $("#play-btn").addEventListener("click", togglePlay);
  $("#prev-btn").addEventListener("click", function(){ navigate(-1, true); });
  $("#next-btn").addEventListener("click", function(){ navigate(1, true); });
  $("#back-btn").addEventListener("click", function(){ navigate(-1, false); });
  $("#forward-btn").addEventListener("click", function(){ navigate(1, false); });
  $("#queue-btn").addEventListener("click", function(){ buildQueue(); togglePanel(queuePanel); });
  $("#sidebar-btn").addEventListener("click", function(){ buildQueue(); togglePanel(queuePanel); });
  $("#lyrics-btn").addEventListener("click", function(){ togglePanel(lyricsPanel); });
  $("#share-btn").addEventListener("click", function(){
const t = TRACKS[state.index];
if (navigator.share) navigator.share({ title:t.title, text:t.title + " by " + t.artist }).catch(function(){});
else showToast("Share link copied");
  });
  $("#more-btn").addEventListener("click", function(){ showToast("Immersive options ready"); });
  $("#avatar-btn").addEventListener("click", function(){ showToast("Vision profile synced"); });

  document.addEventListener("keydown", function(e){
if (e.target && /INPUT|TEXTAREA|SELECT/.test(e.target.tagName)) return;
if (e.key === "ArrowLeft") navigate(-1, false);
if (e.key === "ArrowRight") navigate(1, false);
if (e.code === "Space") { e.preventDefault(); togglePlay(); }
if (e.key.toLowerCase() === "v") cycleViewMode();
  });

  bindSlider(progress, function(p){
if (isFinite(audio.duration)) {
audio.currentTime = audio.duration * p;
updateProgress();
}
  }, function(active){ state.draggingProgress = active; });

  bindSlider(volume, function(p){
state.volume = Math.max(0, Math.min(1, p));
audio.volume = state.volume;
volumeFill.style.width = (state.volume*100) + "%";
volume.setAttribute("aria-valuenow", String(Math.round(state.volume*100)));
  });

  window.addEventListener("resize", debounce(function(){ updateCards(); resizeThree(); drawWaveform(); }, 120), { passive:true });

  document.addEventListener("visibilitychange", function(){
state.running = !document.hidden;
if (document.hidden) {
cancelAnimationFrame(state.raf);
if (audioCtx && audioCtx.state === "running") audioCtx.suspend().catch(function(){});
} else {
if (state.isPlaying && audioCtx) audioCtx.resume().catch(function(){});
state.last = performance.now();
loop(state.last);
}
  });

  if (window.DeviceOrientationEvent) {
window.addEventListener("deviceorientation", function(e){
state.tiltX = Math.max(-12, Math.min(12, e.gamma || 0));
state.tiltY = Math.max(-12, Math.min(12, e.beta || 0));
}, { passive:true });
  }

  if (supports.gsap && supports.draggable) {
const proxy = document.createElement("div");
let startX = 0;
Draggable.create(proxy, {
type:"x",
trigger:carousel,
inertia:supports.inertia,
onPress:function(){ startX = this.x; unlockAudio(); },
onRelease:function(){
const delta = this.x - startX;
if (Math.abs(delta) > 40) navigate(delta < 0 ? 1 : -1, false);
gsap.set(proxy, { x:0 });
}
});
  } else {
let down = 0;
carousel.addEventListener("pointerdown", function(e){ down = e.clientX; });
carousel.addEventListener("pointerup", function(e){ const d=e.clientX-down; if (Math.abs(d)>40) navigate(d<0?1:-1,false); });
  }
}

function bindSlider(el, onChange, onActive){
  function setFromEvent(e){
const r = el.getBoundingClientRect();
const p = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
onChange(p);
  }
  el.addEventListener("pointerdown", function(e){
e.preventDefault();
unlockAudio();
if (onActive) onActive(true);
el.setPointerCapture(e.pointerId);
setFromEvent(e);
  });
  el.addEventListener("pointermove", function(e){ if (el.hasPointerCapture && el.hasPointerCapture(e.pointerId)) setFromEvent(e); });
  el.addEventListener("pointerup", function(e){ if (onActive) onActive(false); try{el.releasePointerCapture(e.pointerId);}catch(err){} });
  el.addEventListener("keydown", function(e){
const step = e.key === "ArrowLeft" || e.key === "ArrowDown" ? -0.05 : e.key === "ArrowRight" || e.key === "ArrowUp" ? 0.05 : 0;
if (step) {
e.preventDefault();
const current = el === volume ? state.volume : (audio.duration ? audio.currentTime/audio.duration : 0);
onChange(Math.max(0, Math.min(1, current + step)));
}
  });
}

function ripple(e){
  const el = e.currentTarget;
  const rect = el.getBoundingClientRect();
  const s = document.createElement("span");
  s.className = "ripple-span";
  s.style.width = s.style.height = Math.max(rect.width, rect.height) + "px";
  s.style.left = (e.clientX - rect.left) + "px";
  s.style.top = (e.clientY - rect.top) + "px";
  el.appendChild(s);
  setTimeout(function(){ s.remove(); }, 760);
}

/* ===== MODULE: MASTER RAF LOOP ===== */
function loop(now){
  if (!state.running) return;
  const dt = Math.min(.05, (now - state.last) / 1000 || .016);
  state.last = now;
  state.elapsed += dt;

  if (!supports.reduced) {
starLayers[0].style.transform = "translate3d(" + (state.elapsed*5 + state.tiltX*.8) + "px," + (state.elapsed*2 + state.tiltY*.4) + "px,0)";
starLayers[1].style.transform = "translate3d(" + (-state.elapsed*3 + state.tiltX*.55) + "px," + (state.elapsed*1.4 + state.tiltY*.3) + "px,0)";
starLayers[2].style.transform = "translate3d(" + (state.elapsed*1.5 + state.tiltX*.28) + "px," + (-state.elapsed*.8 + state.tiltY*.2) + "px,0)";
  }

  getFrequencyData(dt);
  drawWaveform();
  updateThree(dt);

  if (state.isPlaying && supports.gsap && !supports.reduced) {
const active = cards[state.index];
if (active) {
const breathe = 1 + Math.sin(state.elapsed*2.1)*.004 + state.energy*.006;
active.style.setProperty("--beat-scale", breathe);
}
  }

  state.raf = requestAnimationFrame(loop);
}

/* ===== MODULE: UTILITIES ===== */
function shortestDiff(i, center){
  let diff = i - center;
  const n = TRACKS.length;
  if (diff > n/2) diff -= n;
  if (diff < -n/2) diff += n;
  return diff;
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, function(ch){ return ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" })[ch]; });
}
function debounce(fn, wait){
  let t = 0;
  return function(){ clearTimeout(t); t = setTimeout(fn, wait); };
}

/* ===== MODULE: BOOT ===== */
function boot(){
  const hour = new Date().getHours();
  root.style.setProperty("--warmth", hour >= 8 && hour <= 17 ? "rgba(255,190,120,.075)" : "rgba(90,120,255,.04)");
  audio.src = TRACKS[0].audio;
  updateText();
  updatePlayIcon();
  buildQueue();
  updateCards();
  entrance();
  updateTheme(TRACKS[0]);
  initThree();
  resizeThree();
  drawWaveform();
  bindEvents();
  state.last = performance.now();
  state.raf = requestAnimationFrame(loop);
}
if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
else boot();

})();
</script>
