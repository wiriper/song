<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#02030a">
    <title>Auralis Vision Ultra — Spatial Music Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #02030a;
            --bg-1: #050816;
            --bg-2: #07111f;
            --text: #f8fafc;
            --text-strong: #ffffff;
            --muted: rgba(203, 213, 225, .68);
            --faint: rgba(203, 213, 225, .40);
            --glass: rgba(8, 14, 28, .48);
            --glass-strong: rgba(10, 18, 34, .66);
            --glass-soft: rgba(255, 255, 255, .07);
            --glass-ultra: rgba(255, 255, 255, .04);
            --border: rgba(255, 255, 255, .14);
            --border-strong: rgba(255, 255, 255, .26);
            --cyan: #38d7ff;
            --blue: #4f8cff;
            --violet: #a78bfa;
            --pink: #fb7185;
            --green: #34d399;
            --amber: #fbbf24;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --shadow: rgba(0,0,0,.55);
            --shadow-soft: rgba(0,0,0,.35);
            --shadow-deep: rgba(0,0,0,.7);
            --glow-cyan: rgba(56,215,255,.32);
            --glow-blue: rgba(79,140,255,.28);
            --glow-violet: rgba(167,139,250,.26);
            --radius-2xl: 36px;
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 18px;
            --radius-sm: 14px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --nav-h: 64px;
            --player-h-desktop: 98px;
            --content-max: 1200px;
            --ease: cubic-bezier(.22,.8,.22,1);
            --ease-spring: cubic-bezier(.16,1,.28,1);
            --ease-out: cubic-bezier(0,0,.2,1);
            --track-a: #38d7ff;
            --track-b: #2563eb;
            --track-c: #020617;
            --blur-main: 30px;
            --blur-panel: 36px;
            --effect-opacity: 1;
            --motion-scale: 1;
            --spring-duration: .6s;
            --panel-duration: .4s;
        }
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            height: 100%;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-0);
            color: var(--text);
            min-height: 100%;
            min-height: 100svh;
            min-height: 100dvh;
            overflow: hidden;
            position: fixed;
            inset: 0;
            -webkit-user-select: none;
            user-select: none;
            -webkit-overflow-scrolling: touch;
        }
        button {
            font: inherit;
            color: inherit;
            border: 0;
            background: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            touch-action: manipulation;
        }
        button:focus-visible {
            outline: 2px solid var(--cyan);
            outline-offset: 3px;
            border-radius: 8px;
        }
        input,
        select,
        textarea {
            font: inherit;
            color: inherit;
        }
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
            touch-action: pan-y;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 5px;
            border-radius: 5px;
            background: rgba(255,255,255,.16);
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            margin-top: -7px;
            box-shadow: 0 0 12px var(--glow-cyan),0 2px 6px rgba(0,0,0,.3);
            cursor: pointer;
            border: 2px solid var(--cyan);
        }
        img,
        svg {
            display: block;
            max-width: 100%;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }
        @media(prefers-reduced-motion:reduce) {
            :root {
                --motion-scale: 0.001;
                --spring-duration: .01s;
                --panel-duration: .01s;
            }
        }
        .app {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .background {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 45%, var(--track-b) 0%, var(--track-c) 50%, #01030d 100%);
            transition: background 2s var(--ease);
            opacity: var(--effect-opacity);
        }
        .background::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at calc(50% + var(--mx)*2) calc(48% + var(--my)*2), var(--track-a) 0%, transparent 55%),
            radial-gradient(ellipse at calc(28% + var(--mx)*1.2) calc(18% + var(--my)*1.2), var(--track-b) 0%, transparent 48%);
            opacity: .55;
            transition: background 2s var(--ease);
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: .32;
            pointer-events: none;
            will-change: transform;
        }
        .orb-one {
            width: 350px;
            height: 350px;
            background: var(--track-a);
            top: -90px;
            left: 8%;
            animation: orbA 28s ease-in-out infinite;
        }
        .orb-two {
            width: 280px;
            height: 280px;
            background: var(--track-b);
            bottom: -80px;
            right: 6%;
            animation: orbB 30s ease-in-out infinite;
            opacity: .26;
        }
        @keyframes orbA {
            0%,
            100% {
                transform: translate(0,0) scale(1);
            }
            50% {
                transform: translate(40px,-30px) scale(1.1);
            }
        }
        @keyframes orbB {
            0%,
            100% {
                transform: translate(0,0) scale(1);
            }
            50% {
                transform: translate(-30px,25px) scale(1.08);
            }
        }
        .particle-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            pointer-events: none;
            animation: floatP linear infinite;
        }
        @keyframes floatP {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: .5;
            }
            90% {
                opacity: .5;
            }
            100% {
                transform: translateY(-100vh) translateX(20px);
                opacity: 0;
            }
        }
        .noise {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: .025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='nz'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23nz)'/%3E%3C/svg%3E");
            background-size: 150px 150px;
        }
        .vignette {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 52%, rgba(0,0,0,.55) 100%);
        }
        .top-nav {
            position: fixed;
            top: calc(10px + var(--safe-top));
            left: 50%;
            transform: translateX(-50%);
            width: min(960px, calc(100vw - 28px));
            height: var(--nav-h);
            z-index: 120;
            border-radius: var(--radius-2xl);
            background: linear-gradient(135deg, rgba(255,255,255,.11), rgba(255,255,255,.03));
            background-color: var(--glass-strong);
            backdrop-filter: blur(var(--blur-main)) saturate(165%);
            -webkit-backdrop-filter: blur(var(--blur-main)) saturate(165%);
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,.48), inset 0 1px 0 rgba(255,255,255,.10);
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 4px;
            animation: fadeSlideIn .6s var(--ease-spring);
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translate(-50%,-10px);
            }
            to {
                opacity: 1;
                transform: translate(-50%,0);
            }
        }
        .nav-cluster {
            display: flex;
            align-items: center;
            gap: 3px;
            flex-shrink: 0;
        }
        .nav-cluster.left {
            flex: 0 0 auto;
        }
        .nav-cluster.center {
            flex: 1 1 auto;
            justify-content: center;
            min-width: 0;
            gap: 7px;
        }
        .nav-cluster.right {
            flex: 0 0 auto;
        }
        .nav-btn {
            width: 40px;
            height: 40px;
            min-width: 40px;
            min-height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-soft);
            transition: all .2s var(--ease);
            flex-shrink: 0;
        }
        .nav-btn:hover {
            background: rgba(255,255,255,.1);
            color: #fff;
        }
        .nav-btn:active {
            transform: scale(.88);
            transition: transform .08s;
        }
        .nav-btn svg {
            width: 19px;
            height: 19px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .nav-center-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 0;
            overflow: hidden;
        }
        .nav-title {
            font-weight: 700;
            font-size: clamp(12px, 1.2vw, 14px);
            letter-spacing: -.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
            color: var(--text-strong);
            line-height: 1.2;
        }
        .nav-artist {
            font-weight: 400;
            font-size: 10px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }
        .nav-badge {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--cyan);
            font-weight: 600;
            background: rgba(56,215,255,.10);
            padding: 3px 7px;
            border-radius: 14px;
            border: 1px solid rgba(56,215,255,.22);
            flex-shrink: 0;
            white-space: nowrap;
        }
        .nav-avatar {
            width: 34px;
            height: 34px;
            min-width: 34px;
            min-height: 34px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--cyan), var(--blue), var(--violet), var(--cyan));
            box-shadow: 0 0 14px var(--glow-cyan);
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,.15);
        }
        .audio-status-badge {
            display: none;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: .06em;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 10px;
            background: rgba(245,158,11,.1);
            border: 1px solid rgba(245,158,11,.25);
            color: var(--amber);
        }
        .audio-status-badge.visible {
            display: inline-block;
        }
        .audio-status-badge.error {
            background: rgba(239,68,68,.12);
            border-color: rgba(239,68,68,.3);
            color: var(--danger);
        }
        .stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: calc(80px + var(--safe-top));
            padding-bottom: calc(150px + var(--safe-bottom));
            position: relative;
            z-index: 2;
            pointer-events: none;
        }
        .stage>* {
            pointer-events: auto;
        }
        .hero-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeUp .5s var(--ease-out);
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .hero-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--muted);
            font-weight: 500;
        }
        .hero-badge {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: .05em;
            text-transform: uppercase;
            padding: 5px 11px;
            border-radius: 18px;
            background: var(--glass-soft);
            border: 1px solid var(--border);
            color: var(--text-soft);
        }
        .hero-badge.accent {
            border-color: rgba(56,215,255,.32);
            color: var(--cyan);
        }
        .carousel-wrap {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1300px;
            height: 480px;
            z-index: 3;
            touch-action: pan-y;
        }
        .carousel {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
        }
        .carousel-card {
            position: absolute;
            width: 300px;
            height: 420px;
            border-radius: var(--radius-2xl);
            transition: transform var(--spring-duration) var(--ease-spring), opacity .4s, filter .4s;
            cursor: pointer;
            will-change: transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform-style: preserve-3d;
        }
        .carousel-card.dragging {
            transition: none !important;
        }
        .carousel-card.active {
            z-index: 20;
            filter: drop-shadow(0 25px 45px rgba(0,0,0,.5)) drop-shadow(0 0 30px var(--glow-cyan));
        }
        .carousel-card.near {
            z-index: 10;
            filter: blur(.2px) drop-shadow(0 15px 30px rgba(0,0,0,.4));
        }
        .carousel-card.far {
            z-index: 5;
            filter: blur(.8px) drop-shadow(0 6px 18px rgba(0,0,0,.3));
        }
        .carousel-card.hidden-card {
            z-index: 1;
            opacity: 0 !important;
            pointer-events: none;
        }
        .card {
            width: 100%;
            height: 100%;
            border-radius: var(--radius-2xl);
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08);
            background: #000;
        }
        .card-cover-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-2xl);
            z-index: 0;
        }
        .card-art {
            position: absolute;
            inset: 0;
            border-radius: var(--radius-2xl);
            overflow: hidden;
            z-index: 1;
        }
        .card-bottom-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 48%;
            background: linear-gradient(0deg, rgba(0,0,0,.88) 0%, transparent 100%);
            border-radius: 0 0 var(--radius-2xl) var(--radius-2xl);
            z-index: 2;
        }
        .card-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 3;
            padding: 18px 16px 14px;
        }
        .card-badge {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: .06em;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 10px;
            background: rgba(255,255,255,.09);
            border: 1px solid rgba(255,255,255,.15);
            color: #fff;
        }
        .card-badge.verified {
            border-color: rgba(56,215,255,.35);
            color: var(--cyan);
        }
        .card-title {
            font-weight: 800;
            font-size: 19px;
            letter-spacing: -.03em;
            color: var(--text-strong);
            margin: 2px 0 0;
        }
        .card-artist {
            font-weight: 400;
            font-size: 12px;
            color: var(--muted);
        }
        .card-glow-ring {
            position: absolute;
            inset: -3px;
            border-radius: calc(var(--radius-2xl) + 3px);
            border: 2px solid transparent;
            z-index: 1;
            pointer-events: none;
            transition: border-color .5s;
        }
        .carousel-card.active .card-glow-ring {
            border-color: rgba(56,215,255,.35);
            box-shadow: 0 0 24px rgba(56,215,255,.15);
        }
        .now-playing-indicator {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: #fff;
            font-weight: 600;
            background: rgba(0,0,0,.5);
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,.15);
            display: none;
            align-items: center;
            gap: 5px;
        }
        .carousel-card.active .now-playing-indicator {
            display: flex;
        }
        .now-playing-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--cyan);
            animation: pDot 1.3s ease-in-out infinite;
        }
        @keyframes pDot {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: .3;
            }
        }
        .player {
            position: fixed;
            bottom: calc(14px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%);
            width: min(1060px, calc(100vw - 24px));
            min-height: var(--player-h-desktop);
            z-index: 120;
            border-radius: var(--radius-2xl);
            background: linear-gradient(135deg, rgba(255,255,255,.1), rgba(255,255,255,.03));
            background-color: var(--glass-strong);
            backdrop-filter: blur(var(--blur-main)) saturate(165%);
            -webkit-backdrop-filter: blur(var(--blur-main)) saturate(165%);
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.10);
            display: grid;
            grid-template-columns: minmax(200px, 1.2fr) minmax(340px, 1.6fr) minmax(160px, 0.9fr);
            align-items: center;
            gap: 12px;
            padding: 8px 18px;
            animation: fadeSlideIn .5s var(--ease-spring);
        }
        @media(max-width:1023px) {
            .player {
                grid-template-columns: minmax(160px, 1fr) minmax(280px, 1.5fr) auto;
                gap: 8px;
                padding: 6px 12px;
            }
        }
        @media(max-width:699px) {
            .player {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
                gap: 6px;
                padding: 8px 10px;
                min-height: auto;
                bottom: calc(8px + var(--safe-bottom));
                border-radius: var(--radius-xl);
            }
        }
        .player-track-info {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        .player-mini-art {
            width: 46px;
            height: 46px;
            min-width: 46px;
            min-height: 46px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border);
            background: #000;
        }
        .player-mini-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .player-track-text {
            min-width: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .player-track-title {
            font-weight: 700;
            font-size: 14px;
            letter-spacing: -.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-strong);
        }
        .player-track-artist {
            font-weight: 400;
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-progress-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .player-time {
            font-size: 10px;
            font-weight: 500;
            color: var(--muted);
            min-width: 32px;
            text-align: center;
        }
        .progress-track {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,.12);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            overflow: visible;
            touch-action: pan-y;
        }
        .progress-fill {
            height: 100%;
            border-radius: 6px;
            background: linear-gradient(90deg, var(--cyan), var(--blue));
            box-shadow: 0 0 8px var(--glow-cyan);
            transition: width .1s linear;
            pointer-events: none;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 10px var(--glow-cyan);
            opacity: 0;
            transition: opacity .2s;
        }
        .progress-track:hover .progress-fill::after,
        .progress-track.dragging .progress-fill::after {
            opacity: 1;
        }
        .player-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            justify-content: flex-end;

            async function parseAudioMetadata(file) {
                const res = { title: '', artist: '', album: '', genre: '', year: '', bpm: '', duration: 0, coverBlob: null,
                    coverUrl: '', quality: 'Imported', palette: ['#38d7ff', '#2563eb', '#020617'] };
                const fn = file.name.replace(/\.[^.]+$/, '').replace(/_/g, ' ').trim().replace(/^\d+[\s.-]+/, '');
                const parts = fn.split(/ - | – | — |-/);
                res.title = parts.length >= 2 ? parts[1].trim() : fn;
                res.artist = parts.length >= 2 ? parts[0].trim() : 'Unknown';
                if (file.type.includes('mpeg') || file.name.endsWith('.mp3')) {
                    const slice = file.slice(0, 4 * 1024 * 1024);
                    const buf = await slice.arrayBuffer();
                    const id3 = parseID3v2(buf);
                    if (id3) {
                        if (id3.title) res.title = id3.title;
                        if (id3.artist) res.artist = id3.artist;
                        if (id3.album) res.album = id3.album;
                        if (id3.genre) res.genre = id3.genre;
                        if (id3.year) res.year = id3.year;
                        if (id3.bpm) res.bpm = id3.bpm;
                        if (id3.coverBytes) {
                            const blob = new Blob([id3.coverBytes], { type: id3.coverMime || 'image/jpeg' });
                            res.coverBlob = blob;
                            res.coverUrl = URL.createObjectURL(blob);
                            state.objectUrls.push(res.coverUrl);
                        }
                    }
                }
                const audioTemp = new Audio();
                audioTemp.src = URL.createObjectURL(file);
                state.objectUrls.push(audioTemp.src);
                await new Promise(r => { audioTemp.addEventListener('loadedmetadata', () => { res.duration = audioTemp
                            .duration || 0;
                        r(); });
                    audioTemp.addEventListener('error', () => r());
                    setTimeout(() => r(), 2000); });
                if (!res.quality || res.quality === 'Imported') {
                    const ext = file.name.split('.').pop().toLowerCase();
                    if (ext === 'flac') res.quality = 'Lossless';
                    else if (ext === 'wav') res.quality = 'Studio WAV';
                    else if (ext === 'ogg') res.quality = 'OGG';
                    else if (ext === 'm4a' || ext === 'aac') res.quality = 'AAC';
                    else if (res.duration && file.size) {
                        const kbps = file.size * 8 / res.duration / 1000;
                        if (kbps > 900) res.quality = 'Hi-Res';
                        else if (kbps > 280) res.quality = 'MP3 320';
                    }
                }
                return res;
            }

            function parseID3v2(buf) {
                try {
                    const dv = new DataView(buf);
                    if (dv.getUint32(0) !== 0x494433) return null;
                    const ver = dv.getUint8(3);
                    const flags = dv.getUint8(5);
                    const size = ((dv.getUint8(6) & 0x7f) << 21) | ((dv.getUint8(7) & 0x7f) << 14) | ((dv.getUint8(8) & 0x7f) <<
                        7) | (dv.getUint8(9) & 0x7f);
                    let off = 10;
                    const end = off + size;
                    if (end > buf.byteLength) return null;
                    const meta = { coverMime: '', coverBytes: null };
                    const dec = new TextDecoder();
                    while (off + 10 <= end) {
                        const id = String.fromCharCode(dv.getUint8(off), dv.getUint8(off + 1), dv.getUint8(off + 2), dv
                        .getUint8(off + 3));
                        const fsize = dv.getUint32(off + 4);
                        if (fsize <= 0 || off + 10 + fsize > end) break;
                        const data = new Uint8Array(buf, off + 10, fsize);
                        if (id === 'TIT2') meta.title = decodeID3Text(data, dec);
                        else if (id === 'TPE1') meta.artist = decodeID3Text(data, dec);
                        else if (id === 'TALB') meta.album = decodeID3Text(data, dec);
                        else if (id === 'TCON') meta.genre = decodeID3Text(data, dec);
                        else if (id === 'TDRC' || id === 'TYER') meta.year = decodeID3Text(data, dec);
                        else if (id === 'TBPM') meta.bpm = decodeID3Text(data, dec);
                        else if (id === 'APIC') {
                            const apic = parseAPIC(data);
                            if (apic) { meta.coverMime = apic.mime;
                                meta.coverBytes = apic.bytes; }
                        }
                        off += 10 + fsize;
                    }
                    return meta;
                } catch (e) { return null; }
            }

            function decodeID3Text(data, dec) { if (data.length < 2) return ''; const enc = data[0]; try { if (enc === 1 || enc ===
                    2) return new TextDecoder('utf-16').decode(data.slice(1)).replace(/\0/g, '').trim(); } catch (e) {} return dec
                    .decode(data.slice(1)).replace(/\0/g, '').trim(); }

            function parseAPIC(data) {
                let idx = 1;
                const mimeEnd = Array.prototype.indexOf.call(data, 0, idx); if (mimeEnd === -1) return null; const mime = new
                    TextDecoder().decode(data.slice(idx, mimeEnd));
                idx = mimeEnd + 2;
                const descEnd = Array.prototype.indexOf.call(data, 0, idx); if (descEnd === -1) return null;
                idx = descEnd + 1;
                const bytes = data.slice(idx); return { mime, bytes };
            }

            async function handleFileSelect() { const file = document.getElementById('cfAudio').files[0]; if (!file) return;
                const meta = await parseAudioMetadata(file);
                document.getElementById('cfTitle').value = meta.title;
                document.getElementById('cfArtist').value = meta.artist;
                document.getElementById('cfAlbum').value = meta.album;
                document.getElementById('cfGenre').value = meta.genre;
                document.getElementById('cfYear').value = meta.year || '2026';
                document.getElementById('cfQuality').value = meta.quality || 'Imported'; if (meta.coverUrl) { const dt = new
                        DataTransfer(); if (meta.coverBlob) dt.items.add(new File([meta.coverBlob], 'cover.jpg', { type: meta
                                .coverBlob.type || 'image/jpeg' }));
                    document.getElementById('cfCover').files = dt.files; }
                window._tempMeta = meta; }

            async function addImportedTrack() { const file = document.getElementById('cfAudio').files[0]; if (!file) { showToast(
                        'Select an audio file first'); return; } const meta = window._tempMeta || await
                    parseAudioMetadata(file); const t = {
                    id: 'imp-' + Date.now(),
                    title: document.getElementById('cfTitle').value.trim() || meta.title,
                    artist: document.getElementById('cfArtist').value.trim() || meta.artist,
                    album: document.getElementById('cfAlbum').value.trim() || meta.album,
                    genre: document.getElementById('cfGenre').value.trim() || meta.genre,
                    mood: '',
                    year: parseInt(document.getElementById('cfYear').value) || 2026,
                    duration: meta.duration,
                    quality: document.getElementById('cfQuality').value,
                    bpm: 120,
                    audioSrc: URL.createObjectURL(file),
                    coverSrc: meta.coverUrl || '',
                    palette: ['#38d7ff', '#2563eb', '#020617'],
                    verified: false,
                    lyrics: [],
                    isImported: true
                };
                const coverFile = document.getElementById('cfCover').files[0]; if (coverFile) { if (t.coverSrc) URL
                        .revokeObjectURL(t.coverSrc);
                    t.coverSrc = URL.createObjectURL(coverFile); }
                state.objectUrls.push(t.audioSrc, t.coverSrc);
                state.tracks.push(t);
                setTrackByIndex(state.tracks.length - 1);
                closePanel('creator');
                showToast('Added: ' + t.title); }

            function generateManifestJSON() { const t = getTrack(); const slug = (t.title || 'track').toLowerCase().replace(
                    /[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); const entry = { id: slug, title: t.title, artist: t.artist,
                    album: t.album, genre: t.genre, mood: t.mood, year: t.year, duration: t.duration, quality: t.quality,
                    bpm: t.bpm, audioSrc: `songs/${slug}.mp3`, coverSrc: `covers/${slug}.jpg`,
                    lyricsSrc: `lyrics/${slug}.lrc`, palette: t.palette, verified: t.verified }; return JSON.stringify(
                    entry, null, 2); }

            function setupAudioEvents() { audio.addEventListener('loadedmetadata', () => { state.duration = audio.duration;
                    updateProgressDisplay();
                    document.getElementById('timeDuration').textContent = formatTime(state.duration);
                    state.audioLoading = false;
                    updateAudioStatusBadges(); if (state.isPlaying) audio.play().catch(() => {}); });
                audio.addEventListener('timeupdate', () => { if (!state.draggingSeek) { state.currentTime = audio
                            .currentTime;
                        updateProgressDisplay(); if (Date.now() - state.lastTimeUpdate > 250) { updateActiveLyric();
                            state.lastTimeUpdate = Date.now(); } } });
                audio.addEventListener('ended', () => { if (state.repeat === 'one') { audio.currentTime = 0;
                        audio.play().catch(() => {}); } else nextTrack(); });
                audio.addEventListener('error', () => { state.audioError = true;
                    state.audioLoading = false;
                    updateAudioStatusBadges();
                    showToast('Audio error. Tap retry.'); }); }

            function setupEvents() { document.getElementById('btnPlay').addEventListener('click', togglePlay);
                document.getElementById('btnPrev').addEventListener('click', prevTrack);
                document.getElementById('btnNext').addEventListener('click', nextTrack);
                document.getElementById('btnBack').addEventListener('click', prevTrack);
                document.getElementById('btnForward').addEventListener('click', nextTrack);
                document.getElementById('btnShuffle').addEventListener('click', toggleShuffle);
                document.getElementById('btnRepeat').addEventListener('click', cycleRepeat);
                document.getElementById('btnLike').addEventListener('click', toggleLike);
                document.getElementById('btnMute').addEventListener('click', toggleMute);
                document.getElementById('volumeSlider').addEventListener('input', function() { setVolume(parseInt(this
                        .value) / 100); });
                document.getElementById('btnSearch').addEventListener('click', () => openPanel('search'));
                document.getElementById('btnQueue').addEventListener('click', () => openPanel('queue'));
                document.getElementById('btnQueuePanel').addEventListener('click', () => openPanel('queue'));
                document.getElementById('btnLyrics').addEventListener('click', () => openPanel('lyrics'));
                document.getElementById('btnLyricsPanel').addEventListener('click', () => openPanel('lyrics'));
                document.getElementById('btnLibrary').addEventListener('click', () => openPanel('library'));
                document.getElementById('btnCreator').addEventListener('click', () => openPanel('creator'));
                document.getElementById('btnCloseQueue').addEventListener('click', () => closePanel('queue'));
                document.getElementById('btnCloseLyrics').addEventListener('click', () => closePanel('lyrics'));
                document.getElementById('btnCloseLibrary').addEventListener('click', () => closePanel('library'));
                document.getElementById('btnCloseCreator').addEventListener('click', () => closePanel('creator'));
                document.getElementById('overlayBackdrop').addEventListener('click', closeAllPanels);
                document.getElementById('searchInput').addEventListener('input', function() { renderSearch(this.value); });
                document.getElementById('cfAudio').addEventListener('change', handleFileSelect);
                document.getElementById('btnAddTempTrack').addEventListener('click', addImportedTrack);
                document.getElementById('btnCopyManifest').addEventListener('click', () => { const json =
                        generateManifestJSON();
                    document.getElementById('manifestPreview').textContent = json;
                    document.getElementById('manifestPreview').style.display = 'block';
                    navigator.clipboard.writeText(json);
                    showToast('Copied manifest entry'); });
                const prog = document.getElementById('progressTrack');
                prog.addEventListener('pointerdown', function(e) { state.draggingSeek = true;
                    prog.setPointerCapture(e.pointerId); const rect = prog.getBoundingClientRect();
                    seekTo(clamp((e.clientX - rect.left) / rect.width, 0, 1)); });
                prog.addEventListener('pointermove', function(e) { if (state.draggingSeek) { const rect = prog
                        .getBoundingClientRect();
                        seekTo(clamp((e.clientX - rect.left) / rect.width, 0, 1)); } });
                prog.addEventListener('pointerup', () => state.draggingSeek = false);
                const wrap = document.getElementById('carouselWrap');
                wrap.addEventListener('pointerdown', function(e) { if (state.activePanel) return;
                    state.carouselDragStartX = e.clientX;
                    state.carouselDragging = false;
                    wrap.setPointerCapture(e.pointerId); });
                wrap.addEventListener('pointermove', function(e) { if (!wrap.hasPointerCapture(e.pointerId))
                return;
                    state.carouselDragDelta = e.clientX - state.carouselDragStartX; if (Math.abs(state
                        .carouselDragDelta) > 6) state.carouselDragging = true; });
                wrap.addEventListener('pointerup', function() { if (state.carouselDragging && Math.abs(state
                        .carouselDragDelta) > 40) { if (state.carouselDragDelta < -40) nextTrack();
                    else prevTrack(); }
                    state.carouselDragging = false; });
                document.addEventListener('keydown', e => { if (e.target.tagName === 'INPUT' || e.target.tagName ===
                        'TEXTAREA') return; if (e.key === 'Escape') closeAllPanels(); if ((e.ctrlKey || e.metaKey) && e
                        .key === 'k') { e.preventDefault();
                        openPanel('search'); } if (e.key === ' ') { e.preventDefault();
                        togglePlay(); } if (e.key === 'ArrowRight') nextTrack(); if (e.key === 'ArrowLeft')
                prevTrack(); if (e.key === 'ArrowUp') setVolume(Math.min(1, state.volume + .05)); if (e.key ===
                    'ArrowDown') setVolume(Math.max(0, state.volume - .05)); if (e.key === 'm' || e.key === 'M')
                    toggleMute(); if (e.key === 'l' || e.key === 'L') openPanel('lyrics'); if (e.key === 'q' || e
                    .key === 'Q') openPanel('queue'); if (e.key === 'h' || e.key === 'H') openPanel('library'); if (
                    e.key === 'c' || e.key === 'C') openPanel('creator'); if (e.key === 'f' || e.key === 'F')
                    toggleLike(); }); }

            async function loadManifest() { try { const r = await fetch('songs/manifest.json', { cache: 'no-store' }); if (r
                    .ok) { const data = await r.json(); if (data && Array.isArray(data.tracks)) { state.tracks = data
                            .tracks.map((t, i) => ({ id: t.id || 'track-' + i, title: t.title || 'Untitled',
                                artist: t.artist || 'Unknown', album: t.album || '', genre: t.genre || '',
                                mood: t.mood || '', year: t.year || 2026, duration: t.duration || 0, quality: t
                                .quality || 'Lossless', bpm: t.bpm || 120, audioSrc: t.audioSrc || '',
                                coverSrc: t.coverSrc || '', lyricsSrc: t.lyricsSrc || '',
                                palette: t.palette || ['#38d7ff', '#2563eb', '#020617'], verified: t
                                .verified === true, lyrics: t.lyrics || [], liked: false }));
                        state.currentIndex = 0; return; } } } catch (e) {} state.tracks = FALLBACK_TRACKS.map(t => ({ ...t,
                    liked: false }));
                state.currentIndex = 0; }

            function init() { loadState();
                detectPerformanceProfile();
                loadManifest().then(() => { updatePlayerUI();
                    renderCarousel();
                    renderQueue();
                    renderLyrics();
                    renderSearch('');
                    renderLibrary();
                    setupAudioEvents();
                    setupEvents();
                    setDynamicPalette(getTrack()); if (state.isPlaying && audio.src) safePlay();
                    announce('Auralis Vision Ultra ready'); }); }
            document.addEventListener('DOMContentLoaded', init);
            window.addEventListener('beforeunload', () => state.objectUrls.forEach(u => URL.revokeObjectURL(u)));
        })();
    </script>
</body>
</html>
